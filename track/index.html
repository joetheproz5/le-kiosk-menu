var loadBusy=false, autoRefresh=null, lastTrackingJSON=null, customerWS=null, wsAlive=false, customerWSReconnect=true, wsRetryCount=0, customerWSPingTimer=null, customerWSReconnectTimer=null, currentOrderGPS=null, currentOrderId=null, manualPanUntil=0, lastKnownETA=null, originalTitle=document.title, titleFlashTimer=null, statusAudioCtx=null, pendingWSConnect=false, mapInitInProgress=false, hasLoadedOrder=false;

/* shared util */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/\x3C/g,'&lt;').replace(/>/g,'&gt;');}
/* shared util */
function money(n){return'$'+(Number(n)||0).toFixed(2);}
/* shared util */
function fmtDist(m){return m<1000?Math.round(m)+' m':(m/1000).toFixed(1)+' km';}
function fmtTime(d){if(!d)return'--';var dt=new Date(d);return dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}
/* shared util */
function haversine(a,b,c,d){var R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;var z=Math.sin(x/2)*Math.sin(x/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)*Math.sin(y/2);return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}
// Lightweight Kalman smoothing calms server GPS wobble before it reaches the marker/camera.
class KalmanFilter{
 constructor(R,Q){this.R=R===undefined?3:R;this.Q=Q===undefined?.01:Q;this.P=1;this.x=null;this.K=0}
 filter(measurement){
  if(this.x===null){this.x=measurement;return measurement}
  this.P=this.P+this.Q;
  this.K=this.P/(this.P+this.R);
  this.x=this.x+this.K*(measurement-this.x);
  this.P=(1-this.K)*this.P;
  return this.x;
 }
 setR(r){if(Number.isFinite(Number(r))&&Number(r)>0)this.R=Number(r)}
}
var kfLat=new KalmanFilter(8,.05),kfLng=new KalmanFilter(8,.05);
function pointAhead(lat,lng,bearing,meters){
 if(!Number.isFinite(Number(bearing)))return{lat:lat,lng:lng};
 var R=6371000,d=meters/R,br=Number(bearing)*Math.PI/180,la1=lat*Math.PI/180,ln1=lng*Math.PI/180;
 var la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(br));
 var ln2=ln1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la1),Math.cos(d)-Math.sin(la1)*Math.sin(la2));
 return{lat:la2*180/Math.PI,lng:ln2*180/Math.PI};
}
function bearingBetween(lat1,lng1,lat2,lng2){
 var y=Math.sin((lng2-lng1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
 var x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lng2-lng1)*Math.PI/180);
 return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function setTargetHeading(h){
 h=Number(h);
 if(Number.isFinite(h))targetHeading=((h%360)+360)%360;
}
function animateHeading(){
 if(headingAnimStarted)return;
 headingAnimStarted=true;
 function tick(){
  var delta=((targetHeading-animatedHeading+540)%360)-180;
  animatedHeading+=delta*.1;
  var el=driverMarker&&driverMarker.getElement&&driverMarker.getElement();
  var headingEl=el&&el.querySelector('.driver-heading');
  if(headingEl)headingEl.style.transform='rotate('+animatedHeading+'deg)';
  requestAnimationFrame(tick);
 }
 requestAnimationFrame(tick);
}
function followEasing(t){return 1-Math.pow(1-t,2.8)}
function getFollowDuration(fromLat,fromLng,toLat,toLng){
 var dist=haversine(fromLat,fromLng,toLat,toLng);
 return Math.min(520,Math.max(220,dist*16));
}
function getAdaptiveZoom(speedMs){
 if(!Number.isFinite(speedMs)||speedMs<1)return 16.6;
 if(speedMs<6)return 16.2;
 if(speedMs<12)return 15.7;
 if(speedMs<20)return 15;
 return 14.4;
}
function smoothZoom(target){
 var delta=target-currentZoom;
 currentZoom+=Math.sign(delta)*Math.min(Math.abs(delta),.35);
 return currentZoom;
}
function getAdaptivePitch(speedMs){
 return 0;
}
function smoothPitch(target){
 var delta=target-currentPitch;
 currentPitch+=Math.sign(delta)*Math.min(Math.abs(delta),2.5);
 return currentPitch;
}
function followDriverCamera(lat,lng){
 if(!mapInst||Date.now()<manualPanUntil)return;
 var moved=lastFollowLat===null?999:haversine(lastFollowLat,lastFollowLng,lat,lng);
 if(moved<8)return;
 clearTimeout(followTimer);
 followTimer=setTimeout(function(){
  if(!mapInst||Date.now()<manualPanUntil)return;
  mapInst.panTo([lat,lng],{animate:true,duration:.35});
  var z=Math.max(mapInst.getZoom(),Math.round(smoothZoom(getAdaptiveZoom(deadReckonSpeed))));
  if(mapInst.getZoom()<z)mapInst.setZoom(z,{animate:true});
  lastFollowLat=lat;
  lastFollowLng=lng;
 },40);
}
function routeShouldRefresh(lat,lng){
 // Route refresh is intentionally slower unless the driver is off the route.
 if(routeNeeded)return true;
 if(lastRouteLat===null||lastRouteLng===null)return true;
 if(distanceToRouteMeters(lat,lng)>ROUTE_OFFROUTE_METERS)return true;
 return Date.now()-routeLastFetched>ROUTE_REFRESH_MS&&haversine(lat,lng,lastRouteLat,lastRouteLng)>ROUTE_REFRESH_METERS;
}
function distanceToSegmentMeters(p,a,b){
 var x=p.lng,y=p.lat,x1=a[0],y1=a[1],x2=b[0],y2=b[1];
 var dx=x2-x1,dy=y2-y1;
 if(dx===0&&dy===0)return haversine(y,x,y1,x1);
 var t=((x-x1)*dx+(y-y1)*dy)/(dx*dx+dy*dy);
 t=Math.max(0,Math.min(1,t));
 return haversine(y,x,y1+t*dy,x1+t*dx);
}
function distanceToRouteMeters(lat,lng){
 if(!currentRouteCoords||currentRouteCoords.length<2)return Infinity;
 var best=Infinity,p={lat:lat,lng:lng};
 for(var i=1;i<currentRouteCoords.length;i++){
  best=Math.min(best,distanceToSegmentMeters(p,currentRouteCoords[i-1],currentRouteCoords[i]));
  if(best<18)break;

}
function nearestPointOnSegment(px,py,ax,ay,bx,by){
 var dx=bx-ax,dy=by-ay;
 if(dx===0&&dy===0)return{lat:ay,lng:ax};
 var t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
 return{lat:ay+t*dy,lng:ax+t*dx};
}
function snapToRoute(lat,lng){
 var coords=fullRouteCoords||currentRouteCoords;
 if(!coords||coords.length<2)return{lat:lat,lng:lng};
 var bestDist=Infinity,bestPoint={lat:lat,lng:lng};
 for(var i=1;i<coords.length;i++){
  var a=coords[i-1],b=coords[i];
  var p=nearestPointOnSegment(lng,lat,a[0],a[1],b[0],b[1]);

function trimRouteToProgress(lat,lng){
 // Progress trimming searches the preserved full route but only changes the displayed line.

 for(var i=0;i<fullRouteCoords.length-1;i++){
  var a=fullRouteCoords[i],b=fullRouteCoords[i+1];
  var p=nearestPointOnSegment(lng,lat,a[0],a[1],b[0],b[1]);
  var d=haversine(lat,lng,p.lat,p.lng);
  if(d<bestDist){bestDist=d;bestIdx=i}

}
function moveMarkerTo(lat,lng){
 // Single visual-position writer: move to filtered real position and trim route.

function headingFromRoute(lat,lng){
 // Predictive heading comes from the road segment ahead when the driver is still on route.
 if(!currentRouteCoords||currentRouteCoords.length<2)return null;
 var bestIdx=0,bestDist=Infinity;
 for(var i=0;i<currentRouteCoords.length-1;i++){
  var a=currentRouteCoords[i],b=currentRouteCoords[i+1];
  var p=nearestPointOnSegment(lng,lat,a[0],a[1],b[0],b[1]);

function playStatusUpdateSound(){
 try{
  var AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  if(!statusAudioCtx)statusAudioCtx=new AC();
  if(statusAudioCtx.state==='suspended')statusAudioCtx.resume();
  [660,880].forEach(function(freq,i){
   var osc=statusAudioCtx.createOscillator(),gain=statusAudioCtx.createGain();
   osc.frequency.value=freq;
   gain.gain.setValueAtTime(0.001,statusAudioCtx.currentTime+i*.18);
   gain.gain.exponentialRampToValueAtTime(.16,statusAudioCtx.currentTime+i*.18+.025);
   gain.gain.exponentialRampToValueAtTime(0.001,statusAudioCtx.currentTime+i*.18+.16);
   osc.connect(gain);gain.connect(statusAudioCtx.destination);
   osc.start(statusAudioCtx.currentTime+i*.18);
   osc.stop(statusAudioCtx.currentTime+i*.18+.18);
  });
 }catch(e){}
}

function connectCustomerWS(orderId){
 // WebSocket handles live map movement; fetch polling stays as fallback/status refresh.
 if(!orderId||typeof WebSocket==='undefined'||customerWS)return;
 var wsUrl='wss://lekiosk-order-inbox.lekiosklb.workers.dev/ws/'+encodeURIComponent(orderId)+'?role=customer&orderId='+encodeURIComponent(orderId)+'&token='+encodeURIComponent(TRACK_TOKEN);
 customerWS=new WebSocket(wsUrl);
  customerWS.addEventListener('open',function(){
   wsAlive=true;
   setReconnecting(false);
   wsRetryCount=0;
   clearTimeout(customerWSReconnectTimer);
   customerWSReconnectTimer=null;
  clearInterval(customerWSPingTimer);
  customerWSPingTimer=setInterval(function(){
   if(customerWS&&customerWS.readyState===WebSocket.OPEN)customerWS.send(JSON.stringify({type:'ping'}));
  },30000);
  startRefresh();
 });
 customerWS.addEventListener('message',function(evt){
  try{
   var msg=JSON.parse(evt.data);
   if(msg.type==='position')handleWSPosition(msg);
  }catch(e){}
 });
 customerWS.addEventListener('close',function(){
 wsAlive=false;
 customerWS=null;
 clearInterval(customerWSPingTimer);
 customerWSPingTimer=null;
 startRefresh();
  if(customerWSReconnect&&wsRetryCount<10){
   setReconnecting(true);
   var delay=Math.min(30000,3000*Math.pow(1.4,wsRetryCount));
   wsRetryCount++;
    clearTimeout(customerWSReconnectTimer);
    customerWSReconnectTimer=setTimeout(function(){customerWSReconnectTimer=null;connectCustomerWS(orderId)},delay);
  }
 });
 customerWS.addEventListener('error',function(){setReconnecting(true);try{customerWS.close()}catch(e){}});
}

function handleWSPosition(msg){
 // Live WS updates touch only map position/ETA, not the status timeline DOM.
 var ts=Number(msg.ts)||Date.now();
 if(ts+POSITION_STALE_MS<Date.now()||ts<lastPositionTs)return;
 lastPositionTs=ts;
 lastPositionSource='ws';
 var track={driverLocation:{lat:msg.lat,lng:msg.lng,heading:msg.heading,speed:msg.speed,accuracy:msg.accuracy,updatedAt:new Date(ts).toISOString()},delivering:true};
 if(!ensureMapReady(track,currentOrderGPS)){
  if(msg.eta!=null)setMapDistance(msg.eta+' min away');
  else setMapDistance(null);
  return;
 }
 updateMap(track,currentOrderGPS);
 if(msg.eta!=null)setMapDistance(msg.eta+' min away');
 else setMapDistance(null);
}

function buildSteps(track,isDelivery){
 var visible=isDelivery?STEPS:STEPS.filter(function(s){return s.key!=='delivering'});
 var last=-1;
 visible.forEach(function(s,i){if(track[s.key])last=i});
 return visible.map(function(s,i){
  var cls='step';
  if(track[s.key])cls+=' complete';
  else if(i===last+1)cls+=' current';
  var time=track[s.key]?fmtTime(track[s.key]):'';
  var dot='dot';
  if(cls.indexOf('current')>=0)dot+=' pulse';
  var state=track[s.key]?'Done':(i===last+1?'Now':'Waiting');
  return'\x3Cdiv class="'+cls+'"\x3E\x3Cdiv class="'+dot+'"\x3E\x3C/div\x3E\x3Cdiv class="step-body"\x3E\x3Cdiv\x3E\x3Cdiv class="step-label"\x3E'+s.icon+' '+esc(s.label)+'\x3C/div\x3E\x3Cdiv class="step-state"\x3E'+state+'\x3C/div\x3E\x3C/div\x3E\x3Cdiv class="step-time"\x3E'+(time||'--')+'\x3C/div\x3E\x3C/div\x3E\x3C/div\x3E';
 }).join('');
}

/* shared util */
function pointFromGPS(gps){
 if(!gps)return null;
 var lat=Number(gps.lat),lng=Number(gps.lng);
 if(!Number.isFinite(lat)||!Number.isFinite(lng))return null;
 return{lat:lat,lng:lng};
}

function initMapOnce(track,gps){
 var el=document.getElementById('map');
 if(!el||mapInst)return;
 var customerPoint=pointFromGPS(gps);
 var clat=customerPoint?customerPoint.lat:RLAT;
 var clng=customerPoint?customerPoint.lng:RLNG;
 mapInst=L.map('map',{zoomControl:true,attributionControl:true}).setView([clat,clng],14);
 L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',{
  subdomains:'abc',
  maxZoom:19,
  attribution:'&copy; OpenStreetMap contributors &copy; CARTO'
 }).addTo(mapInst);
 mapInst.on('dragstart zoomstart',function(){manualPanUntil=Date.now()+8000});
 addStoreMarker();
 addCustMarker(gps);
 var drvNow=pointFromGPS(track&&track.driverLocation);
 if(drvNow){
  updateMap(track,gps);
  if(Date.now()>manualPanUntil)mapInst.setView([drvNow.lat,drvNow.lng],(track.delivering&&!track.delivered)?15:14,{animate:true});
 }
 var drvNow=track&&track.driverLocation;
 if(drvNow||(track.delivering&&!track.delivered)){var rb=document.getElementById('map-recenter');if(rb)rb.style.display='block'}
 firstMapDone=true;
 setTimeout(function(){if(mapInst)mapInst.invalidateSize()},120);
}

 if(!point||!mapInst||custMarker)return;
 var el=markerEl('\x3Cdiv style="width:24px;height:24px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.25)"\x3E\x3C/div\x3E');
 custMarker=L.marker([point.lat,point.lng],{icon:L.divIcon({html:el.outerHTML,className:'',iconSize:[24,24],iconAnchor:[12,12]})}).bindPopup('\x3Cb\x3ECustomer\x3C/b\x3E').addTo(mapInst);
 if(!addCustMarker.storeLine)addCustMarker.storeLine=L.polyline([[RLAT,RLNG],[point.lat,point.lng]],{color:'#b45309',weight:2,opacity:.45,dashArray:'5,5'}).addTo(mapInst);

function updateMap(track,gps){
 if(!mapInst)return;
 addCustMarker(gps);
 var rawDriverLocation=track&&track.driverLocation;
 var rawTs=rawDriverLocation&&Date.parse(rawDriverLocation.updatedAt||'');
 if(rawTs&&rawTs<lastPositionTs)return;
 if(rawTs)lastPositionTs=rawTs;
 var dl=rawDriverLocation;
 dl=pointFromGPS(dl);
 if(dl){
  if(lastDriverLat===null){
   kfLat.filter(dl.lat);
   kfLng.filter(dl.lng);
   noteServerDriverPosition(dl,track&&track.driverLocation);
   if(!driverMarker){
    var firstEl=markerEl('\x3Cdiv class="driver-heading"\x3E\x3Cdiv class="tip"\x3E\x3C/div\x3E\x3Cdiv class="core"\x3E\x3C/div\x3E\x3C/div\x3E');
    driverMarker=L.marker([dl.lat,dl.lng],{icon:L.divIcon({html:firstEl.outerHTML,className:'',iconSize:[28,28],iconAnchor:[14,14]})}).bindPopup('\x3Cb\x3EDriver\x3C/b\x3E').addTo(mapInst);
    animateHeading();
    routeNeeded=true;
   }
   moveMarkerTo(dl.lat,dl.lng);
   lastDriverLat=dl.lat;lastDriverLng=dl.lng;
   var firstRb=document.getElementById('map-recenter');
   if(firstRb)firstRb.style.display='block';
   startDeadReckoning();
   if(custMarker&&routeShouldRefresh(dl.lat,dl.lng)){
    routeNeeded=false;
    var firstC=custMarker.getLatLng();
    fetchRoute(dl.lat,dl.lng,firstC.lat,firstC.lng);
   }
   return;
  }
  var accuracy=Number((track&&track.driverLocation&&track.driverLocation.accuracy)||0);
  var filterNoise=Number.isFinite(accuracy)&&accuracy>0?Math.max(3,Math.min(14,accuracy/4)):4;
  kfLat.setR(filterNoise);kfLng.setR(filterNoise);
  var filteredLat=kfLat.filter(dl.lat),filteredLng=kfLng.filter(dl.lng);
  var MIN_MOVE_METERS=lastPositionSource==='ws'?LIVE_MIN_MOVE_METERS:POLL_MIN_MOVE_METERS;
  var distMoved=lastDriverLat===null?999:haversine(lastDriverLat,lastDriverLng,dl.lat,dl.lng);
  if(distMoved<MIN_MOVE_METERS&&lastDriverLat!==null){
   noteServerDriverPosition(dl,track&&track.driverLocation);
   lastDriverLat=dl.lat;lastDriverLng=dl.lng;
   return;
  }
  var hadDriverMarker=!!driverMarker;
  noteServerDriverPosition(dl,track&&track.driverLocation);
  var routePoint=snapToRoute(filteredLat,filteredLng);
  var routeHeading=headingFromRoute(routePoint.lat,routePoint.lng);
  if(routeHeading!==null)driverHeading=routeHeading;
  setTargetHeading(driverHeading===null?0:driverHeading);
  if(!driverMarker)routeNeeded=true;
  if(driverMarker)animateDriverMarker(routePoint.lat,routePoint.lng);
  else{
   var el=markerEl('\x3Cdiv class="driver-heading"\x3E\x3Cdiv class="tip"\x3E\x3C/div\x3E\x3Cdiv class="core"\x3E\x3C/div\x3E\x3C/div\x3E');
   driverMarker=L.marker([routePoint.lat,routePoint.lng],{icon:L.divIcon({html:el.outerHTML,className:'',iconSize:[28,28],iconAnchor:[14,14]})}).bindPopup('\x3Cb\x3EDriver\x3C/b\x3E').addTo(mapInst);
   animateHeading();
   moveMarkerTo(routePoint.lat,routePoint.lng);
  }
  var isDel=track.delivering&&!track.delivered;
  if(isDel&&!wasDelivering){if(Date.now()>manualPanUntil)mapInst.setView([visualDriverLat||filteredLat,visualDriverLng||filteredLng],15,{animate:true});wasDelivering=true}
  else if(isDel&&(lastDriverLat===null||haversine(lastDriverLat,lastDriverLng,dl.lat,dl.lng)>6)){if(Date.now()>manualPanUntil){mapInst.panTo([visualDriverLat||filteredLat,visualDriverLng||filteredLng],{animate:true,duration:.35});if(mapInst.getZoom()<15)mapInst.setZoom(15)}}
  lastDriverLat=dl.lat;lastDriverLng=dl.lng;
  if(!hadDriverMarker)startDeadReckoning();
  if(!isDel)wasDelivering=false;
  var rb=document.getElementById('map-recenter');
  if(rb)rb.style.display=(isDel||driverMarker)?'block':'none';
  followDriverCamera(routePoint.lat,routePoint.lng);
  if(custMarker&&routeShouldRefresh(filteredLat,filteredLng)){
   routeNeeded=false;
   var c=custMarker.getLatLng();
   fetchRoute(filteredLat,filteredLng,c.lat,c.lng);
  }
  if(custMarker){var ca=custMarker.getLatLng();checkArrival(filteredLat,filteredLng,ca.lat,ca.lng)}
 }
}

function noteServerDriverPosition(dl,raw){
 var now=Date.now();
 var moved=lastDriverLat===null?0:haversine(lastDriverLat,lastDriverLng,dl.lat,dl.lng);
 var seconds=lastServerPointTime?Math.max(.25,(now-lastServerPointTime)/1000):0;
 var rawHeading=raw&&Number(raw.heading);
 var rawSpeed=raw&&Number(raw.speed);
 if(Number.isFinite(rawHeading))driverHeading=rawHeading;
 else if(lastDriverLat!==null&&moved>1.5)driverHeading=bearingBetween(lastDriverLat,lastDriverLng,dl.lat,dl.lng);
 setTargetHeading(driverHeading===null?0:driverHeading);
 deadReckonSpeed=Number.isFinite(rawSpeed)&&rawSpeed>.8?rawSpeed:(seconds&&moved>2?Math.min(18,moved/seconds):0);
 lastGPSTime=now;
 lastServerPointTime=now;
}

function startDeadReckoning(){
 // Project the driver marker between real position updates so it glides instead of jumping.
 if(deadReckonTimer)cancelAnimationFrame(deadReckonTimer);
 if(!driverMarker||!mapInst){deadReckonTimer=null;return}
 var baseLat=visualDriverLat!==null?visualDriverLat:lastDriverLat;
 var baseLng=visualDriverLng!==null?visualDriverLng:lastDriverLng;
 if(baseLat===null||baseLng===null){deadReckonTimer=null;return}
 var baseTime=Date.now();
 var baseHeading=driverHeading;
 var baseSpeed=deadReckonSpeed;
 function tick(){
  if(!driverMarker||!mapInst||!baseSpeed||baseSpeed<0.8){deadReckonTimer=null;return}
  var age=(Date.now()-baseTime)/1000;
  if(age>8){deadReckonTimer=null;return}
  var pos=pointAhead(baseLat,baseLng,baseHeading,baseSpeed*age);
  var visual=snapToRoute(pos.lat,pos.lng);
  visualDriverLat=visual.lat;
  visualDriverLng=visual.lng;
  driverMarker.setLatLng([visual.lat,visual.lng]);
  trimRouteToProgress(visual.lat,visual.lng);
  followDriverCamera(visual.lat,visual.lng);
  deadReckonTimer=requestAnimationFrame(tick);
 }
 deadReckonTimer=requestAnimationFrame(tick);
}

function setMarkerSignalLoss(lost){
 // Signal loss fades the marker and pulses the accuracy ring.
 var el=driverMarker&&driverMarker.getElement&&driverMarker.getElement();
 if(!el)return;
 el.style.opacity=lost?'0.4':'1';
 el.style.transition='opacity 0.6s';
 if(el.classList)el.classList.toggle('signal-lost',!!lost);
}

function checkSignalLoss(){
 if(!lastServerPointTime)return;
 setMarkerSignalLoss(Date.now()-lastServerPointTime>5000);
}

function startSignalWatch(){
 if(signalTimer)return;
 signalTimer=setInterval(checkSignalLoss,2000);
}

function checkArrival(dLat,dLng,cLat,cLng){
 // Arrival mode flattens and recenters once the driver reaches the customer.
 if(!mapInst||arrivalTriggered||haversine(dLat,dLng,cLat,cLng)>50)return;
 arrivalTriggered=true;
 mapInst.setView([cLat,cLng],18,{animate:true});
}

function animateDriverMarker(lat,lng){
 if(!driverMarker)return;
 if(driverAnim)cancelAnimationFrame(driverAnim);
 if(deadReckonTimer)cancelAnimationFrame(deadReckonTimer);
 driverAnim=null;
 deadReckonTimer=null;
 var snappedTarget={lat:lat,lng:lng};
 var domPos=driverMarker.getLatLng();
 var startLat=domPos.lat;
 var startLng=domPos.lng;
 var startTime=performance.now();
 var dist=haversine(startLat,startLng,snappedTarget.lat,snappedTarget.lng);
 var duration=Math.min(900,Math.max(400,dist*12));
 function tick(now){
  var t=Math.min(1,(now-startTime)/duration);
  var e=1-Math.pow(1-t,3);
  var curLat=startLat+(snappedTarget.lat-startLat)*e;
  var curLng=startLng+(snappedTarget.lng-startLng)*e;
  driverMarker.setLatLng([curLat,curLng]);
  visualDriverLat=curLat;
  visualDriverLng=curLng;
  trimRouteToProgress(curLat,curLng);
  if(t>.85)followDriverCamera(curLat,curLng);
  if(t<1)driverAnim=requestAnimationFrame(tick);
  else{
   driverAnim=null;
   visualDriverLat=snappedTarget.lat;
   visualDriverLng=snappedTarget.lng;
   followDriverCamera(snappedTarget.lat,snappedTarget.lng);
   startDeadReckoning();
  }
 }
 driverAnim=requestAnimationFrame(tick);
}

function routeLatLngs(coords){
 return (coords||[]).map(function(c){return[c[1],c[0]]});
}

function setRouteLine(coords){
 if(!mapInst||!coords||coords.length<2)return;
 var latLngs=routeLatLngs(coords);
 if(!routeLine){
  routeLine={
   casing:L.polyline(latLngs,{color:'#fff',weight:10,opacity:.96,lineCap:'round',lineJoin:'round'}).addTo(mapInst),
   main:L.polyline(latLngs,{color:'#4285f4',weight:6,opacity:.98,lineCap:'round',lineJoin:'round'}).addTo(mapInst)
  };
 }else{
  routeLine.casing.setLatLngs(latLngs);
  routeLine.main.setLatLngs(latLngs);
 }
}

async function fetchRoute(dLat,dLng,cLat,cLng){
 var seq=++routeFetchSeq;
 if(routeFetchBusy){
  pendingRoute={dLat:dLat,dLng:dLng,cLat:cLat,cLng:cLng};
  return;
 }
 routeFetchBusy=true;
 pendingRoute=null;
 function finishRoute(){
  routeFetchBusy=false;
  if(pendingRoute){
   var next=pendingRoute;
   pendingRoute=null;
   if(routeShouldRefresh(next.dLat,next.dLng))fetchRoute(next.dLat,next.dLng,next.cLat,next.cLng);
  }
 }
 function drawFallback(){
  if(seq!==routeFetchSeq){finishRoute();return}
  if(!mapInst){finishRoute();return}
  setRouteGeometry({type:'LineString',coordinates:[[dLng,dLat],[cLng,cLat]]});
  setMapDistance(fmtDist(haversine(dLat,dLng,cLat,cLng)));
  lastRouteLat=dLat;
  lastRouteLng=dLng;
  routeLastFetched=Date.now();
  finishRoute();
 }
 var params=dLng+','+dLat+';'+cLng+','+cLat+'?overview=full&geometries=geojson&steps=true&annotations=distance,duration';
 var urls=[
  'https://routing.openstreetmap.de/routed-car/route/v1/driving/'+params,
  'https://router.project-osrm.org/route/v1/driving/'+params
 ];
 for(var i=0;i<urls.length;i++){
  try{
   var res=await fetchRouteAttempt(urls[i],5000);
   if(seq!==routeFetchSeq){finishRoute();return}
   if(!res.ok)throw new Error('Route failed');
   var j=await res.json();
   if(seq!==routeFetchSeq){finishRoute();return}
   if(j.code!=='Ok'||!j.routes||!j.routes[0])throw new Error('No route');
   var route=j.routes[0];
   arrivalTriggered=false;
   fullRouteCoords=null;
   currentRouteCoords=null;
   setRouteGeometry(route.geometry);
   var eta=Math.round(route.duration/60);
   setMapDistance(eta+' min drive');
   lastRouteLat=dLat;
   lastRouteLng=dLng;
   routeLastFetched=Date.now();
   finishRoute();
   return;
  }catch(e){}
 }
 drawFallback();
}

function fetchRouteAttempt(url,timeoutMs){
 var ctrl=new AbortController();
 var timeout=new Promise(function(_,reject){
  setTimeout(function(){try{ctrl.abort()}catch(e){}reject(new Error('Route timeout'))},timeoutMs);
 });
 return Promise.race([fetch(url,{cache:'no-store',signal:ctrl.signal}),timeout]);
}

function setRouteGeometry(geometry){
 if(!mapInst)return;
 if(geometry&&geometry.coordinates){
  currentRouteCoords=geometry.coordinates;
  fullRouteCoords=geometry.coordinates;
 }
 if(geometry&&geometry.coordinates)setRouteLine(geometry.coordinates);
}

async function load(){
 if(loadBusy)return;
 loadBusy=true;
 var id=TRACK_PARAMS.get('id');
 if(!id){showError('No order ID. Use: /track/?id=ORD-123');loadBusy=false;return}
 var ctrl=new AbortController(),tmr=setTimeout(function(){ctrl.abort()},10000);
 try{
  var res=await fetch(W+'/track/'+encodeURIComponent(id),{signal:ctrl.signal,cache:'no-store',headers:{'X-Track-Token':TRACK_TOKEN}});
  clearTimeout(tmr);
  if(!res.ok){var e=await res.json().catch(function(){return{}});throw new Error(e.error||'Order not found')}
  var j=await res.json();
  if(!j.ok)throw new Error(j.error||'Invalid response');
  setReconnecting(false);
  var o=j.data,track=o.tracking||{};
  currentOrderId=o.id||id;
  currentOrderGPS=o.gps||currentOrderGPS;
  var trackingJSON=JSON.stringify(track);
   if(track.delivered&&Date.now()-new Date(track.delivered).getTime()>600000){
    closeCustomerWS();
    document.getElementById('content').innerHTML='\x3Cdiv class="error-card"\x3E\x3Cdiv class="emoji"\x3E🍽️\x3C/div\x3E\x3Cdiv class="msg"\x3EOrder delivered — tracking expired\x3C/div\x3E\x3C/div\x3E';
    document.getElementById('map-area').innerHTML='';return;
  }
  var previousTrackingJSON=lastTrackingJSON;
  if(trackingJSON!==lastTrackingJSON){
   lastTrackingJSON=trackingJSON;
   document.getElementById('content').innerHTML=buildHTML(o,track);
   if(previousTrackingJSON!==null&&document.visibilityState!=='visible'){
    playStatusUpdateSound();
     startTitleFlash();
    }
   }
   hasLoadedOrder=true;
   if(o.orderType==='delivery'){
   if(track.delivering){
    lastPositionSource='poll';
    if(ensureMapReady(track,o.gps))updateMap(track,o.gps);
   }else{
    if(mapInst)resetMapState();
    document.getElementById('map-area').innerHTML=buildMapPlaceholder();
   }
   if(track.delivering&&!track.delivered){customerWSReconnect=true;if(mapInst)connectCustomerWS(currentOrderId);else pendingWSConnect=true}
    if(track.delivered)closeCustomerWS();
   }
  }catch(e){
   clearTimeout(tmr);
   setReconnecting(true);
   if(hasLoadedOrder){
    var status=document.querySelector('.last-updated');
    if(status){status.textContent=friendlyError(e)+' — showing last known status';status.style.color='#f59e0b'}
   }else{
    showError(friendlyError(e));
   }
  }finally{
  loadBusy=false;
 }
}

function startRefresh(){clearInterval(autoRefresh);autoRefresh=setInterval(load,TRACK_REFRESH_MS);}
window.addEventListener('offline',function(){clearInterval(autoRefresh)});
window.addEventListener('online',function(){load();startRefresh()});
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'){stopTitleFlash();load();startRefresh()}});
window.addEventListener('focus',stopTitleFlash);
startSignalWatch();
load();
startRefresh();
})();
</script>
</body>
</html>
