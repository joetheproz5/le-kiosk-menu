backend:
  name: git-gateway
  branch: main

media_folder: "menupictures"

collections:
  - name: "menu"
    label: "Menu Items"
    folder: "_menu"
    create: true
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Description", name: "desc", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Category", name: "category", widget: "select", options: ["appetizers","sandwiches","Burgers","sajj","desserts","shisha","beverages"] }
