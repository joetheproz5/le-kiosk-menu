<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kiosk — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-200: #fde68a;
            --amber-400: #fbbf24; --amber-500: #f59e0b; --amber-700: #b45309;
            --amber-800: #92400e; --amber-900: #78350f; --amber-950: #451a03;
            --green-500: #22c55e; --green-600: #16a34a;
            --red-400: #f87171; --red-500: #ef4444; --red-600: #dc2626;
            --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
            --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
            --gray-600: #4b5563; --gray-800: #1f2937; --gray-900: #111827;
            --white: #ffffff;
            --font: 'Poppins', sans-serif;
            --brand: 'Fredoka', sans-serif;
        }

        body {
            font-family: var(--font);
            background: #fcf8ee;
            background-image: linear-gradient(#f7f1e1 1.5px, transparent 1.5px), linear-gradient(90deg, #f7f1e1 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            min-height: 100vh;
            color: var(--amber-950);
        }

        /* ── LOGIN SCREEN ── */
        #login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--white);
            border: 1px solid var(--amber-200);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(120,53,15,0.08);
            text-align: center;
        }
        .login-logo {
            font-family: var(--brand);
            font-size: 32px;
            font-weight: 700;
            color: var(--amber-900);
            letter-spacing: 0.05em;
        }
        .login-sub {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--amber-700);
            margin-top: 2px;
            margin-bottom: 32px;
        }
        .login-label {
            display: block;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--amber-800);
            margin-bottom: 6px;
        }
        .login-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--amber-200);
            border-radius: 12px;
            font-family: var(--font);
            font-size: 14px;
            background: var(--amber-50);
            color: var(--amber-950);
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        .login-input:focus { border-color: var(--amber-500); }
        .login-btn {
            width: 100%;
            background: var(--amber-900);
            color: var(--amber-100);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .login-btn:hover { background: var(--amber-800); }
        .login-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--red-600);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .login-error.show { display: block; }

        /* ── ADMIN SHELL ── */
        #admin-screen { display: none; }

        header.admin-header {
            background: var(--amber-900);
            color: var(--amber-100);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(120,53,15,0.15);
        }
        .header-brand {
            font-family: var(--brand);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .header-brand span {
            font-family: var(--font);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.65;
            margin-left: 8px;
        }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        .btn {
            padding: 9px 18px;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-save { background: var(--amber-400); color: var(--amber-950); }
        .btn-save:hover:not(:disabled) { background: var(--amber-200); }
        .btn-logout { background: rgba(255,255,255,0.12); color: var(--amber-100); }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        /* ── STATUS TOAST ── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--gray-900);
            color: #fff;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 999;
            transition: transform 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { background: var(--green-600); }
        #toast.error { background: var(--red-600); }

        /* ── SETUP BANNER ── */
        #setup-banner {
            background: var(--amber-100);
            border-bottom: 1px solid var(--amber-200);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        #setup-banner p { font-size: 13px; color: var(--amber-900); flex: 1; min-width: 200px; }
        #setup-banner p strong { font-weight: 700; }
        .token-input-wrap { display: flex; gap: 8px; align-items: center; }
        #token-input {
            padding: 8px 12px;
            border: 1.5px solid var(--amber-300);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 13px;
            background: var(--white);
            color: var(--amber-950);
            outline: none;
            width: 260px;
        }
        #token-input:focus { border-color: var(--amber-500); }
        .btn-token { background: var(--amber-900); color: var(--amber-100); padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; border: none; cursor: pointer; }
        .btn-token:hover { background: var(--amber-800); }
        .token-status { font-size: 12px; font-weight: 600; }
        .token-status.ok { color: var(--green-600); }
        .token-status.missing { color: var(--red-500); }

        /* ── MAIN CONTENT ── */
        .admin-body { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }

        /* ── SECTION ── */
        .section-block {
            background: var(--white);
            border: 1px solid var(--amber-200);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(120,53,15,0.05);
        }
        .section-header {
            background: var(--amber-950);
            color: var(--amber-100);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-header h2 {
            font-family: var(--brand);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .section-count {
            font-size: 11px;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.06em;
        }

        /* ── ITEM CARD ── */
        .item-card {
            border-bottom: 1px solid var(--amber-100);
            padding: 16px 20px;
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 16px;
            align-items: start;
        }
        .item-card:last-child { border-bottom: none; }
        .item-thumb {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--amber-100);
            background: var(--amber-50);
            flex-shrink: 0;
        }
        .item-thumb-placeholder {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            background: var(--amber-50);
            border: 1px solid var(--amber-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .item-fields { display: flex; flex-direction: column; gap: 8px; }
        .field-row { display: grid; grid-template-columns: 1fr 120px; gap: 8px; }
        .field-full { grid-column: 1 / -1; }
        .field-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--amber-700);
            margin-bottom: 3px;
        }
        .field-input {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--amber-100);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 13px;
            color: var(--amber-950);
            background: var(--amber-50);
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .field-input:focus { border-color: var(--amber-400); background: var(--white); }
        textarea.field-input { resize: vertical; min-height: 60px; line-height: 1.5; }
        .banner-field {
            padding: 12px 20px;
            border-top: 1px dashed var(--amber-200);
            background: var(--amber-50);
        }
        .banner-field .field-label { color: var(--amber-600); }

        /* Addon card */
        .addon-card {
            border-bottom: 1px solid var(--amber-100);
            padding: 16px 20px;
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 14px;
            align-items: start;
        }
        .addon-card:last-child { border-bottom: none; }
        .addon-emoji {
            font-size: 28px;
            line-height: 1;
            padding-top: 4px;
        }
        .addon-fields { display: flex; flex-direction: column; gap: 8px; }
        .addon-row { display: grid; grid-template-columns: 1fr 100px; gap: 8px; }

        /* ── LOADING OVERLAY ── */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(252,248,238,0.85);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #loading-overlay.show { display: flex; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--amber-200);
            border-top-color: var(--amber-900);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: var(--brand);
            font-size: 18px;
            color: var(--amber-900);
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading menu…</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">Le Kiosk</div>
        <div class="login-sub">Admin Panel</div>
        <label class="login-label" for="pw-input">Password</label>
        <input class="login-input" type="password" id="pw-input" placeholder="Enter admin password" autocomplete="current-password">
        <button class="login-btn" onclick="tryLogin()">Sign In</button>
        <div class="login-error" id="login-error">Wrong password. Try again.</div>
    </div>
</div>

<!-- ══════════════ ADMIN SCREEN ══════════════ -->
<div id="admin-screen">
    <header class="admin-header">
        <div>
            <span class="header-brand">Le Kiosk <span>Menu CMS</span></span>
        </div>
        <div class="header-actions">
            <button class="btn btn-save" id="save-btn" onclick="saveMenu()" disabled>💾 Save to GitHub</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- TOKEN SETUP BANNER -->
    <div id="setup-banner">
        <p><strong>GitHub Token</strong> — needed to save changes. Create one at github.com/settings/tokens with <em>Contents: read & write</em> for this repo.</p>
        <div class="token-input-wrap">
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            <button class="btn-token" onclick="saveToken()">Save Token</button>
            <span class="token-status" id="token-status"></span>
        </div>
    </div>

    <div class="admin-body" id="editor-root"></div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG — change password here
// ══════════════════════════════════════════════
const ADMIN_PASSWORD = 'lekiosk2024';  // ← change this
const REPO_OWNER     = 'joetheproz5';
const REPO_NAME      = 'le-kiosk-menu';
const MENU_FILE_PATH = 'menu.json';
const GITHUB_API     = 'https://api.github.com';

// ── State ──
let menuData = [];
let fileSha  = null; // GitHub needs the current SHA to update a file

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
function tryLogin() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        initAdmin();
    } else {
        document.getElementById('login-error').classList.add('show');
    }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
});
function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('pw-input').value = '';
}

// ══════════════════════════════════════════════
// GITHUB TOKEN MANAGEMENT
// ══════════════════════════════════════════════
function getToken() { return localStorage.getItem('lk_gh_token') || ''; }
function saveToken() {
    const t = document.getElementById('token-input').value.trim();
    if (!t) return;
    localStorage.setItem('lk_gh_token', t);
    document.getElementById('token-input').value = '';
    updateTokenStatus();
    showToast('Token saved', 'success');
}
function updateTokenStatus() {
    const el = document.getElementById('token-status');
    const saveBtn = document.getElementById('save-btn');
    if (getToken()) {
        el.textContent = '✓ Token saved';
        el.className = 'token-status ok';
        saveBtn.disabled = false;
    } else {
        el.textContent = '✗ No token';
        el.className = 'token-status missing';
        saveBtn.disabled = true;
    }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function initAdmin() {
    updateTokenStatus();
    showLoading('Loading menu…');
    try {
        await fetchMenu();
        renderEditor();
    } catch(e) {
        showToast('Failed to load menu.json: ' + e.message, 'error');
    }
    hideLoading();
}

// ══════════════════════════════════════════════
// FETCH menu.json FROM GITHUB
// ══════════════════════════════════════════════
async function fetchMenu() {
    const url = `${GITHUB_API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/${MENU_FILE_PATH}`;
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (getToken()) headers['Authorization'] = `Bearer ${getToken()}`;

    const res = await fetch(url, { headers });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const data = await res.json();
    fileSha  = data.sha;
    menuData = JSON.parse(atob(data.content.replace(/\n/g, '')));
}

// ══════════════════════════════════════════════
// SAVE menu.json TO GITHUB
// ══════════════════════════════════════════════
async function saveMenu() {
    if (!getToken()) { showToast('No GitHub token set', 'error'); return; }
    collectFormData();

    showLoading('Saving to GitHub…');
    try {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(menuData, null, 2))));
        const url = `${GITHUB_API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/${MENU_FILE_PATH}`;
        const res = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${getToken()}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                message: 'Update menu via Admin CMS',
                content,
                sha: fileSha
            })
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || res.status);
        }
        const saved = await res.json();
        fileSha = saved.content.sha;
        showToast('Menu saved! Live in ~30 seconds ✓', 'success');
    } catch(e) {
        showToast('Save failed: ' + e.message, 'error');
    }
    hideLoading();
}

// ══════════════════════════════════════════════
// COLLECT FORM → menuData
// ══════════════════════════════════════════════
function collectFormData() {
    menuData.forEach((section, si) => {
        if (section.type === 'addons') {
            section.addonGroups.forEach((grp, gi) => {
                grp.label = val(`addon-label-${si}-${gi}`);
                grp.price = val(`addon-price-${si}-${gi}`);
                grp.note  = val(`addon-note-${si}-${gi}`);
                const optsRaw = val(`addon-options-${si}-${gi}`);
                grp.options = optsRaw.split(',').map(s => s.trim()).filter(Boolean);
            });
        } else {
            if (section.bottomBanner !== undefined) {
                section.bottomBanner = val(`banner-${si}`);
            }
            section.items.forEach((item, ii) => {
                item.name  = val(`item-name-${si}-${ii}`);
                item.price = val(`item-price-${si}-${ii}`);
                item.desc  = val(`item-desc-${si}-${ii}`);
                if (item.flavors) {
                    const raw = val(`item-flavors-${si}-${ii}`);
                    item.flavors = raw.split(',').map(s => s.trim()).filter(Boolean);
                }
            });
        }
    });
}

function val(id) {
    const el = document.getElementById(id);
    return el ? el.value : '';
}

// ══════════════════════════════════════════════
// RENDER EDITOR
// ══════════════════════════════════════════════
function renderEditor() {
    const root = document.getElementById('editor-root');
    root.innerHTML = menuData.map((section, si) => renderSection(section, si)).join('');
}

function renderSection(section, si) {
    const count = section.type === 'addons'
        ? `${section.addonGroups.length} add-on${section.addonGroups.length !== 1 ? 's' : ''}`
        : `${section.items.length} item${section.items.length !== 1 ? 's' : ''}`;

    let body = '';
    if (section.type === 'addons') {
        body = section.addonGroups.map((grp, gi) => renderAddon(grp, si, gi)).join('');
    } else {
        body = section.items.map((item, ii) => renderItem(item, si, ii)).join('');
        if (section.bottomBanner !== undefined) {
            body += `<div class="banner-field">
                <div class="field-label">🔖 Bottom Banner</div>
                <input class="field-input" type="text" id="banner-${si}" value="${esc(section.bottomBanner)}">
            </div>`;
        }
    }

    return `<div class="section-block">
        <div class="section-header">
            <h2>${section.title}</h2>
            <span class="section-count">${count}</span>
        </div>
        ${body}
    </div>`;
}

function renderItem(item, si, ii) {
    const imgSrc = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${item.image}`;
    const thumb = item.image
        ? `<img class="item-thumb" src="${imgSrc}" alt="${esc(item.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
    const placeholder = `<div class="item-thumb-placeholder" ${item.image ? 'style="display:none"' : ''}>🍽️</div>`;

    const flavorsField = item.flavors
        ? `<div>
            <div class="field-label">Flavors / Options <span style="font-weight:400;opacity:0.7">(comma-separated)</span></div>
            <input class="field-input" type="text" id="item-flavors-${si}-${ii}" value="${esc(item.flavors.join(', '))}">
           </div>`
        : '';

    return `<div class="item-card">
        <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
            ${thumb}
            ${placeholder}
        </div>
        <div class="item-fields">
            <div class="field-row">
                <div>
                    <div class="field-label">Name</div>
                    <input class="field-input" type="text" id="item-name-${si}-${ii}" value="${esc(item.name)}">
                </div>
                <div>
                    <div class="field-label">Price</div>
                    <input class="field-input" type="text" id="item-price-${si}-${ii}" value="${esc(item.price)}">
                </div>
            </div>
            <div>
                <div class="field-label">Description</div>
                <textarea class="field-input" id="item-desc-${si}-${ii}">${esc(item.desc)}</textarea>
            </div>
            ${flavorsField}
        </div>
    </div>`;
}

function renderAddon(grp, si, gi) {
    return `<div class="addon-card">
        <div class="addon-emoji">${grp.emoji}</div>
        <div class="addon-fields">
            <div class="addon-row">
                <div>
                    <div class="field-label">Label</div>
                    <input class="field-input" type="text" id="addon-label-${si}-${gi}" value="${esc(grp.label)}">
                </div>
                <div>
                    <div class="field-label">Price</div>
                    <input class="field-input" type="text" id="addon-price-${si}-${gi}" value="${esc(grp.price)}">
                </div>
            </div>
            <div>
                <div class="field-label">Note</div>
                <input class="field-input" type="text" id="addon-note-${si}-${gi}" value="${esc(grp.note)}">
            </div>
            <div>
                <div class="field-label">Options <span style="font-weight:400;opacity:0.7">(comma-separated)</span></div>
                <input class="field-input" type="text" id="addon-options-${si}-${gi}" value="${esc(grp.options.join(', '))}">
            </div>
        </div>
    </div>`;
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (type ? ' '+type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3500);
}

// ══════════════════════════════════════════════
// LOADING
// ══════════════════════════════════════════════
function showLoading(msg) {
    document.getElementById('loading-text').textContent = msg || 'Loading…';
    document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('show');
}
</script>
</body>
</html>
