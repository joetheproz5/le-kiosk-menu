<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Driver — Le Kiosk</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;family=Poppins:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070b12;--panel:#101722;--panel2:#151f2d;--line:rgba(255,255,255,.08);--text:#f8fafc;--muted:#8d9aab;--amber:#f59e0b;--green:#22c55e;--blue:#38bdf8;--red:#fb7185}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(180deg,rgba(56,189,248,.12),transparent 30%),linear-gradient(145deg,rgba(245,158,11,.08),transparent 42%);pointer-events:none}
.container{position:relative;max-width:520px;margin:0 auto;padding:14px 12px 112px}
.top{position:sticky;top:0;z-index:30;margin:-14px -12px 14px;padding:14px 12px 12px;background:rgba(7,11,18,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.brand-dot{width:42px;height:42px;border-radius:14px;background:#fff url('/menupictures/logo.png') center/cover no-repeat;box-shadow:0 10px 28px rgba(0,0,0,.28);flex-shrink:0}
.top-copy{min-width:0;flex:1}.kicker{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}.top h1{font-family:'Fredoka',sans-serif;font-size:25px;line-height:1;color:#fff}.top .badge{font-size:10px;font-weight:900;padding:7px 10px;border-radius:999px;background:rgba(34,197,94,.13);color:#86efac;border:1px solid rgba(34,197,94,.25);white-space:nowrap}
.tab-bar{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:14px}.tab-bar button{height:42px;border:0;border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-weight:900;cursor:pointer}.tab-bar button.active{background:#fff;color:#101722}.tab-count{font-size:10px;font-weight:900;margin-left:5px;opacity:.7}
.order-card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:11px;cursor:pointer;box-shadow:0 16px 38px rgba(0,0,0,.18)}.order-card:active{transform:translateY(1px)}.order-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.order-card .name{font-size:17px;font-weight:950;color:#fff;line-height:1.15}.order-card .total{font-size:16px;font-weight:950;color:#fbbf24;white-space:nowrap}.order-card .meta{font-size:12px;font-weight:800;color:#aeb8c6;margin-top:7px;line-height:1.45}.order-card .items-preview{font-size:11px;color:#788596;margin-top:8px;line-height:1.45}
	.empty{text-align:center;padding:72px 20px;color:#7d8999}.empty .emoji{font-size:44px;margin-bottom:12px}.empty .msg{font-size:14px;font-weight:800}
	.pin-card{min-height:78vh;display:flex;align-items:center;justify-content:center;padding:22px}.pin-box{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 24px 70px rgba(0,0,0,.28)}.pin-title{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:800;color:#fff}.pin-copy{font-size:12px;font-weight:750;color:var(--muted);line-height:1.45;margin:5px 0 16px}.pin-input{width:100%;height:48px;border-radius:12px;border:1px solid var(--line);background:#070b12;color:#fff;font-size:20px;font-weight:900;text-align:center;letter-spacing:.2em;outline:none}.pin-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.16)}.pin-btn{width:100%;height:46px;border:0;border-radius:12px;background:var(--amber);color:#111827;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.06em;margin-top:12px;cursor:pointer}.pin-error{display:none;margin-top:10px;color:#fecdd3;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.24);border-radius:10px;padding:9px 10px;font-size:12px;font-weight:800}.pin-error.show{display:block}
	.back-btn{height:40px;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0 13px;gap:5px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin:2px 0 12px}
.gps-bar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;background:var(--panel);border:1px solid var(--line);margin-bottom:12px;cursor:pointer}.gps-bar.active{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35)}.gps-dot{width:11px;height:11px;border-radius:50%;background:#64748b;box-shadow:0 0 0 6px rgba(100,116,139,.12)}.gps-bar.active .gps-dot{background:var(--green);animation:pulse2 1.4s infinite}.gps-text{font-size:12px;font-weight:900;color:#cbd5e1}.gps-coords{font-size:10px;font-weight:800;color:#7f8ea1;text-align:right}.gps-weak{border-color:rgba(251,113,133,.45)!important;background:rgba(251,113,133,.1)!important}.gps-weak .gps-text{color:#fecdd3!important}@keyframes pulse2{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}70%{box-shadow:0 0 0 9px rgba(34,197,94,0)}}
.map-card{position:relative;background:#0a0f17;border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-bottom:12px;box-shadow:0 24px 60px rgba(0,0,0,.28)}.map-head{position:absolute;left:10px;right:10px;top:10px;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:8px;pointer-events:none}.map-title,.map-distance,.map-chip{height:32px;display:inline-flex;align-items:center;border-radius:999px;padding:0 11px;background:rgba(7,11,18,.78);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);font-size:11px;font-weight:950;color:#fff}.map-distance{color:#bbf7d0}.map-actions{display:flex;align-items:center;gap:7px}.nav-btn{height:32px;border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(255,255,255,.92);color:#0f172a;font-size:10px;font-weight:950;text-transform:uppercase;letter-spacing:.04em;padding:0 10px;cursor:pointer;pointer-events:auto}.compass-btn{position:absolute;left:10px;top:52px;z-index:3;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.94);box-shadow:0 8px 24px rgba(0,0,0,.24);display:grid;place-items:center;cursor:pointer}.compass-btn svg{width:22px;height:22px}.compass-needle{transform-origin:12px 12px;transition:transform .16s ease}.compass-btn.north-up{background:rgba(7,11,18,.86)}
#map{height:330px;width:100%;transition:height .25s ease}.map-card.delivering #map{height:min(68vh,620px);min-height:460px}.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right{display:none}.driver-heading{width:36px;height:36px;border-radius:50%;background:#22c55e;border:3px solid #fff;box-shadow:0 0 0 8px rgba(34,197,94,.22),0 8px 24px rgba(0,0,0,.42);position:relative;will-change:transform}.driver-heading.signal-lost{animation:signalPulse 1.4s infinite}.driver-heading .tip{position:absolute;left:50%;top:-10px;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:14px solid #22c55e;filter:drop-shadow(0 -1px 0 #fff)}.driver-heading .core{position:absolute;inset:9px;border-radius:50%;background:#dcfce7}@keyframes signalPulse{0%,100%{box-shadow:0 0 0 8px rgba(34,197,94,.18),0 8px 24px rgba(0,0,0,.42)}50%{box-shadow:0 0 0 20px rgba(34,197,94,0),0 8px 24px rgba(0,0,0,.42)}}
.detail-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:12px}.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.order-id{font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#7f8ea1}.order-type{font-size:10px;font-weight:950;padding:5px 9px;border-radius:999px;background:rgba(245,158,11,.14);color:#fbbf24;border:1px solid rgba(245,158,11,.18)}.customer-name{font-size:22px;font-weight:950;color:#fff;margin-bottom:5px;line-height:1.1}.customer-info{font-size:12px;font-weight:750;color:#9aa7b8;line-height:1.45;margin-bottom:10px}.customer-info span{color:#e5e7eb}.driver-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.stat{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:13px;padding:9px}.stat-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#7f8ea1}.stat-value{margin-top:3px;font-size:13px;font-weight:950;color:#fff}.items-list{display:flex;flex-direction:column;gap:5px;margin:12px 0;padding:10px;background:rgba(255,255,255,.04);border-radius:12px}.item-row{display:grid;grid-template-columns:28px 1fr auto;gap:8px;font-size:13px;font-weight:750;color:#d1d5db}.item-row .qty{color:#7f8ea1}.item-addon{font-size:11px;color:#7f8ea1;padding-left:36px}.total-row{display:flex;justify-content:space-between;font-size:17px;font-weight:950;color:#fbbf24;padding-top:10px;border-top:1px solid var(--line)}.warn{font-size:11px;font-weight:850;color:#fbbf24;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);padding:9px 11px;border-radius:12px;margin-bottom:10px;text-align:center}
.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}.action-btn{height:56px;border-radius:15px;border:0;font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.05em;cursor:pointer}.action-btn.delivering{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.action-btn.delivered{background:linear-gradient(135deg,#22c55e,#059669);color:#052e16}.action-btn:disabled{opacity:.45;cursor:not-allowed}.action-btn.done{background:rgba(255,255,255,.08);color:#9ca3af}.sticky-delivered{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 12px 14px;background:linear-gradient(180deg,transparent,rgba(7,11,18,.92) 30%);pointer-events:none}.sticky-delivered-inner{max-width:520px;margin:0 auto;pointer-events:auto}.sticky-delivered .action-btn{width:100%;box-shadow:0 18px 44px rgba(34,197,94,.28)}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(110px);background:#111827;color:#fff;padding:11px 18px;border-radius:12px;font-size:12px;font-weight:800;z-index:100;transition:transform .25s;box-shadow:0 16px 40px rgba(0,0,0,.4);border:1px solid var(--line)}.toast.show{transform:translateX(-50%) translateY(0)}.toast.ok{background:#047857}.last-updated{text-align:center;font-size:10px;color:#556274;margin-top:16px}
@media(min-width:860px){.container{max-width:980px}.driver-detail-shell{display:grid;grid-template-columns:minmax(0,1.25fr) 360px;gap:14px;align-items:start}.map-card{position:sticky;top:72px}.map-card.delivering #map{height:calc(100vh - 112px);min-height:560px}.detail-side{position:sticky;top:72px}.sticky-delivered-inner{max-width:980px}.sticky-delivered .action-btn{max-width:360px;margin-left:auto;display:block}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
<script>
(function(){
	var W='https://lekiosk-order-inbox.lekiosklb.workers.dev';
	var RLAT=33.821091, RLNG=35.564961;
	var ACTIVE_DELIVERY_KEY='lk_driver_active_delivery_v1';
	var DELIVERED_CACHE_KEY='lk_driver_delivered_orders_v1';
	var DRIVER_PIN_KEY='lk_driver_pin_v1';
	var DRIVER_TOKEN_KEY='lk_driver_tokens_v1';
var FOLLOW_AHEAD_METERS=90, LOCATION_SEND_MS=900;
var GPS_MAX_ACCURACY=160, GPS_JUMP_SPEED=45, GPS_HARD_JUMP=220;
var FOLLOW_MIN_MOVE=12, FOLLOW_MIN_TURN=20;
var DRIVER_REFRESH_MS=2500;
var orderData=null, mapInst=null, driverMarker=null, custMarker=null, routeLine=null;
var watchId=null, gpsPollTimer=null, gpsWatchdogTimer=null, slowSpeedSince=null, gpsMode='watch', gpsForceLocked=false, lastSent=0, gpsActive=false, driverLat=null, driverLng=null, filteredDriverLat=null, filteredDriverLng=null, visualDriverLat=null, visualDriverLng=null, pendingVisualLat=null, pendingVisualLng=null, driverHeading=null, displayedHeading=null, lastGoodLat=null, lastGoodLng=null, lastMoveAt=0, gpsAccuracy=null, lastGPSAt=0, deadReckonTimer=null, lastGPSTime=null, lastAcceptedGPSAt=null, deadReckonSpeed=0, targetHeading=0, animatedHeading=0, headingAnimStarted=false, headingUpMode=true, driverSpeed=0, currentZoom=17, currentPitch=0;
var autoRefresh=null;
var listTab='pending';
var allOrders=[];
var markingStep=null;
var firstMapDone=false, routeLastFetched=0, routeNeeded=true, lastRouteLat=null, lastRouteLng=null, currentRouteCoords=null, routeFetchSeq=0, routeDrawTimer=null, turnZoomActive=false, turnZoomTimer=null, lastTurnCheckAt=0, lastTurnAngle=0, arrivalTriggered=false, signalTimer=null, lastTrimLat=null, lastTrimLng=null;
var ROUTE_REFRESH_MS=12000, ROUTE_REFRESH_METERS=18, ROUTE_OFFROUTE_METERS=35, ROUTE_SNAP_METERS=28, ROUTE_HEADING_METERS=32;
var wakeLock=null, loadBusy=false, lastDetailLoaded=false, lastListLoaded=false, followTimer=null, lastFollowLat=null, lastFollowLng=null, lastFollowHeading=null, manualRecenterUntil=0, lastTrackingJSON=null;
var knownOrderIds=null, alertAudioCtx=null, alertAudioUnlocked=false, lastOrderAlertAt=0;
var driverWS=null, driverWSOrderId=null, wsReconnectTimer=null, wsPingTimer=null, lastETAMinutes=null;
var PENDING_ACTIONS_KEY='lk_driver_pending_actions';
var gpsErrorRetryTimer=null, lastGPSErrorAt=0;

/* shared util */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/\x3C/g,'&lt;').replace(/>/g,'&gt;');}
/* shared util */
function money(n){return'$'+(Number(n)||0).toFixed(2);}
function toast(msg,ok){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(ok?' ok':'');clearTimeout(toast.tid);toast.tid=setTimeout(function(){t.className='toast'},3000);}
function friendlyError(e){
 if(!navigator.onLine)return'No internet connection';
 if(e&&e.name==='AbortError')return'Request timed out — retrying';
 return'Something went wrong. Please retry.';
}
function setReconnecting(active){
 document.querySelectorAll('.last-updated').forEach(function(el){
  el.textContent=active?'Reconnecting…':'Auto-refreshing…';
  el.style.color=active?'#f59e0b':'';
 });
}
	function isNetworkError(e){
	 return !navigator.onLine||(e&&e.name==='AbortError')||/Failed to fetch|NetworkError|Load failed/i.test(String(e&&e.message||e||''));
	}
	function driverPin(){try{return localStorage.getItem(DRIVER_PIN_KEY)||''}catch(e){return''}}
	function saveDriverPin(pin){try{localStorage.setItem(DRIVER_PIN_KEY,String(pin||''))}catch(e){}}
	function clearDriverPin(){try{localStorage.removeItem(DRIVER_PIN_KEY)}catch(e){}}
	function driverHeaders(extra){var h=Object.assign({},extra||{});var pin=driverPin();if(pin)h['X-Driver-Pin']=pin;return h}
	function tokenMap(){try{return JSON.parse(localStorage.getItem(DRIVER_TOKEN_KEY)||'{}')||{}}catch(e){return{}}}
	function saveTokenMap(map){try{localStorage.setItem(DRIVER_TOKEN_KEY,JSON.stringify(map||{}))}catch(e){}}
	function rememberDriverToken(id,token){if(!id||!token)return;var map=tokenMap();map[id]=token;saveTokenMap(map)}
	function driverToken(id){return (orderData&&orderData.id===id&&orderData.driverToken)||tokenMap()[id]||''}
	function authUrl(path,token){return path+(path.indexOf('?')>=0?'&':'?')+'token='+encodeURIComponent(token||'')}
	function renderPinGate(message){
	 document.getElementById('app').innerHTML='\x3Cdiv class="pin-card"\x3E\x3Cdiv class="pin-box"\x3E\x3Cdiv class="pin-title"\x3EDriver PIN\x3C/div\x3E\x3Cdiv class="pin-copy"\x3EEnter the driver PIN to view deliveries.\x3C/div\x3E\x3Cinput class="pin-input" id="driver-pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="one-time-code"\x3E\x3Cbutton class="pin-btn" onclick="D.savePin()"\x3EUnlock Driver\x3C/button\x3E\x3Cdiv class="pin-error'+(message?' show':'')+'" id="driver-pin-error"\x3E'+esc(message||'')+'\x3C/div\x3E\x3C/div\x3E\x3C/div\x3E';
	 setTimeout(function(){var i=document.getElementById('driver-pin-input');if(i){i.focus();i.onkeydown=function(e){if(e.key==='Enter')D.savePin()}}},50);
	}
	function pendingActions(){
	 try{return JSON.parse(localStorage.getItem(PENDING_ACTIONS_KEY)||'[]')||[]}catch(e){return[]}
	}
function savePendingActions(rows){
 try{localStorage.setItem(PENDING_ACTIONS_KEY,JSON.stringify(rows||[]))}catch(e){}
}
	function enqueuePendingAction(orderId,step,token){
	 if(!orderId||!step)return;
	 var rows=pendingActions();
	 rows.push({orderId:orderId,step:step,token:token||driverToken(orderId),time:new Date().toISOString()});
	 savePendingActions(rows);
	}
	function postDriverStatus(orderId,step,token){
	 return fetchJSON(W+'/driver/'+encodeURIComponent(orderId)+'/status',{method:'POST',headers:driverHeaders({'Content-Type':'application/json'}),body:JSON.stringify({step:step,token:token||driverToken(orderId)})},1);
	}
async function drainPendingActions(){
 var rows=pendingActions();
 if(!rows.length)return;
 var kept=[];
 for(var i=0;i<rows.length;i++){
  try{
   var item=rows[i];
	   var j=await postDriverStatus(item.orderId,item.step,item.token);
   if(!j.ok)throw new Error(j.error||'Failed');
  }catch(e){
   kept=rows.slice(i);
   savePendingActions(kept);
   return;
  }
 }
 savePendingActions([]);
}
function isMenuOrder(o){
 if(!o)return false;
 var source=String(o.source||o.channel||'').toLowerCase();
 var id=String(o.id||'').toUpperCase();
 return source==='menu'||source.indexOf('menu')>=0||id.indexOf('MENU-')===0;
}
function deliveredCache(){
 try{return JSON.parse(localStorage.getItem(DELIVERED_CACHE_KEY)||'{}')||{}}catch(e){return{}}
}
function rememberDelivered(id){
 if(!id)return;
 var cache=deliveredCache(),now=Date.now();
 Object.keys(cache).forEach(function(k){if(now-Number(cache[k]||0)>86400000)delete cache[k]});
 cache[id]=now;
 try{localStorage.setItem(DELIVERED_CACHE_KEY,JSON.stringify(cache))}catch(e){}
}
function isDeliveredOrder(o){
 return !!(o&&(o.tracking||{}).delivered)||!!deliveredCache()[String(o&&o.id||'')];
}
function unlockAlertSound(){
 requestNotificationPermission();
 try{
  var AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  if(!alertAudioCtx)alertAudioCtx=new AC();
  if(alertAudioCtx.state==='suspended')alertAudioCtx.resume();
  alertAudioUnlocked=true;
 }catch(e){}
}
function requestNotificationPermission(){
 try{
  if(window.LekioskAndroid&&typeof window.LekioskAndroid.requestNotifications==='function'){
   window.LekioskAndroid.requestNotifications();
   return;
  }
 }catch(e){}
 try{
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
 }catch(e){}
}
function openNotificationSettings(){
 try{
  if(window.LekioskAndroid&&typeof window.LekioskAndroid.openNotificationSettings==='function'){
   window.LekioskAndroid.openNotificationSettings();
  }
 }catch(e){}
}
function beep(freq,start,duration,gain){
 if(!alertAudioCtx)return;
 var osc=alertAudioCtx.createOscillator();
 var vol=alertAudioCtx.createGain();
 osc.type='sine';
 osc.frequency.setValueAtTime(freq,alertAudioCtx.currentTime+start);
 vol.gain.setValueAtTime(0.0001,alertAudioCtx.currentTime+start);
 vol.gain.exponentialRampToValueAtTime(gain,alertAudioCtx.currentTime+start+0.025);
 vol.gain.exponentialRampToValueAtTime(0.0001,alertAudioCtx.currentTime+start+duration);
 osc.connect(vol);
 vol.connect(alertAudioCtx.destination);
 osc.start(alertAudioCtx.currentTime+start);
 osc.stop(alertAudioCtx.currentTime+start+duration+0.03);
}
function sendOrderNotification(order){
 var title='New delivery order';
 var body=(order&&order.name?order.name:'Customer')+(order&&order.total?' · '+money(order.total):'');
 try{
  if(window.LekioskAndroid&&typeof window.LekioskAndroid.notifyNewOrder==='function'){
   window.LekioskAndroid.notifyNewOrder(title,body);
   return;
  }
 }catch(e){}
 try{
  if('Notification' in window&&Notification.permission==='granted'){
   new Notification(title,{body:body,tag:'lekiosk-driver-order',renotify:true});
  }
 }catch(e){}
}
function playOrderAlert(order){
 if(Date.now()-lastOrderAlertAt<1800)return;
 lastOrderAlertAt=Date.now();
 unlockAlertSound();
 try{
  if(alertAudioCtx){
   beep(880,0,0.18,0.22);
   beep(1175,0.22,0.22,0.24);
   beep(988,0.52,0.22,0.2);
  }else{
   toast('New delivery order','ok');
  }
 }catch(e){toast('New delivery order','ok')}
 if(navigator.vibrate)navigator.vibrate([220,90,220,90,320]);
 sendOrderNotification(order);
}
function checkNewOrders(rows){
 var ids=new Set((rows||[]).filter(function(o){return !isDeliveredOrder(o)}).map(function(o){return String(o.id||'')}).filter(Boolean));
 if(knownOrderIds===null){knownOrderIds=ids;return}
 var newOrder=(rows||[]).find(function(o){return !isDeliveredOrder(o)&&o.id&&!knownOrderIds.has(String(o.id))});
 knownOrderIds=ids;
 if(newOrder)playOrderAlert(newOrder);
}

function connectDriverWS(orderId){
  // WebSocket pushes live driver position to the customer map; REST polling remains the fallback.
  if(!orderId||typeof WebSocket==='undefined')return;

// Lightweight Kalman smoothing calms GPS wobble before it reaches the marker/camera.
class KalmanFilter{
 constructor(R,Q){this.R=R===undefined?3:R;this.Q=Q===undefined?.01:Q;this.P=1;this.x=null;this.K=0}
 filter(measurement){
  if(this.x===null){this.x=measurement;return measurement}
  this.P=this.P+this.Q;
  this.K=this.P/(this.P+this.R);
  this.x=this.x+this.K*(measurement-this.x);
  this.P=(1-this.K)*this.P;
  return this.x;
 }
 setR(r){if(Number.isFinite(Number(r))&&Number(r)>0)this.R=Number(r)}
}

/* shared util */
function haversine(lat1,lon1,lat2,lon2){

 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingBetween(lat1,lng1,lat2,lng2){
 var y=Math.sin((lng2-lng1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
 var x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lng2-lng1)*Math.PI/180);
 return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function pointAhead(lat,lng,bearing,meters){

 var R=6371000,d=meters/R,br=Number(bearing)*Math.PI/180,la1=lat*Math.PI/180,ln1=lng*Math.PI/180;
 var la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(br));
 var ln2=ln1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la1),Math.cos(d)-Math.sin(la1)*Math.sin(la2));

async function fetchJSON(url,options,tries){
 var lastErr=null;
 tries=tries||2;
 for(var i=0;i<tries;i++){
  var ctrl=new AbortController();
  var t=setTimeout(function(){ctrl.abort()},10000);
  try{
   var res=await fetch(url,Object.assign({cache:'no-store'},options||{},{signal:ctrl.signal}));
   clearTimeout(t);
   var text=await res.text();
   var data=text?JSON.parse(text):{};
   if(!res.ok)throw new Error(data.error||('Request failed '+res.status));
   return data;
  }catch(e){
   clearTimeout(t);
   lastErr=e;
   if(i<tries-1)await sleep(500+i*700);
  }
 }
 throw lastErr||new Error('Failed to fetch');
}

async function fetchRoute(dLat,dLng,cLat,cLng){
 var seq=++routeFetchSeq;
 function drawFallback(){
  if(seq!==routeFetchSeq)return;
  if(!mapInst)return;
  setRouteGeometry({type:'LineString',coordinates:[[dLng,dLat],[cLng,cLat]]},true);
  var el=document.querySelector('.map-distance');
  if(el)el.textContent=(haversine(dLat,dLng,cLat,cLng)/1000).toFixed(1)+' km';
  lastRouteLat=dLat;
  lastRouteLng=dLng;
  routeLastFetched=Date.now();
 }
 try{
  var url='https://router.project-osrm.org/route/v1/driving/'+dLng+','+dLat+';'+cLng+','+cLat+'?overview=full&geometries=geojson&steps=true&annotations=distance,duration';
  var ctrl=new AbortController();
  var routeTimeout=setTimeout(function(){ctrl.abort()},6500);
  var res=await fetch(url,{cache:'no-store',signal:ctrl.signal});
  clearTimeout(routeTimeout);
  if(seq!==routeFetchSeq)return;
  if(!res.ok){drawFallback();return}
  var j=await res.json();
  if(seq!==routeFetchSeq)return;
  if(j.code!=='Ok'||!j.routes||!j.routes[0]){drawFallback();return}
  var route=j.routes[0];
  if(!mapInst)return;
  if(seq!==routeFetchSeq)return;
  arrivalTriggered=false;
  lastTrimLat=null;
  lastTrimLng=null;
  setRouteGeometry(route.geometry,false);
  animateRouteDraw();
  currentRouteCoords=(route.geometry&&route.geometry.coordinates)||null;
  var eta=Math.round(route.duration/60);
  lastETAMinutes=eta;
  var el=document.querySelector('.map-distance');
  if(el)el.textContent=eta+' min · '+fmtKm(route.distance);
  lastRouteLat=dLat;
  lastRouteLng=dLng;
  routeLastFetched=Date.now();
 }catch(e){drawFallback()}
}

  var progress=step/steps;

  if(mapInst.getLayer('route-casing'))mapInst.setPaintProperty('route-casing','line-dasharray',[dash,100-dash]);

 el.style.display='flex';
 var kmh=Math.round((speedMs||0)*3.6);
 val.textContent=kmh;

}

function checkArrival(dLat,dLng,cLat,cLng){
 // Arrival mode flattens and recenters once the driver reaches the customer.
 if(!mapInst||arrivalTriggered||haversine(dLat,dLng,cLat,cLng)>50)return;
 arrivalTriggered=true;
 headingUpMode=false;
 disable3DBuildings();
 mapInst.easeTo({center:[cLng,cLat],zoom:18.5,pitch:0,bearing:0,duration:1200,easing:function(t){return 1-Math.pow(1-t,3)}});
 updateCompassNeedle();
}

function updateMapView(track,gps){
 if(!mapInst)return;
 sync3DBuildings(track);
 var serverPoint=pointFromGPS(track&&track.driverLocation);
 if(serverPoint&&!driverLat){driverLat=serverPoint.lat;driverLng=serverPoint.lng;visualPointFromRaw(driverLat,driverLng)}
 if(driverLat&&visualDriverLat===null)visualPointFromRaw(driverLat,driverLng);
 var customerPoint=pointFromGPS(gps);
 if(customerPoint)drawCustMarker(customerPoint);
 if(visualDriverLat!==null)drawDriverMarker(visualDriverLat,visualDriverLng);
 if(driverLat&&custMarker){
  var c=custMarker.getLngLat();
  var routeLat=filteredDriverLat===null?driverLat:filteredDriverLat;
  var routeLng=filteredDriverLng===null?driverLng:filteredDriverLng;
  checkArrival(routeLat,routeLng,c.lat,c.lng);
  if(track&&track.delivering&&!track.delivered){
   if(distanceToRouteMeters(routeLat,routeLng)>ROUTE_OFFROUTE_METERS)routeNeeded=true;
   if(routeShouldRefresh(routeLat,routeLng)){
    routeNeeded=false;
    fetchRoute(routeLat,routeLng,c.lat,c.lng);
   }
  }
 }
}

function moveDriver(lat,lng,heading){
 var h=Number(heading);
 var movedFromLast=driverLat===null?999:haversine(driverLat,driverLng,lat,lng);
 var movedFromGood=lastGoodLat===null?999:haversine(lastGoodLat,lastGoodLng,lat,lng);
 if(movedFromLast<0.7&&movedFromGood<1.5)return false;
 if(movedFromGood>=1.5){lastGoodLat=lat;lastGoodLng=lng;lastMoveAt=Date.now()}
 if(Number.isFinite(h)&&movedFromLast>1.5)driverHeading=h;
 else if(driverLat!==null&&movedFromLast>1.5)driverHeading=bearingBetween(driverLat,driverLng,lat,lng);
 setTargetHeading(driverHeading===null?0:driverHeading);
 driverLat=lat;driverLng=lng;
 var visual=visualPointFromRaw(lat,lng);
 var routeHeading=headingFromRoute(visual.lat,visual.lng);
 if(routeHeading!==null)driverHeading=routeHeading;
 setTargetHeading(driverHeading===null?0:driverHeading);
 var routeLat=filteredDriverLat===null?lat:filteredDriverLat;
 var routeLng=filteredDriverLng===null?lng:filteredDriverLng;
 saveActiveDelivery(true);
 if(!mapInst)return;
 drawDriverMarker(visual.lat,visual.lng);
 updateGPSBar();
 if(custMarker){
  var c=custMarker.getLngLat();
  trimRouteToProgress(visual.lat,visual.lng);
  checkArrival(routeLat,routeLng,c.lat,c.lng);
  if(distanceToRouteMeters(routeLat,routeLng)>ROUTE_OFFROUTE_METERS)routeNeeded=true;
  if(routeShouldRefresh(routeLat,routeLng)){
   routeNeeded=false;
   fetchRoute(routeLat,routeLng,c.lat,c.lng);
  }
  followDriver(visual.lat,visual.lng);
 }else{
  followDriver(visual.lat,visual.lng);
 }
 return true;
}

 return gpsForceLocked||!!(orderData&&orderData.tracking&&orderData.tracking.delivering&&!orderData.tracking.delivered);
}

function moveDriverFromPosition(pos){
 var accuracy=Number(pos.coords.accuracy);
 gpsAccuracy=Number.isFinite(accuracy)?accuracy:gpsAccuracy;
 lastGPSAt=Date.now();
 updateGPSBar();
 if(!gpsLooksPlausible(pos.coords.latitude,pos.coords.longitude,accuracy))return false;
 var prevGPSAt=lastGPSTime;
 var prevLat=driverLat,prevLng=driverLng;
 lastGPSTime=lastGPSAt;
 var speed=Number(pos.coords.speed);
 var heading=Number(pos.coords.heading);
 var lat=pos.coords.latitude,lng=pos.coords.longitude;
 var movedRaw=(prevLat===null||prevLng===null)?0:haversine(prevLat,prevLng,lat,lng);
 var seconds=prevGPSAt?Math.max(.25,(lastGPSAt-prevGPSAt)/1000):0;
 driverSpeed=Number.isFinite(speed)&&speed>0?speed:(seconds&&movedRaw>1?Math.min(12,movedRaw/seconds):0);
 updateSpeedometer(driverSpeed);
 updateAdaptiveGPS();
 deadReckonSpeed=driverSpeed>.8?driverSpeed:0;
 // Cap Kalman noise so walking movement does not get over-smoothed into looking frozen.
 var filterNoise=gpsFilterNoise(accuracy);
 kfLat.setR(filterNoise);kfLng.setR(filterNoise);
 var filteredLat=kfLat.filter(lat),filteredLng=kfLng.filter(lng);
 filteredDriverLat=filteredLat;filteredDriverLng=filteredLng;
 var moved=driverLat===null?999:haversine(driverLat,driverLng,filteredLat,filteredLng);
 if(Number.isFinite(speed)&&speed<0.8&&moved<4)heading=NaN;
 pendingVisualLat=filteredLat;pendingVisualLng=filteredLng;
 var accepted=moveDriver(filteredLat,filteredLng,heading);
 if(accepted)lastAcceptedGPSAt=Date.now();
 if(accepted){startDeadReckoning();sendWSUpdate(visualDriverLat,visualDriverLng,lastETAMinutes)}
 return accepted;
}

async function sendLocation(lat,lng){
 try{
	   await fetch(W+'/driver/'+encodeURIComponent(orderData.id)+'/location',{
	   method:'POST',headers:driverHeaders({'Content-Type':'application/json'}),body:JSON.stringify({lat:lat,lng:lng,heading:driverHeading,speed:driverSpeed,accuracy:gpsAccuracy,token:driverToken(orderData.id)})
	  });
  lastSent=Date.now();
 }catch(e){}
}

function handleGPSPosition(pos){
 var accepted=moveDriverFromPosition(pos);
 if(accepted&&Date.now()-lastSent>LOCATION_SEND_MS)sendLocation(filteredDriverLat||pos.coords.latitude,filteredDriverLng||pos.coords.longitude);
}

function handleGPSError(){
  if(Date.now()-lastGPSErrorAt>10000){toast('GPS error — check permissions/location settings');lastGPSErrorAt=Date.now()}
  if(deliveryGPSLocked()){
   gpsActive=true;
   clearTimeout(gpsErrorRetryTimer);
   gpsErrorRetryTimer=setTimeout(function(){gpsErrorRetryTimer=null;sendNow()},4000);
  }else{
   gpsActive=false;
 }
 updateGPSBar();
}

function startWatchGPS(){
 if(!navigator.geolocation||watchId)return;
 gpsMode='watch';
 watchId=navigator.geolocation.watchPosition(handleGPSPosition,handleGPSError,{enableHighAccuracy:true,maximumAge:0,timeout:6000});
}

function switchToPollingGPS(){
 // Adaptive GPS: when stopped, poll every 4s instead of holding a hot watchPosition.
 if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null}
 if(gpsPollTimer)return;
 gpsMode='poll';
 gpsPollTimer=setInterval(sendNow,4000);
}

function resumeWatchGPS(){
 if(gpsPollTimer){clearInterval(gpsPollTimer);gpsPollTimer=null}
 gpsMode='watch';
 if(gpsActive)startWatchGPS();
}

function updateAdaptiveGPS(){
 if(!gpsActive)return;
 if(driverSpeed<1.5){
  if(!slowSpeedSince)slowSpeedSince=Date.now();
  if(Date.now()-slowSpeedSince>8000&&gpsMode!=='poll')switchToPollingGPS();
 }else{
  slowSpeedSince=null;
  if(gpsMode==='poll')resumeWatchGPS();
 }
}

function startGPSWatchdog(){
 // Some phones pause watchPosition at walking speed; this keeps active deliveries moving.
 if(gpsWatchdogTimer)return;
 gpsWatchdogTimer=setInterval(function(){
  if(!gpsActive||!deliveryGPSLocked())return;
  if(Date.now()-lastGPSAt>2500)sendNow();
 },2500);
}

function startGPS(){
 if(!navigator.geolocation){toast('GPS not available');return}
 if(gpsActive){
  startWatchGPS();
  startGPSWatchdog();
  sendNow();
  updateGPSBar();
  return;
 }
 gpsActive=true;
 slowSpeedSince=null;
 saveActiveDelivery(true);
 updateGPSBar();
 sendNow();
 startWatchGPS();
 startGPSWatchdog();
}

function stopGPS(force){
 if(deliveryGPSLocked()&&!force){
  toast('GPS stays on while delivering');
  return;
 }
 if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null}
 if(gpsPollTimer){clearInterval(gpsPollTimer);gpsPollTimer=null}
  if(gpsWatchdogTimer){clearInterval(gpsWatchdogTimer);gpsWatchdogTimer=null}
  if(gpsErrorRetryTimer){clearTimeout(gpsErrorRetryTimer);gpsErrorRetryTimer=null}
 gpsMode='watch';
 slowSpeedSince=null;
 gpsActive=false;
 saveActiveDelivery(false);
  updateGPSBar();
}

function cleanupMap(){
 if(mapInst){try{mapInst.remove()}catch(e){}}
 mapInst=null;driverMarker=null;custMarker=null;routeLine=null;
 firstMapDone=false;
}

function updateGPSBar(){
 var bar=document.getElementById('gps-bar');
 var text=document.getElementById('gps-text');
 var coords=document.getElementById('gps-coords');
 if(!bar||!text)return;
 var q=gpsQuality();
 bar.className='gps-bar'+(gpsActive?' active':'')+(gpsActive?q.cls:'');
 if(gpsActive){text.textContent=deliveryGPSLocked()?'GPS locked for delivery':q.label;if(coords)coords.textContent=q.value}
 else{text.textContent='Tap to share your location';if(coords)coords.textContent=''}
}

function sendNow(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(function(pos){
   if(moveDriverFromPosition(pos))sendLocation(filteredDriverLat||pos.coords.latitude,filteredDriverLng||pos.coords.longitude);
  },handleGPSError,{enableHighAccuracy:true,maximumAge:1000,timeout:8000});
}

window.D={
	 openOrder:function(el){
	  var id=el&&el.getAttribute('data-order-id');
	  var token=el&&el.getAttribute('data-driver-token');
	  if(id)location.href='?id='+encodeURIComponent(id)+(token?'&token='+encodeURIComponent(token):'');
	 },
	 savePin:function(){
	  var input=document.getElementById('driver-pin-input');
	  var pin=input?input.value.trim():'';
	  if(!/^\d{4,8}$/.test(pin)){renderPinGate('Enter a 4-8 digit PIN');return}
	  saveDriverPin(pin);
	  load();
	 },
	 logout:function(){clearDriverPin();renderPinGate('')},
	 switchTab:function(tab){listTab=tab;renderList(allOrders)},
 reload:function(){load()},
 toggleHeadingMode:function(e){
  if(e){e.preventDefault();e.stopPropagation()}
  headingUpMode=!headingUpMode;
  updateCompassNeedle();
  if(mapInst)mapInst.easeTo({bearing:getMapBearing(),duration:220,essential:true});
 },
 openGoogleNav:function(e){
  if(e){e.preventDefault();e.stopPropagation()}
  var p=pointFromGPS(orderData&&orderData.gps);
  if(!p){toast('Customer GPS missing');return}
  window.open('https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(p.lat+','+p.lng)+'&travelmode=driving','_blank');
 },
 recenter:function(e){
  if(e){e.preventDefault();e.stopPropagation()}
  recenterDriver();
 },
 toggleGPS:function(){
  if(deliveryGPSLocked()){toast('GPS stays on while delivering');startGPS();return}
  if(gpsActive){stopGPS();return}
  startGPS();
 },
 mark:async function(step){
  if(markingStep||!orderData)return;
  orderData.tracking=orderData.tracking||{};
  if(orderData.tracking[step]||(step==='delivering'&&orderData.tracking.delivered))return;
  markingStep=step;
  var btn=document.getElementById('btn-'+step);
  document.querySelectorAll('.action-btn').forEach(function(b){b.disabled=true});
   if(btn){btn.textContent=step==='delivering'?'Starting...':'Saving...'}
   if(step==='delivering'){gpsForceLocked=true;if(!gpsActive)startGPS()}
   try{
	    var j=await postDriverStatus(orderData.id,step,driverToken(orderData.id));
    if(!j.ok)throw new Error(j.error||'Failed');
    orderData.tracking[step]=j.time||new Date().toISOString();
    toast(j.error||(step==='delivering'?'Picked up!':'Delivered!'),'ok');
    if(step==='delivering'){saveActiveDelivery(true);routeNeeded=true;connectDriverWS(orderData.id);sendNow();updateMapView(orderData.tracking||{},orderData.gps);renderDetail(orderData);markingStep=null}
    if(step==='delivered'){gpsForceLocked=false;rememberDelivered(orderData.id);closeDriverWS();stopGPS(true);clearActiveDelivery();clearInterval(autoRefresh);setTimeout(function(){location.href='?'},250)}
   else setTimeout(function(){load()},1200);
  }catch(e){
   if(isNetworkError(e)){
	   enqueuePendingAction(orderData.id,step,driverToken(orderData.id));
    orderData.tracking[step]=new Date().toISOString();
    toast('Saved offline — will sync automatically','ok');
    if(step==='delivering'){saveActiveDelivery(true);routeNeeded=true;connectDriverWS(orderData.id);sendNow();updateMapView(orderData.tracking||{},orderData.gps);renderDetail(orderData);setReconnecting(true);markingStep=null;return}
    if(step==='delivered'){gpsForceLocked=false;rememberDelivered(orderData.id);closeDriverWS();stopGPS(true);clearActiveDelivery();clearInterval(autoRefresh);setTimeout(function(){location.href='?'},250);return}
   }
   if(step==='delivering'){gpsForceLocked=false;stopGPS()}
   toast(friendlyError(e));
   markingStep=null;
   renderDetail(orderData);
  }
 }
};

async function load(){
	 if(loadBusy)return;
	 loadBusy=true;
	 var params=new URLSearchParams(window.location.search);
	 var id=params.get('id');
	 try{
	  if(!id&&!driverPin()){renderPinGate('');return}
	  if(id){
	   var token=params.get('token')||driverToken(id);
	   if(!token&&!driverPin()){renderPinGate('');return}
	   startRefresh();
	   try{
	    var j=await fetchJSON(authUrl(W+'/driver/'+encodeURIComponent(id),token),{headers:driverHeaders()},3);
	    if(!j.ok)throw new Error(j.error||'Invalid response');
	    orderData=j.data;
	    if(orderData.driverToken)rememberDriverToken(orderData.id,orderData.driverToken);
	    if(!isMenuOrder(orderData)){
     document.getElementById('app').innerHTML='\x3Cdiv class="empty"\x3E\x3Cdiv class="emoji"\x3E🧾\x3C/div\x3E\x3Cdiv class="msg"\x3EThis is a POS order and is not assigned to drivers.\x3C/div\x3E\x3Cbutton class="back-btn" style="margin:16px auto 0" onclick="location.href=\x27?\x27"\x3EBack to deliveries\x3C/button\x3E\x3C/div\x3E';
     return;
    }
    setReconnecting(false);
    drainPendingActions();
    lastDetailLoaded=true;
    var trackingJSON=JSON.stringify(orderData.tracking||{});
    if(trackingJSON!==lastTrackingJSON){
     lastTrackingJSON=trackingJSON;
     renderDetail(orderData);
    }else{
     updateMapView(orderData.tracking||{},orderData.gps);
    }
   }catch(e){
    if(/PIN|required|Forbidden/i.test(String(e&&e.message||e||''))){clearDriverPin();renderPinGate('Invalid driver PIN');return}
    setReconnecting(true);
    if(lastDetailLoaded)toast(friendlyError(e));
    else document.getElementById('app').innerHTML='\x3Cdiv class="empty"\x3E\x3Cdiv class="emoji"\x3E🔍\x3C/div\x3E\x3Cdiv class="msg"\x3E'+esc(friendlyError(e))+'\x3C/div\x3E\x3Cbutton class="back-btn" style="margin:16px auto 0" onclick="D.reload()"\x3ERetry\x3C/button\x3E\x3C/div\x3E';
   }
	  }else{
	   var active=readActiveDelivery();
	   if(active&&active.orderId&&active.driverToken)rememberDriverToken(active.orderId,active.driverToken);
	   if(active&&active.orderId&&active.gpsActive){location.href='?id='+encodeURIComponent(active.orderId)+(active.driverToken?'&token='+encodeURIComponent(active.driverToken):'');return}
   clearInterval(autoRefresh);
   startRefresh();
   lastTrackingJSON=null;
    cleanupMap();
   try{
	    var j2=await fetchJSON(W+'/driver',{headers:driverHeaders()},3);
	    allOrders=j2.data||[];
    setReconnecting(false);
    drainPendingActions();
    lastListLoaded=true;
    renderList(allOrders);
	   }catch(e){
	    if(/PIN|required|Forbidden/i.test(String(e&&e.message||e||''))){clearDriverPin();renderPinGate('Invalid driver PIN');return}
	    setReconnecting(true);
    if(lastListLoaded)toast(friendlyError(e));
    else document.getElementById('app').innerHTML='\x3Cdiv class="empty"\x3E\x3Cdiv class="emoji"\x3E⚠️\x3C/div\x3E\x3Cdiv class="msg"\x3ECould not load deliveries. Check internet and retry.\x3C/div\x3E\x3Cbutton class="back-btn" style="margin:16px auto 0" onclick="D.reload()"\x3ERetry\x3C/button\x3E\x3C/div\x3E';
   }
  }
 }finally{
  loadBusy=false;
 }
}

bindWakeLock();
startSignalWatch();
load();
})();
</script>
