<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Le Kiosk - POS Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0}
:root{
--ink:#101827;
--side:#111827;
--side-2:#0b1220;
--muted:#6b7280;
--soft:#f4f6f8;
--line:#e5e7eb;
--brand:#f59e0b;
--brand-2:#fbbf24;
--brand-dark:#451a03;
--brand-soft:#fff7ed;
--green:#22c55e;
--green-d:#16a34a;
--red:#ef4444;
--red-d:#dc2626;
--blue:#2563eb;
--white:#fff;
--font:'Poppins',sans-serif;
--brand-font:'Fredoka',sans-serif;
--side-w:244px;
--cart-w:326px;
--top-h:68px;
}
html,body{
height:100%;
overflow:hidden}
body{
font-family:var(--font);
background:#eef1f5;
color:var(--ink);
-webkit-tap-highlight-color:transparent}
body.theme-dark{
--ink:#f8fafc;
--side:#0b101a;
--side-2:#070b12;
--muted:#9ca3af;
--soft:#1f2937;
--line:#2b3545;
--brand:#f59e0b;
--brand-2:#fbbf24;
--brand-dark:#fcd34d;
--brand-soft:#2a1d08;
--white:#151c27;
background:#0f141d;
color:var(--ink)}
body.theme-dark #login-screen{background:radial-gradient(circle at 20% 0,#2b1706,#120904 55%,#05070b)}
body.theme-dark .login-card,
body.theme-dark .topbar,
body.theme-dark .menu-tools,
body.theme-dark .cart,
body.theme-dark .cart-head,
body.theme-dark .line,
body.theme-dark .panel-card,
body.theme-dark .order-mode-card,
body.theme-dark .proceed-bar,
body.theme-dark .checkout,
body.theme-dark .modal,
body.theme-dark .receipt-preview{background:#151c27;color:var(--ink);border-color:var(--line)}
body.theme-dark .input,
body.theme-dark .search,
body.theme-dark textarea,
body.theme-dark select{background:#101722;color:var(--ink);border-color:var(--line)}
body.theme-dark .quick-btn,
body.theme-dark .top-inbox,
body.theme-dark .cat-chip,
body.theme-dark .filter-chip,
body.theme-dark .mode-strip,
body.theme-dark .qty-btn,
body.theme-dark .show-pw-btn{background:#222b38;color:#e5e7eb}
body.theme-dark .quick-btn:hover,
body.theme-dark .top-inbox:hover{background:#2b3545}
body.theme-dark .menu-toggle,
body.theme-dark .quick-btn.primary,
body.theme-dark .action-btn.print{background:#f59e0b;color:#111827}
body.theme-dark .category-toggle,
body.theme-dark .profile-card,
body.theme-dark .addon-chip,
body.theme-dark .option-toggle{background:#2a1d08;color:#fcd34d;border-color:#78350f}
body.theme-dark .mode-btn.active,
body.theme-dark .item-card,
body.theme-dark .cash-row,
body.theme-dark .card-receipt{background:#151c27;color:var(--ink);border-color:var(--line)}
body.theme-dark .item-img{background:#101722}
body.theme-dark .item-card:hover{border-color:#b45309;box-shadow:0 10px 26px rgba(0,0,0,.25)}
body.theme-dark .proceed-summary,
body.theme-dark .total-box{background:#2a1d08}
body.theme-dark .row,
body.theme-dark .panel-name,
body.theme-dark .line-name,
body.theme-dark .item-name{color:var(--ink)}
body.theme-dark .panel-meta,
body.theme-dark .empty,
body.theme-dark .category-count{color:#9ca3af}
body.theme-dark .item-price,
body.theme-dark .line-price,
body.theme-dark .profile-meta,
body.theme-dark .type-label,
body.theme-dark .total-label,
body.theme-dark .total-sub,
body.theme-dark .total-amt,
body.theme-dark .proceed-kicker,
body.theme-dark .proceed-note,
body.theme-dark .proceed-total{color:#fbbf24}
button,input,textarea,select{
font-family:inherit;
outline:none}
button{
border:0;
cursor:pointer}
img{
max-width:100%;
display:block}
.hidden{
display:none!important}
#login-screen{
position:fixed;
inset:0;
z-index:1000;
background:radial-gradient(circle at 20% 0,#7c2d12,var(--brand-dark) 45%,#160b04);
display:flex;
align-items:center;
justify-content:center;
padding:24px}
.login-card{
width:min(410px,100%);
background:#fff;
border-radius:20px;
padding:34px;
box-shadow:0 26px 70px rgba(0,0,0,.38)}
.login-logo{
font-family:var(--brand-font);
font-size:36px;
font-weight:800;
color:var(--brand-dark)}
.login-kicker{
font-size:11px;
font-weight:900;
letter-spacing:.14em;
text-transform:uppercase;
color:#b45309;
margin-top:2px;
margin-bottom:28px}
.field-label{
display:block;
font-size:10px;
font-weight:900;
letter-spacing:.09em;
text-transform:uppercase;
color:#7c2d12;
margin-bottom:6px}
.input{
width:100%;
height:42px;
border:1.5px solid var(--line);
border-radius:9px;
background:#fff;
padding:0 12px;
font-size:13px;
font-weight:700;
color:var(--ink)}
.input:focus{
border-color:var(--brand);
box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.input.error{
border-color:var(--red);
background:#fff5f5}
.password-wrap{
position:relative}
.password-wrap .input{
padding-right:72px}
.show-pw-btn{
position:absolute;
right:6px;
top:50%;
transform:translateY(-50%);
height:30px;
border-radius:8px;
background:#f3f4f6;
color:#78350f;
padding:0 10px;
font-size:10px;
font-weight:900;
letter-spacing:.06em;
text-transform:uppercase}
.show-pw-btn:hover{
background:#e5e7eb}
.login-btn{
width:100%;
height:44px;
border-radius:10px;
background:var(--side);
color:#fff;
font-size:12px;
font-weight:900;
letter-spacing:.08em;
text-transform:uppercase;
margin-top:14px}
.login-btn:disabled{
opacity:.55;
cursor:not-allowed}
.login-error,.lockout{
display:none;
margin-top:12px;
border-radius:9px;
padding:10px 12px;
font-size:12px;
font-weight:700}
.login-error{
background:#fef2f2;
color:var(--red-d);
border:1px solid #fecaca}
.lockout{
background:#fff7ed;
color:#c2410c;
border:1px solid #fed7aa}
.login-error.show,.lockout.show{
display:block}
.attempts{
display:flex;
gap:6px;
justify-content:center;
margin-top:14px}
.dot{
width:8px;
height:8px;
border-radius:50%;
background:#fde68a}
.dot.used{
background:var(--red)}
#app{
height:100vh;
display:none;
overflow:hidden}
#app.show{
display:block}
.sidebar{
background:var(--side);
color:#d1d5db;
display:flex;
flex-direction:column;
min-height:0;
border-right:1px solid rgba(255,255,255,.08);
position:fixed;
left:0;
top:0;
bottom:0;
width:var(--side-w);
z-index:90;
transform:translateX(-105%);
transition:transform .2s ease;
box-shadow:18px 0 46px rgba(17,24,39,.22)}
.sidebar.open{
transform:translateX(0)}
.side-backdrop{
display:none;
position:fixed;
inset:0;
z-index:80;
background:rgba(17,24,39,.48);
backdrop-filter:blur(2px)}
body.sidebar-open .side-backdrop{
display:block}
.brand{
padding:24px 20px 20px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px}
.brand-name{
font-family:var(--brand-font);
font-size:28px;
font-weight:800;
color:#fff;
letter-spacing:.01em}
.brand-sub{
font-size:10px;
font-weight:900;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--brand-2);
margin-top:2px}
.side-close{
width:34px;
height:34px;
border-radius:9px;
background:rgba(255,255,255,.08);
color:#f9fafb;
font-size:18px;
font-weight:900;
flex-shrink:0}
.side-close:hover{
background:rgba(255,255,255,.14)}
.nav{
padding:16px 12px;
display:flex;
flex-direction:column;
gap:8px;
flex:1;
min-height:0}
.nav-btn{
height:48px;
border-radius:9px;
background:transparent;
color:#cbd5e1;
text-align:left;
padding:0 14px;
display:flex;
align-items:center;
gap:12px;
font-size:13px;
font-weight:900;
letter-spacing:.01em}
.nav-btn:hover{
background:rgba(255,255,255,.07);
color:#fff}
.nav-btn.active{
background:var(--brand);
color:#111827}
.nav-key{
width:22px;
height:22px;
border-radius:7px;
background:rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:900}
.nav-btn.active .nav-key{
background:rgba(0,0,0,.12);
color:#111827}
.nav-badge{
margin-left:auto;
min-width:22px;
height:22px;
border-radius:11px;
background:var(--red);
color:#fff;
font-size:10px;
font-weight:900;
display:none;
align-items:center;
justify-content:center;
padding:0 7px}
.nav-badge.show{
display:flex}
.side-footer{
padding:14px 14px 18px;
border-top:1px solid rgba(255,255,255,.08)}
.status-pill{
display:inline-flex;
align-items:center;
gap:6px;
border-radius:20px;
background:rgba(251,191,36,.14);
color:#fde68a;
padding:5px 9px;
font-size:10px;
font-weight:900;
text-transform:uppercase}
.session{
font-size:11px;
font-weight:800;
color:#cbd5e1;
margin:12px 0}
.logout{
width:100%;
height:40px;
border-radius:9px;
background:#252d3d;
color:#fff;
font-size:11px;
font-weight:900;
text-transform:uppercase;
letter-spacing:.06em}
.workspace{
min-width:0;
display:grid;
grid-template-rows:var(--top-h) minmax(0,1fr);
height:100vh;
min-height:0;
overflow:hidden}
.topbar{
height:var(--top-h);
background:#fff;
border-bottom:1px solid var(--line);
display:flex;
align-items:center;
gap:9px;
padding:0 12px}
.menu-toggle{
width:42px;
height:42px;
border-radius:10px;
background:#111827;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
flex-shrink:0}
.menu-toggle:hover{
background:#000}
.top-inbox{
height:42px;
min-width:42px;
border-radius:10px;
background:#f3f4f6;
color:#374151;
display:flex;
align-items:center;
justify-content:center;
gap:7px;
padding:0 11px;
font-size:11px;
font-weight:900;
text-transform:uppercase;
flex-shrink:0;
position:relative}
.top-inbox:hover{
background:#e5e7eb}
.top-inbox.has-orders{
background:#fef2f2;
color:#991b1b;
box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.top-inbox.has-orders::after{
content:'';
position:absolute;
right:-2px;
top:-2px;
width:10px;
height:10px;
border-radius:50%;
background:#ef4444;
box-shadow:0 0 0 4px rgba(239,68,68,.14)}
.top-inbox-count{
display:none;
min-width:20px;
height:20px;
border-radius:10px;
background:#ef4444;
color:#fff;
align-items:center;
justify-content:center;
padding:0 6px;
font-size:10px;
font-weight:900}
.top-inbox.has-orders .top-inbox-count{
display:flex}
.page-title{
font-family:var(--brand-font);
font-size:24px;
font-weight:800;
color:var(--brand-dark);
min-width:118px}
.search-wrap{
flex:1;
min-width:170px;
position:relative}
.search{
width:100%;
height:42px;
border:1.5px solid var(--line);
border-radius:10px;
background:#f9fafb;
padding:0 14px 0 38px;
font-size:13px;
font-weight:700}
.search-wrap::before{
content:'⌕';
position:absolute;
left:14px;
top:8px;
font-size:18px;
color:#9ca3af;
font-weight:900}
.top-actions{
display:flex;
align-items:center;
gap:8px}
.quick-btn{
height:38px;
border-radius:9px;
background:#f3f4f6;
color:#374151;
padding:0 12px;
font-size:11px;
font-weight:900;
text-transform:uppercase}
.quick-btn:hover{
background:#e5e7eb}
.quick-btn.primary{
background:var(--side);
color:#fff}
.quick-btn.sound-ready{
background:#dcfce7;
color:#166534}
.quick-btn.sound-off{
background:#fee2e2;
color:#991b1b;
box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.sync-pill{
height:38px;
border-radius:9px;
border:0;
background:#dcfce7;
color:#166534;
padding:0 12px;
font-size:11px;
font-weight:900;
text-transform:uppercase;
display:flex;
align-items:center}
.sync-pill.offline{
background:#fee2e2;
color:#991b1b}
.sync-pill.pending{
background:#fef3c7;
color:#92400e}
.main{
min-height:0;
display:grid;
grid-template-columns:minmax(0,1fr) var(--cart-w);
height:calc(100vh - var(--top-h));
overflow:hidden}
.content{
min-width:0;
min-height:0;
height:100%;
overflow:hidden;
display:flex;
flex-direction:column}
.content-view{
flex:1;
min-height:0;
height:100%;
display:flex;
flex-direction:column;
overflow:hidden}
.menu-tools{
background:#fff;
border-bottom:1px solid var(--line);
padding:9px 18px;
display:flex;
align-items:center;
gap:10px}
.category-toggle{
height:34px;
border-radius:10px;
background:#fff7ed;
border:1.5px solid #fde68a;
color:#78350f;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
padding:0 12px;
font-size:11px;
font-weight:900;
letter-spacing:.06em;
text-transform:uppercase}
.category-toggle span:first-child{
min-width:0;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap}
.category-toggle .toggle-arrow{
font-size:15px;
transition:transform .16s}
.menu-tools.open .category-toggle .toggle-arrow{
transform:rotate(180deg)}
.category-drawer{
display:flex;
align-items:center;
gap:10px;
width:100%;
max-height:none;
opacity:1;
overflow:hidden}
.menu-tools:not(.open) .category-drawer{
max-height:none;
opacity:1;
margin-top:0;
pointer-events:auto}
.chip-row{
display:flex;
gap:8px;
overflow-x:auto;
flex:1;
min-width:0;
padding:1px 0 2px}
.chip-row::-webkit-scrollbar{
display:none}
.cat-chip,.filter-chip{
height:34px;
border-radius:17px;
background:#f3f4f6;
color:#4b5563;
padding:0 13px;
font-size:11px;
font-weight:900;
white-space:nowrap}
.cat-chip.active,.filter-chip.active{
background:var(--brand);
color:#111827;
box-shadow:0 0 0 3px rgba(245,158,11,.16)}
.mode-strip{
display:flex;
gap:6px;
background:#f3f4f6;
border-radius:10px;
padding:4px;
width:100%}
.mode-btn{
height:34px;
border-radius:8px;
padding:0 11px;
background:transparent;
color:#6b7280;
font-size:10px;
font-weight:900;
text-transform:uppercase;
flex:1}
.mode-btn.active{
background:#fff;
color:var(--brand-dark);
box-shadow:0 1px 4px rgba(0,0,0,.08)}
.delivery-zone{
display:none;
gap:6px;
width:100%;
margin-top:8px}
.delivery-zone.show{
display:flex}
.grid-scroll{
flex:1;
min-height:0;
height:100%;
overflow-y:auto;
overflow-x:hidden;
padding:9px 12px 12px;
overscroll-behavior:contain;
-webkit-overflow-scrolling:touch}
.item-grid{
display:flex;
flex-direction:column;
gap:11px}
.item-grid.board{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(104px,1fr));
grid-auto-rows:minmax(56px,auto);
gap:6px}
.item-grid.board.tight{
grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
grid-auto-rows:minmax(50px,auto);
gap:5px}
.item-grid.board.ultra{
grid-template-columns:repeat(auto-fill,minmax(74px,1fr));
grid-auto-rows:minmax(44px,auto);
gap:4px}
.menu-board-head{
grid-column:1/-1;
display:flex;
align-items:center;
justify-content:space-between;
padding:2px 2px 4px;
font-size:10px;
font-weight:900;
text-transform:uppercase;
letter-spacing:.08em;
color:#9ca3af}
.item-grid.category-board{
display:grid;
grid-template-columns:repeat(var(--pos-category-count,1),minmax(0,1fr));
align-items:start;
gap:12px;
width:100%;
min-height:0}
.item-grid.category-board.tight{
gap:12px}
.category-section{
min-width:0}
.category-section.compact-group{
min-width:0;
display:flex;
flex-direction:column;
padding:0 10px 0 0;
border-right:1px solid var(--line)}
.category-section.compact-group:last-child{
border-right:0;
padding-right:0}
.category-head{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin-bottom:6px}
.category-title{
font-family:var(--brand-font);
font-size:15px;
font-weight:900;
color:var(--brand-dark)}
.compact-group .category-head{
margin:0;
padding:3px 1px 8px;
flex-shrink:0}
.compact-group .category-title{
font-family:var(--font);
font-size:11px;
font-weight:900;
letter-spacing:.09em;
text-transform:uppercase;
color:#92400e}
.category-count{
font-size:10px;
font-weight:900;
color:#9ca3af;
text-transform:uppercase;
letter-spacing:.06em}
.compact-group .category-count{
font-size:9px}
.category-items{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(128px,1fr));
gap:6px}
.compact-group .category-items{
display:flex;
flex-direction:column;
gap:8px;
min-height:0}
.category-board.tight .compact-group .category-items{
gap:8px}
.item-card{
background:#fff;
border:1.5px solid var(--line);
border-radius:9px;
overflow:hidden;
text-align:left;
box-shadow:0 2px 10px rgba(17,24,39,.04);
transition:.14s transform,.14s box-shadow,.14s border-color;
position:relative}
.compact-group:nth-child(8n+1){--cat-card-bg:#fff7ed}
.compact-group:nth-child(8n+2){--cat-card-bg:#f0fdf4}
.compact-group:nth-child(8n+3){--cat-card-bg:#eff6ff}
.compact-group:nth-child(8n+4){--cat-card-bg:#fdf2f8}
.compact-group:nth-child(8n+5){--cat-card-bg:#f5f3ff}
.compact-group:nth-child(8n+6){--cat-card-bg:#ecfeff}
.compact-group:nth-child(8n+7){--cat-card-bg:#fefce8}
.compact-group:nth-child(8n+8){--cat-card-bg:#f8fafc}
.compact-group .item-card{
background:var(--cat-card-bg,#fff)}
body.theme-dark .compact-group .item-card{
background:#151c27}
.item-card.compact{
width:100%;
min-height:76px;
display:flex;
align-items:center;
gap:10px;
padding:9px 10px;
box-shadow:0 1px 5px rgba(17,24,39,.04)}
.item-grid.board.tight .item-card.compact,
.category-board.tight .item-card.compact{
min-height:76px;
gap:10px;
padding:9px 10px}
.item-card:hover{
transform:translateY(-2px);
box-shadow:0 10px 26px rgba(17,24,39,.08);
border-color:#fcd34d}
.item-card:active{
transform:scale(.98)}
.item-img{
width:100%;
aspect-ratio:2.45/1;
object-fit:cover;
background:#f3f4f6}
.item-card.compact .item-img{
width:54px;
height:54px;
aspect-ratio:auto;
border-radius:7px;
object-fit:cover;
flex-shrink:0}
.category-board.tight .item-card.compact .item-img{
width:54px;
height:54px}
.item-img[src='']{
display:none}
.item-info{
padding:6px 9px 7px}
.item-card.compact .item-info{
flex:1 1 auto;
min-width:0;
padding:0}
.item-name{
font-size:12px;
font-weight:900;
line-height:1.18;
color:var(--ink);
min-height:0}
.item-card.compact .item-name{
font-size:12px;
line-height:1.18;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden}
.item-grid.board.tight .item-card.compact .item-name,
.category-board.tight .item-card.compact .item-name{
font-size:12px}
.item-price{
font-size:13px;
font-weight:900;
color:#92400e;
margin-top:2px}
.item-card.compact .item-price{
font-size:13px;
margin-top:2px}
.item-grid.board.tight .item-card.compact .item-price,
.category-board.tight .item-card.compact .item-price{
font-size:13px;
margin-top:2px}

const remaining=[];
for(const entry of queue){
try{
await postOrder(entry.order);
const local=ordersData.find(o=>o.id===entry.id);
if(local)local.syncStatus='';
}catch(e){
remaining.push({...entry,attempts:Number(entry.attempts||0)+1,lastError:e.message,updatedAt:new Date().toISOString()});

function makeAlarmUrl(){
const sampleRate=16000,duration=1.55,total=sampleRate*duration|0,samples=new Int16Array(total);
function addTone(start,dur,freq,vol=.36){
const from=Math.max(0,start*sampleRate|0),to=Math.min(total,(start+dur)*sampleRate|0);
for(let i=from;i<to;i++){
const p=(i-from)/(to-from),env=Math.sin(Math.PI*p),v=Math.sin(2*Math.PI*freq*i/sampleRate)*env*vol;
samples[i]=Math.max(-32768,Math.min(32767,samples[i]+v*32767));
}
}
[0,0.66].forEach(base=>{addTone(base,.15,880);addTone(base+.17,.15,1174);addTone(base+.34,.17,1568);});
const buffer=new ArrayBuffer(44+samples.length*2),view=new DataView(buffer);
function text(offset,str){for(let i=0;i<str.length;i++)view.setUint8(offset+i,str.charCodeAt(i));}
text(0,'RIFF');view.setUint32(4,36+samples.length*2,true);text(8,'WAVE');text(12,'fmt ');
view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);view.setUint32(24,sampleRate,true);
view.setUint32(28,sampleRate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);text(36,'data');view.setUint32(40,samples.length*2,true);
for(let i=0;i<samples.length;i++)view.setInt16(44+i*2,samples[i],true);
return URL.createObjectURL(new Blob([view],{type:'audio/wav'}));
}

function primeAudio(){
enableOrderSound(false);

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.value=440;
gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+.01);
gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+.04);
osc.connect(gain).connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+.05);
}

function playWebAudioAlarm(){
ensureAudio();
if(!audioCtx)return;
if(audioCtx.state!=='running')return;
const start=audioCtx.currentTime+.02;
[0,0.62].forEach(ringOffset=>{
[0,0.16,0.32].forEach((noteOffset,i)=>{
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type='sine';
osc.frequency.value=[880,1174,1568][i];
const t=start+ringOffset+noteOffset;
gain.gain.setValueAtTime(0.0001,t);
gain.gain.exponentialRampToValueAtTime(0.28,t+.025);
gain.gain.exponentialRampToValueAtTime(0.0001,t+.14);
osc.connect(gain).connect(audioCtx.destination);
osc.start(t);
osc.stop(t+.16);
});
});
}

async function sha256(str){
if(!window.crypto?.subtle)throw new Error('HTTPS required');
const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

if(order.loyaltyReward?.type){c.loyaltyStamps=0;c.loyaltyRewardReady=false;c.loyaltyLastReward=order.loyaltyReward.type;c.loyaltyRewardRedeemedAt=new Date().toISOString();c.loyaltyLifetimeRedemptions=Number(c.loyaltyLifetimeRedemptions||0)+1}
else{c.loyaltyStamps=Number(c.loyaltyStamps||0)+1;c.loyaltyRewardReady=c.loyaltyStamps>=LOYALTY_TARGET}
order.loyaltyProcessed=true;
await fetch(`${
WORKER_URL}
/supabase/customers`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:customersData})});
}
function loadOrder(id){const o=getLoggedOrder(id);if(o)loadOrderIntoCurrent(o)}
function loadOrderIntoCurrent(o){
const phone=normalizePhone(o.phone);
clearOrder();loadedInboxOrderId=o.id||null;$('cust-name').value=o.name||'Guest';$('cust-phone').value=phone==='00000000'?'':phone;$('order-note').value=o.note||o.address||'';setOrderType(o.orderType||'takeaway',false);
const zoneMatch=o.deliveryZone?String(o.deliveryZone).match(/[ABC]/i):null;if(zoneMatch)setZone(zoneMatch[0].toUpperCase());
(o.items||[]).forEach(it=>{let found=null;menuData.forEach(c=>(c.items||[]).forEach((mi,idx)=>{if(mi.name===it.name)found={cat:c,idx,item:mi}}));cart.push({id:uid(),catKey:found?.cat?.key||'',itemIdx:found?.idx??-1,name:it.name,price:Number(it.price||0),priceStr:it.priceStr||money(it.price),qty:it.qty||1,flavor:it.flavor||null,addons:(it.addons||[]).map(a=>({label:a.label,price:Number(a.price||0)})),optionsOpen:false,meta:found?.item||{}})});
hydrateCustomerFromPhone(phone);renderCart();renderItems();switchView('menu');showCartOnMobile();showToast('Order loaded','success');
}
function pruneHandledInbox(){
const now=Date.now();
handledInboxIds.forEach((expires,id)=>{if(expires<=now)handledInboxIds.delete(id)});
}
function rememberHandledInbox(id){
if(id)handledInboxIds.set(id,Date.now()+15000);
}
function syncInboxBadge(){
const count=inboxData.filter(o=>o.status==='pending').length;
$('inbox-badge').textContent=count;
$('inbox-badge').classList.toggle('show',count>0);
const topAlert=$('top-inbox-alert'),topCount=$('top-inbox-count');
if(topCount)topCount.textContent=count;
if(topAlert)topAlert.classList.toggle('has-orders',count>0);
updateTopInboxButton();
lastInboxCount=count;
if(!count)$('nav-inbox').classList.remove('has-new');
}
async function pollInbox(force=false){
if(inboxWritePending&&!force)return;
try{
pruneHandledInbox();
const res=await fetch(`${
WORKER_URL}
/supabase/orders?status=inbox`,{cache:'no-store'});if(!res.ok)throw new Error('Inbox read '+res.status);
const j=await res.json();inboxData=(j.data||[]).filter(r=>!handledInboxIds.has(r.id)).map(r=>({...r.payload,id:r.id,status:'pending'}));
const count=inboxData.length;
const currentIds=new Set(inboxData.map(o=>String(o.id)));
const newIds=inboxData.filter(o=>!knownInboxIds.has(String(o.id))).map(o=>String(o.id));
const shouldRing=inboxIdsReady&&(newIds.length||count>lastInboxCount);
if(shouldRing){
playIncomingSound();
if(currentView!=='inbox')showToast(`${
Math.max(newIds.length,count-lastInboxCount)}
new incoming order${
Math.max(newIds.length,count-lastInboxCount)===1?'':'s'}
`,'success');
}
knownInboxIds=currentIds;
inboxIdsReady=true;
syncInboxBadge();renderInboxList();
}catch(_){}
}
function renderInboxList(){
const el=$('inbox-list');if(!inboxData.length){el.innerHTML='<div class="empty">No incoming orders right now.</div>';return}
el.innerHTML=inboxData.map(inboxCard).join('');
}
function inboxCard(o){
const dt=o.timestamp?new Date(o.timestamp):new Date(),profile=o.phone?findCustomer(o.phone):null;
const items=(o.items||[]).map(it=>`<div class="row"><span>${
esc(it.name)}
x${
it.qty}
</span><span>${
money(it.price*it.qty)}
</span></div>`).join('');
return `<div class="panel-card"><div class="panel-head"><div><div class="panel-name">${
esc(o.name||'Guest')}
</div><div class="panel-meta">${
dt.toLocaleTimeString('en-US',{
hour:'2-digit',minute:'2-digit',hour12:true}
)}
· ${
formatType(o.orderType)}
${
tableLabel(o)?` · ${tableLabel(o)}`:''}
${
o.deliveryZone?` · ${esc(o.deliveryZone)}`:''}
${
o.phone?` · +961 ${esc(o.phone)}`:''}
</div>${
o.phone?`<div class="panel-meta">${profile?`${
profile.totalOrders||0}
visits`:'First-time customer'}</div>`:''}
</div><span class="badge pending">New</span></div>
<div class="panel-body">${
items}
${
o.address?`<div class="row addon"><span>Address: ${esc(o.address)}</span><span></span></div>`:''}
</div>
<div class="panel-total"><span>Total</span><span>${
money(o.total)}
</span></div>
<div class="panel-actions"><button class="small-btn green" onclick="confirmInbox('${esc(o.id)}')">Confirm & Load</button><button class="small-btn red" onclick="declineInbox('${esc(o.id)}')">Decline</button>${
o.phone?`<button class="small-btn blue" onclick="sendInboxConfirmation('${esc(o.id)}')">WA</button>`:''}
</div></div>`;
}
function sendInboxConfirmation(id){
const o=inboxData.find(x=>x.id===id);
if(!o||!o.phone)return;
const phone=normalizePhone(o.phone);
if(phone==='00000000'||phone.length!==8){showToast('No valid phone for WhatsApp','error');return}
const msg=`Hello ${o.name||'there'}, your order is confirmed. We are preparing it now. Thank you - Le Kiosk`;
window.open(`https://wa.me/961${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}
async function confirmInbox(id){const o=inboxData.find(x=>x.id===id);if(!o)return;o.status='confirmed';inboxWritePending=true;try{await fetch(`${
WORKER_URL}
/supabase/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});rememberHandledInbox(id);inboxData=inboxData.filter(x=>x.id!==id);syncInboxBadge();renderInboxList();loadOrderIntoCurrent(o);setTimeout(()=>pollInbox(true),1200)}catch(e){showToast('Confirm failed: '+e.message,'error')}inboxWritePending=false}
async function declineInbox(id){const o=inboxData.find(x=>x.id===id);if(!o)return;o.status='declined';inboxWritePending=true;try{await fetch(`${
WORKER_URL}
/supabase/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});rememberHandledInbox(id);inboxData=inboxData.filter(x=>x.id!==id);syncInboxBadge();renderInboxList();showToast('Order declined');setTimeout(()=>pollInbox(true),1200)}catch(e){showToast('Decline failed: '+e.message,'error')}inboxWritePending=false}
function renderCustomers(){
const q=searchQuery,rows=customersData.filter(c=>!q||String(c.name+' '+c.phone).toLowerCase().includes(q));
if(!rows.length){$('customers-list').innerHTML='<div class="empty">No customers found.</div>';return}
$('customers-list').innerHTML=rows.map(c=>`<div class="panel-card"><div class="panel-head"><div><div class="panel-name">${
esc(c.name||'(no name)')}
</div><div class="panel-meta">+961 ${
esc(c.phone)}
· ${
c.totalOrders||0}
visits · ${
money(c.totalSpent||0)}
spent</div></div>${
loyaltyEnabled&&c.loyaltyRewardReady?'<span class="badge ready">Ready</span>':''}
</div>${
c.favoriteItems?.length?`<div class="panel-body"><div class="row"><span>Usually</span><span>${esc(c.favoriteItems.slice(0,2).join(', '))}</span></div></div>`:''}
</div>`).join('');
}
function formatType(t){return t==='dinein'?'Dine In':t==='takeaway'?'Takeaway':t==='delivery'?'Delivery':(t||'')}
function printOrder(format){if(!validateOrder())return;doPrint(buildOrder('pending'),format)}
function printLoggedOrder(id,format){const o=getLoggedOrder(id);if(o)doPrint(o,format)}
function doPrint(o,format){$('print-area').innerHTML=format==='thermal'?thermalReceipt(o):cardReceipt(o);$('print-area').style.display='block';setTimeout(()=>{window.print();$('print-area').style.display='none'},120)}
function thermalReceipt(o){
const rows=(o.items||[]).map(it=>`<div>${
esc(it.name)}
x${
it.qty}
<span style="float:right">${
money(it.price*it.qty)}
</span></div>${
it.flavor?`<div style="padding-left:10px">Flavor: ${esc(it.flavor)}</div>`:''}
${
(it.addons||[]).map(a=>`<div style="padding-left:10px">+ ${esc(a.label)} ${money(a.price)}</div>`).join('')}
`).join('');
return `<div class="receipt"><div class="center"><div class="logo">LE KIOSK</div><div>Wadi Chahrour · +961 76 840 244</div></div><div class="div"></div><div>Order: ${
esc(o.id||'POS')}
</div><div>Name: ${
esc(o.name)}
</div><div>Type: ${
formatType(o.orderType)}
</div>${
tableLabel(o)?`<div>${tableLabel(o)}</div>`:''}
</div><div class="div"></div>${
rows}
${
o.deliveryFee?`<div>Delivery <span style="float:right">${money(o.deliveryFee)}</span></div>`:''}
<div class="div"></div><div class="bold">TOTAL <span style="float:right">${
money(o.total)}
</span></div><div class="div"></div><div class="center">Thank you!</div></div>`;
}
function cardReceipt(o){
const dt=o.timestamp?new Date(o.timestamp):new Date();
const rows=(o.items||[]).map(it=>`<div class="cr-row"><span><strong>${
esc(it.name)}
</strong> <span style="color:#9ca3af">x${
it.qty}
</span></span><span>${
money(it.price*it.qty)}
</span></div>${
it.flavor?`<div class="cr-addon"><span>Flavor: ${esc(it.flavor)}</span><span></span></div>`:''}
${
(it.addons||[]).map(a=>`<div class="cr-addon"><span>+ ${esc(a.label)}</span><span>${money(a.price)}</span></div>`).join('')}
`).join('');
return `<div class="card-receipt"><div class="cr-head"><div class="cr-logo">Le Kiosk</div><div class="cr-sub">Wadi Chahrour · +961 76 840 244</div></div><div class="cr-meta"><div>Order: <span>${
esc(o.id||'POS')}
</span></div><div>Customer: <span>${
esc(o.name||'Guest')}
</span></div>${
o.phone?`<div>Phone: <span>+961 ${esc(o.phone)}</span></div>`:''}
<div>Type: <span>${
formatType(o.orderType)}
</span></div>${
tableLabel(o)?`<div>Table: <span>${tableLabel(o).replace(/^Table\s*/,'')}</span></div>`:''}
${
o.deliveryZone?`<div>Zone: <span>${esc(o.deliveryZone)}</span></div>`:''}
${
o.note?`<div>Note: <span>${esc(o.note)}</span></div>`:''}
<div>Time: <span>${
dt.toLocaleDateString('en-GB')}
${
dt.toLocaleTimeString('en-US',{
hour:'2-digit',minute:'2-digit',hour12:true}
)}
</span></div></div>${
rows}
${
o.deliveryFee?`<div class="cr-row"><span>Delivery</span><span>${money(o.deliveryFee)}</span></div>`:''}
<div class="cr-total"><span>Total</span><span>${
money(o.total)}
</span></div><div class="cr-footer">Thank you for visiting Le Kiosk. Leave us a Google review.</div></div>`;
}
function sendWhatsAppLoggedOrder(id){const o=getLoggedOrder(id);if(o)sendWhatsApp(o)}
function sendWhatsApp(o){
let msg=`Le Kiosk Order\nOrder: ${
o.id||'POS'}
\nName: ${
o.name||''}
\nType: ${
formatType(o.orderType)}
\n${
tableLabel(o)?`${tableLabel(o)}\n`:''}
\n`;
(o.items||[]).forEach(it=>{msg+=`- ${
it.name}
x${
it.qty}
: ${
money(it.price*it.qty)}
\n`;if(it.flavor)msg+=`  Flavor: ${
it.flavor}
\n`;});
msg+=`Total: ${
money(o.total)}
\n`;
window.open(`https://wa.me/${o.phone?`961${o.phone}`:WA_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
}
function openModal(title,copy,onOk){
$('modal-title').textContent=title;
$('modal-copy').textContent=copy;
$('modal-ok').onclick=()=>{
closeModal();
onOk&&onOk()}
;
$('modal-overlay').classList.add('show');
}
function closeModal(){
$('modal-overlay').classList.remove('show')}
$('modal-overlay').addEventListener('click',e=>{
if(e.target===e.currentTarget)closeModal()}
);
function showToast(msg,type=''){
const t=$('toast');
t.textContent=msg;
t.className='toast show'+(type?' '+type:'');
clearTimeout(showToast.t);
showToast.t=setTimeout(()=>t.className='toast',3200)}
function showLoading(msg){
$('loading-text').textContent=msg||'Loading...';
$('loading').classList.add('show')}
function hideLoading(){
$('loading').classList.remove('show')}
window.addEventListener('online',()=>{updateSyncPill();syncOfflineQueue(false)});
window.addEventListener('offline',updateSyncPill);
setInterval(()=>syncOfflineQueue(false),30000);
</script>
