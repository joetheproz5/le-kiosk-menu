<head>

<style>
*,*::before,*::after{

:root{

<script>
const ADMIN_HASH='b7b9015697bcd58174d56b92494c51d011bb26840f1368e41dbf6fdcf17fcc0d';
const WORKER_URL='https://lekiosk-order-inbox.lekiosklb.workers.dev';
const STORAGE_PUBLIC_BASE='https://lbrdfzcbtgeqniibsfin.supabase.co/storage/v1/object/public/menu-images';
const MAX_ATTEMPTS=5,LOCKOUT_MS=2*60*1000,SESSION_MS=4*60*60*1000;
const WA_NUMBER='96176840244';
const ZONE_FEES={
A:.5,B:1,C:1.5}
;
const LOYALTY_TARGET=10;
const DEFAULT_REWARDS=[
{
id:'soft_drink',label:'Free Soft Drink',kind:'fixed',value:2}
,
{
id:'discount_10',label:'10% Discount',kind:'percent',value:10}
,
{
id:'ice_cream_cup',label:'Free Ice Cream Cup',kind:'fixed',value:3}
];
const CAT_ICONS={
appetizers:'Fries',sandwiches:'Sandwiches',burgers:'Burgers',sajj:'Sajj',desserts:'Desserts',shisha:'Shisha',beverages:'Drinks',sweet:'Sweet',savory:'Savory'}
;
let menuData=[],flatItems=[],cart=[],activeCat='all',searchQuery='',orderType='takeaway',deliveryZone=null;
let ordersData=[],customersData=[],inboxData=[],ordersFilter='all',currentView='menu';
let currentCustomerProfile=null,selectedRewardType=null,loyaltyEnabled=true,loyaltyRewards=DEFAULT_REWARDS.map(r=>({
...r}
));
let sessionTimer=null,sessionTick=null,sessionExpiry=0,inboxPollInterval=null,lastInboxCount=0,inboxWritePending=false,loadedInboxOrderId=null,checkoutOpen=false,handledInboxIds=new Map();
const $=id=>document.getElementById(id);
const money=n=>'$'+(Number(n)||0).toFixed(2);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const uid=()=>Date.now()+Math.random();
function imageUrl(src){if(!src)return '';return /^https?:|^data:/.test(src)?src:`${STORAGE_PUBLIC_BASE}/${src}`;}
function openSidebar(){
document.querySelector('.sidebar')?.classList.add('open');
document.body.classList.add('sidebar-open');
}
function closeSidebar(){
document.querySelector('.sidebar')?.classList.remove('open');
document.body.classList.remove('sidebar-open');
}
function toggleSidebar(){
if(document.body.classList.contains('sidebar-open'))closeSidebar();
else openSidebar();
}
function scrollCategories(dir){
const row=$('category-chips');
if(row)row.scrollBy({left:dir*260,behavior:'smooth'});
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSidebar();});
async function sha256(str){
if(!window.crypto?.subtle)throw new Error('HTTPS required');
const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function getLockout(){try{return JSON.parse(sessionStorage.getItem('pos_lock')||'{"a":0,"u":0}')}catch{return{a:0,u:0}}}
function setLockout(d){sessionStorage.setItem('pos_lock',JSON.stringify(d))}
function resetLockout(){sessionStorage.removeItem('pos_lock')}
function renderDots(n){$('attempts').innerHTML=Array.from({length:MAX_ATTEMPTS},(_,i)=>`<span class="dot${
i<n?' used':''}
"></span>`).join('')}
function loginEnabled(v){$('pw').disabled=!v;$('login-btn').disabled=!v}
let lockCountdown=null;
function startLockCountdown(){
clearInterval(lockCountdown);
lockCountdown=setInterval(()=>{
const l=getLockout();
if(l.u<=Date.now()){clearInterval(lockCountdown);$('lockout').classList.remove('show');loginEnabled(true);renderDots(0)}
else{$('lockout').textContent=`Too many attempts. Retry in ${Math.ceil((l.u-Date.now())/1000)}s.`;$('lockout').classList.add('show')}
},1000);
}
async function tryLogin(){
const l=getLockout();
if(l.u>Date.now()){loginEnabled(false);startLockCountdown();return}
const pw=$('pw').value;if(!pw)return;
let hash;
try{hash=await sha256(pw)}catch(e){showLoginError(e.message==='HTTPS required'?'Open POS over HTTPS.':e.message);return}
if(hash===ADMIN_HASH){
resetLockout();$('login-screen').style.display='none';$('app').classList.add('show');startSession();bootPOS();
}else{
const a=(l.a||0)+1,u=a>=MAX_ATTEMPTS?Date.now()+LOCKOUT_MS:0;setLockout({a,u});renderDots(a);
if(a>=MAX_ATTEMPTS){$('login-error').classList.remove('show');loginEnabled(false);startLockCountdown()}
else showLoginError(`Wrong password. ${MAX_ATTEMPTS-a} attempt${MAX_ATTEMPTS-a===1?'':'s'} left.`);
$('pw').value='';$('pw').focus();
}
}
function showLoginError(msg){$('login-error').textContent=msg;$('login-error').classList.add('show')}
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin()});
(function(){const l=getLockout();renderDots(l.a||0);if(l.u>Date.now()){loginEnabled(false);startLockCountdown()}})();
function startSession(){resetSession();clearInterval(sessionTick);sessionTick=setInterval(updateSessionBadge,30000);['mousemove','keydown','click','touchstart'].forEach(ev=>document.addEventListener(ev,resetSession,{passive:true,once:false}))}
function resetSession(){if(!$('app').classList.contains('show'))return;clearTimeout(sessionTimer);sessionExpiry=Date.now()+SESSION_MS;updateSessionBadge();sessionTimer=setTimeout(()=>{showToast('Session expired','error');logout()},SESSION_MS)}
function updateSessionBadge(){const rem=Math.max(0,sessionExpiry-Date.now()),h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000);$('session-badge').textContent=`Session: ${h?h+'h ':''}${m}m`}
function logout(){clearTimeout(sessionTimer);clearInterval(sessionTick);clearInterval(inboxPollInterval);$('app').classList.remove('show');$('login-screen').style.display='flex';$('pw').value='';$('pw').focus()}
async function bootPOS(){
showLoading('Loading POS...');
await Promise.all([loadMenu(),loadCustomers(),loadConfig()]).catch(e=>showToast(e.message,'error'));
await loadOrders(false).catch(()=>{});
await pollInbox(false).catch(()=>{});
renderAll();
hideLoading();
inboxPollInterval=setInterval(()=>pollInbox(false),15000);
}
async function loadConfig(){
try{
const res=await fetch(`${WORKER_URL}/supabase/config`,{cache:'no-store'});
if(!res.ok)throw new Error('Config read failed');
const j=await res.json(),cfg=j.data||{};
loyaltyEnabled=typeof cfg.loyaltyEnabled==='boolean'?cfg.loyaltyEnabled:true;
if(!loyaltyEnabled)selectedRewardType=null;
loyaltyRewards=Array.isArray(cfg.loyaltyRewards)&&cfg.loyaltyRewards.length?cfg.loyaltyRewards.map(normalizeReward):DEFAULT_REWARDS.map(r=>({...r}));
}catch(_){loyaltyEnabled=true;loyaltyRewards=DEFAULT_REWARDS.map(r=>({...r}))}
$('loyalty-pill').textContent=loyaltyEnabled?'Loyalty On':'Loyalty Off';
}
function normalizeReward(r){return{id:r.id||r.type||'custom_reward',label:r.label||'Custom Reward',kind:r.kind||'fixed',value:Math.max(0,Number(r.value||0))}}
async function loadMenu(){
let all=[];
try{
const res=await fetch(`${WORKER_URL}/supabase/menu`,{cache:'no-store'});
if(!res.ok)throw new Error('Supabase menu failed');
const j=await res.json();all=Array.isArray(j.data)?j.data:[];
if(!all.length)throw new Error('Empty menu');
}catch(e){
const res=await fetch('../menu.json?v='+Date.now());
if(!res.ok)throw e;
all=await res.json();
}
menuData=all.filter(c=>c.type!=='addons').map(c=>({...c,items:(c.items||[]).filter(i=>i.active!==false)}));
flatItems=[];
menuData.forEach((cat,ci)=>(cat.items||[]).forEach((item,idx)=>flatItems.push({cat,ci,idx,item})));
}
async function loadCustomers(){

pruneHandledInbox();
const res=await fetch(`${
WORKER_URL}
/supabase/orders?status=inbox`,{cache:'no-store'});if(!res.ok)throw new Error('Inbox read '+res.status);
const j=await res.json();inboxData=(j.data||[]).filter(r=>!handledInboxIds.has(r.id)).map(r=>({...r.payload,id:r.id,status:'pending'}));
const count=inboxData.length;
if(count>lastInboxCount&&currentView!=='inbox')showToast(`${
count-lastInboxCount}
new incoming order${
count-lastInboxCount===1?'':'s'}
`,'success');
syncInboxBadge();renderInboxList();
}catch(_){}
}
function renderInboxList(){
const el=$('inbox-list');if(!inboxData.length){el.innerHTML='<div class="empty">No incoming orders right now.</div>';return}
el.innerHTML=inboxData.map(inboxCard).join('');
}
function inboxCard(o){
const dt=o.timestamp?new Date(o.timestamp):new Date(),profile=o.phone?findCustomer(o.phone):null;
const items=(o.items||[]).map(it=>`<div class="row"><span>${
esc(it.name)}
x${
it.qty}
</span><span>${
money(it.price*it.qty)}
</span></div>`).join('');
return `<div class="panel-card"><div class="panel-head"><div><div class="panel-name">${
esc(o.name||'Guest')}
</div><div class="panel-meta">${
dt.toLocaleTimeString('en-US',{
hour:'2-digit',minute:'2-digit',hour12:true}
)}
· ${
formatType(o.orderType)}
${
o.deliveryZone?` · ${esc(o.deliveryZone)}`:''}
${
o.phone?` · +961 ${esc(o.phone)}`:''}
</div>${
o.phone?`<div class="panel-meta">${profile?`${
profile.totalOrders||0}
visits`:'First-time customer'}</div>`:''}
</div><span class="badge pending">New</span></div>
<div class="panel-body">${
items}
${
o.address?`<div class="row addon"><span>Address: ${esc(o.address)}</span><span></span></div>`:''}
</div>
<div class="panel-total"><span>Total</span><span>${
money(o.total)}
</span></div>
<div class="panel-actions"><button class="small-btn green" onclick="confirmInbox('${esc(o.id)}')">Confirm & Load</button><button class="small-btn red" onclick="declineInbox('${esc(o.id)}')">Decline</button>${
o.phone?`<button class="small-btn blue" onclick="window.open('https://wa.me/961${esc(o.phone)}','_blank')">WA</button>`:''}
</div></div>`;
}
async function confirmInbox(id){const o=inboxData.find(x=>x.id===id);if(!o)return;o.status='confirmed';inboxWritePending=true;try{await fetch(`${
WORKER_URL}
/supabase/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});rememberHandledInbox(id);inboxData=inboxData.filter(x=>x.id!==id);syncInboxBadge();renderInboxList();loadOrderIntoCurrent(o);setTimeout(()=>pollInbox(true),1200)}catch(e){showToast('Confirm failed: '+e.message,'error')}inboxWritePending=false}
async function declineInbox(id){const o=inboxData.find(x=>x.id===id);if(!o)return;o.status='declined';inboxWritePending=true;try{await fetch(`${
WORKER_URL}
/supabase/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});rememberHandledInbox(id);inboxData=inboxData.filter(x=>x.id!==id);syncInboxBadge();renderInboxList();showToast('Order declined');setTimeout(()=>pollInbox(true),1200)}catch(e){showToast('Decline failed: '+e.message,'error')}inboxWritePending=false}
function renderCustomers(){
const q=searchQuery,rows=customersData.filter(c=>!q||String(c.name+' '+c.phone).toLowerCase().includes(q));
if(!rows.length){$('customers-list').innerHTML='<div class="empty">No customers found.</div>';return}
$('customers-list').innerHTML=rows.map(c=>`<div class="panel-card"><div class="panel-head"><div><div class="panel-name">${
esc(c.name||'(no name)')}
</div><div class="panel-meta">+961 ${
esc(c.phone)}
· ${
c.totalOrders||0}
visits · ${
money(c.totalSpent||0)}
spent</div></div>${
loyaltyEnabled&&c.loyaltyRewardReady?'<span class="badge ready">Ready</span>':''}
</div>${
c.favoriteItems?.length?`<div class="panel-body"><div class="row"><span>Usually</span><span>${esc(c.favoriteItems.slice(0,2).join(', '))}</span></div></div>`:''}
</div>`).join('');
}
function formatType(t){return t==='dinein'?'Dine In':t==='takeaway'?'Takeaway':t==='delivery'?'Delivery':(t||'')}
function printOrder(format){if(!validateOrder())return;doPrint(buildOrder('pending'),format)}
function printLoggedOrder(id,format){const o=getLoggedOrder(id);if(o)doPrint(o,format)}
function doPrint(o,format){$('print-area').innerHTML=format==='thermal'?thermalReceipt(o):cardReceipt(o);$('print-area').style.display='block';setTimeout(()=>{window.print();$('print-area').style.display='none'},120)}
function thermalReceipt(o){
const rows=(o.items||[]).map(it=>`<div>${
esc(it.name)}
x${
it.qty}
<span style="float:right">${
money(it.price*it.qty)}
</span></div>${
it.flavor?`<div style="padding-left:10px">Flavor: ${esc(it.flavor)}</div>`:''}
${
(it.addons||[]).map(a=>`<div style="padding-left:10px">+ ${esc(a.label)} ${money(a.price)}</div>`).join('')}
`).join('');
return `<div class="receipt"><div class="center"><div class="logo">LE KIOSK</div><div>Wadi Chahrour · +961 76 840 244</div></div><div class="div"></div><div>Order: ${
esc(o.id||'POS')}
</div><div>Name: ${
esc(o.name)}
</div><div>Type: ${
formatType(o.orderType)}
</div><div class="div"></div>${
rows}
${
o.deliveryFee?`<div>Delivery <span style="float:right">${money(o.deliveryFee)}</span></div>`:''}
<div class="div"></div><div class="bold">TOTAL <span style="float:right">${
money(o.total)}
</span></div><div class="div"></div><div class="center">Thank you!</div></div>`;
}
function cardReceipt(o){
const dt=o.timestamp?new Date(o.timestamp):new Date();
const rows=(o.items||[]).map(it=>`<div class="cr-row"><span><strong>${
esc(it.name)}
</strong> <span style="color:#9ca3af">x${
it.qty}
</span></span><span>${
money(it.price*it.qty)}
</span></div>${
it.flavor?`<div class="cr-addon"><span>Flavor: ${esc(it.flavor)}</span><span></span></div>`:''}
${
(it.addons||[]).map(a=>`<div class="cr-addon"><span>+ ${esc(a.label)}</span><span>${money(a.price)}</span></div>`).join('')}
`).join('');
return `<div class="card-receipt"><div class="cr-head"><div class="cr-logo">Le Kiosk</div><div class="cr-sub">Wadi Chahrour · +961 76 840 244</div></div><div class="cr-meta"><div>Order: <span>${
esc(o.id||'POS')}
</span></div><div>Customer: <span>${
esc(o.name||'Guest')}
</span></div>${
o.phone?`<div>Phone: <span>+961 ${esc(o.phone)}</span></div>`:''}
<div>Type: <span>${
formatType(o.orderType)}
</span></div>${
o.deliveryZone?`<div>Zone: <span>${esc(o.deliveryZone)}</span></div>`:''}
${
o.note?`<div>Note: <span>${esc(o.note)}</span></div>`:''}
<div>Time: <span>${
dt.toLocaleDateString('en-GB')}
${
dt.toLocaleTimeString('en-US',{
hour:'2-digit',minute:'2-digit',hour12:true}
)}
</span></div></div>${
rows}
${
o.deliveryFee?`<div class="cr-row"><span>Delivery</span><span>${money(o.deliveryFee)}</span></div>`:''}
<div class="cr-total"><span>Total</span><span>${
money(o.total)}
</span></div><div class="cr-footer">Thank you for visiting Le Kiosk. Leave us a Google review.</div></div>`;
}
function sendWhatsAppLoggedOrder(id){const o=getLoggedOrder(id);if(o)sendWhatsApp(o)}
function sendWhatsApp(o){
let msg=`Le Kiosk Order\nOrder: ${
o.id||'POS'}
\nName: ${
o.name||''}
\nType: ${
formatType(o.orderType)}
\n`;
(o.items||[]).forEach(it=>{msg+=`- ${
it.name}
x${
it.qty}
: ${
money(it.price*it.qty)}
\n`;if(it.flavor)msg+=`  Flavor: ${
it.flavor}
\n`;});
msg+=`Total: ${
money(o.total)}
\n`;
window.open(`https://wa.me/${o.phone?`961${o.phone}`:WA_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
}
function openModal(title,copy,onOk){
$('modal-title').textContent=title;
$('modal-copy').textContent=copy;
$('modal-ok').onclick=()=>{
closeModal();
onOk&&onOk()}
;
$('modal-overlay').classList.add('show');
}
function closeModal(){
$('modal-overlay').classList.remove('show')}
$('modal-overlay').addEventListener('click',e=>{
if(e.target===e.currentTarget)closeModal()}
);
function showToast(msg,type=''){
const t=$('toast');
t.textContent=msg;
t.className='toast show'+(type?' '+type:'');
clearTimeout(showToast.t);
showToast.t=setTimeout(()=>t.className='toast',3200)}
function showLoading(msg){
$('loading-text').textContent=msg||'Loading...';
$('loading').classList.add('show')}
function hideLoading(){
$('loading').classList.remove('show')}
</script>
</body>
</html>
