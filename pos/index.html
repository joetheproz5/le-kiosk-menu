<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Le Kiosk — POS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --a50:#fffbeb;--a100:#fef3c7;--a200:#fde68a;--a300:#fcd34d;--a400:#fbbf24;
  --a500:#f59e0b;--a600:#d97706;--a700:#b45309;--a800:#92400e;--a900:#78350f;--a950:#451a03;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;
  --g500:#6b7280;--g600:#4b5563;--g800:#1f2937;--g900:#111827;
  --green:#22c55e;--green-d:#16a34a;--red:#ef4444;--red-d:#dc2626;
  --blue:#3b82f6;--blue-d:#2563eb;
  --white:#fff;--font:'Poppins',sans-serif;--brand:'Fredoka',sans-serif;
  --sidebar-order:320px;--cat-sidebar:160px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--g100);color:var(--g900);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--font);outline:none}
:root{
  --cat0-bg:#fef3c7;--cat0-border:#f59e0b;--cat0-text:#92400e;--cat0-head:#f59e0b;--cat0-headtext:#fff;
  --cat1-bg:#dbeafe;--cat1-border:#3b82f6;--cat1-text:#1e40af;--cat1-head:#3b82f6;--cat1-headtext:#fff;
  --cat2-bg:#dcfce7;--cat2-border:#22c55e;--cat2-text:#166534;--cat2-head:#22c55e;--cat2-headtext:#fff;
  --cat3-bg:#fce7f3;--cat3-border:#ec4899;--cat3-text:#9d174d;--cat3-head:#ec4899;--cat3-headtext:#fff;
  --cat4-bg:#ede9fe;--cat4-border:#8b5cf6;--cat4-text:#5b21b6;--cat4-head:#8b5cf6;--cat4-headtext:#fff;
  --cat5-bg:#fee2e2;--cat5-border:#ef4444;--cat5-text:#991b1b;--cat5-head:#ef4444;--cat5-headtext:#fff;
  --cat6-bg:#d1fae5;--cat6-border:#10b981;--cat6-text:#065f46;--cat6-head:#10b981;--cat6-headtext:#fff;
  --cat7-bg:#ffedd5;--cat7-border:#f97316;--cat7-text:#9a3412;--cat7-head:#f97316;--cat7-headtext:#fff;
  --cat8-bg:#e0f2fe;--cat8-border:#0ea5e9;--cat8-text:#075985;--cat8-head:#0ea5e9;--cat8-headtext:#fff;
}
#login-screen{position:fixed;inset:0;background:var(--a950);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
.login-box{background:var(--white);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{font-family:var(--brand);font-size:34px;font-weight:700;color:var(--a900)}
.login-sub{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--a700);margin-top:2px;margin-bottom:28px}
.login-label{display:block;text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--a800);margin-bottom:6px}
.login-input{width:100%;padding:13px 16px;border:2px solid var(--a200);border-radius:12px;font-size:15px;color:var(--a950);background:var(--a50);transition:border-color .2s;margin-bottom:16px}
.login-input:focus{border-color:var(--a500)}
.login-input:disabled{opacity:.5}
.login-btn-main{width:100%;padding:14px;background:var(--a900);color:var(--a100);border-radius:12px;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:background .2s}
.login-btn-main:hover:not(:disabled){background:var(--a800)}
.login-btn-main:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:#fef2f2;border:1px solid #fecaca;color:var(--red-d);border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.login-err.show{display:block}
.lockout-bar{background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;margin-top:10px;display:none}
.lockout-bar.show{display:block}
.attempt-dots{display:flex;justify-content:center;gap:6px;margin-top:14px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--a200)}
.dot.used{background:var(--red)}
#pos-screen{display:none;height:100vh;flex-direction:column}
#pos-screen.show{display:flex}
.pos-topbar{background:var(--a950);color:var(--a100);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.pos-logo{font-family:var(--brand);font-size:22px;font-weight:700;letter-spacing:.05em}
.pos-logo span{font-size:11px;font-weight:500;opacity:.6;letter-spacing:.08em;text-transform:uppercase;margin-left:8px}
.pos-topbar-right{display:flex;align-items:center;gap:8px}
.topbar-btn{padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:all .15s}
.tb-orders{background:rgba(255,255,255,.12);color:var(--a100)}
.tb-orders:hover{background:rgba(255,255,255,.22)}
.tb-orders.active{background:var(--a400);color:var(--a950)}
.tb-inbox{background:rgba(34,197,94,.2);color:#86efac;position:relative}
.tb-inbox:hover{background:rgba(34,197,94,.3)}
.tb-inbox.active{background:var(--green);color:var(--white)}
.inbox-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.inbox-badge.show{display:flex}
.tb-logout{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.tb-logout:hover{background:rgba(255,255,255,.15)}
.session-badge{font-size:10px;font-weight:700;background:rgba(251,191,36,.2);color:var(--a300);padding:3px 10px;border-radius:20px;letter-spacing:.06em}
/* ── INBOX PULSE RING on topbar btn ── */
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.tb-inbox.has-new{animation:ring 1.4s ease-in-out infinite}
.pos-main{display:flex;flex:1;min-height:0}
.cat-sidebar{width:var(--cat-sidebar);flex-shrink:0;background:var(--a950);display:flex;flex-direction:column;overflow-y:auto;padding:10px 8px;gap:6px;-webkit-overflow-scrolling:touch}
.cat-sidebar::-webkit-scrollbar{display:none}
.cat-sidebar-btn{padding:10px 8px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.04em;text-align:center;color:rgba(255,255,255,.6);background:rgba(255,255,255,.07);border:1.5px solid transparent;cursor:pointer;transition:all .15s;line-height:1.3;word-break:break-word}
.cat-sidebar-btn:hover{background:rgba(255,255,255,.14);color:var(--white)}
.cat-sidebar-btn.active{color:var(--white);border-color:currentColor}
.cat-sidebar-btn .cat-icon{font-size:18px;display:block;margin-bottom:4px}
.menu-panel{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--g100);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.menu-cat-section{margin-bottom:16px;border-radius:14px;overflow:hidden;border:2px solid var(--g200)}
.menu-cat-header{padding:10px 14px;display:flex;align-items:center;gap:8px;font-family:var(--brand);font-size:15px;font-weight:700;letter-spacing:.04em}
.menu-cat-header .cat-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.25);color:inherit;margin-left:auto}
.menu-cat-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:10px;background:var(--white)}
.item-card-wrap{position:relative}
.item-card{background:var(--white);border-radius:10px;border:2px solid var(--g200);overflow:hidden;cursor:pointer;transition:all .15s;user-select:none;display:flex;flex-direction:column;touch-action:manipulation}
.item-card:hover{border-color:var(--a300);box-shadow:0 2px 12px rgba(245,158,11,.15)}
.item-card:active{transform:scale(.97)}
.item-card.in-cart{border-color:var(--a400)!important}
.item-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--g100)}
.item-info{padding:6px 8px 8px}
.item-name{font-size:11px;font-weight:700;color:var(--a950);line-height:1.3;margin-bottom:2px}
.item-price{font-size:12px;font-weight:800;color:var(--a600)}
.item-qty-badge{display:none;position:absolute;top:5px;right:5px;background:var(--a500);color:var(--white);font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:10px;align-items:center;justify-content:center;padding:0 4px}
.item-card-wrap.has-qty .item-qty-badge{display:flex}
.item-card-wrap.has-qty .item-card{background:var(--a50)}
.cat-color-0 .menu-cat-header{background:var(--cat0-head);color:var(--cat0-headtext)}
.cat-color-0 .menu-cat-section{border-color:var(--cat0-border)}
.cat-color-0 .item-card-wrap.has-qty .item-card{border-color:var(--cat0-border)!important}
.cat-color-1 .menu-cat-header{background:var(--cat1-head);color:var(--cat1-headtext)}
.cat-color-1 .menu-cat-section{border-color:var(--cat1-border)}
.cat-color-1 .item-card-wrap.has-qty .item-card{border-color:var(--cat1-border)!important}
.cat-color-2 .menu-cat-header{background:var(--cat2-head);color:var(--cat2-headtext)}
.cat-color-2 .menu-cat-section{border-color:var(--cat2-border)}
.cat-color-2 .item-card-wrap.has-qty .item-card{border-color:var(--cat2-border)!important}
.cat-color-3 .menu-cat-header{background:var(--cat3-head);color:var(--cat3-headtext)}
.cat-color-3 .menu-cat-section{border-color:var(--cat3-border)}
.cat-color-3 .item-card-wrap.has-qty .item-card{border-color:var(--cat3-border)!important}
.cat-color-4 .menu-cat-header{background:var(--cat4-head);color:var(--cat4-headtext)}
.cat-color-4 .menu-cat-section{border-color:var(--cat4-border)}
.cat-color-4 .item-card-wrap.has-qty .item-card{border-color:var(--cat4-border)!important}
.cat-color-5 .menu-cat-header{background:var(--cat5-head);color:var(--cat5-headtext)}
.cat-color-5 .menu-cat-section{border-color:var(--cat5-border)}
.cat-color-5 .item-card-wrap.has-qty .item-card{border-color:var(--cat5-border)!important}
.cat-color-6 .menu-cat-header{background:var(--cat6-head);color:var(--cat6-headtext)}
.cat-color-6 .menu-cat-section{border-color:var(--cat6-border)}
.cat-color-6 .item-card-wrap.has-qty .item-card{border-color:var(--cat6-border)!important}
.cat-color-7 .menu-cat-header{background:var(--cat7-head);color:var(--cat7-headtext)}
.cat-color-7 .menu-cat-section{border-color:var(--cat7-border)}
.cat-color-7 .item-card-wrap.has-qty .item-card{border-color:var(--cat7-border)!important}
.cat-color-8 .menu-cat-header{background:var(--cat8-head);color:var(--cat8-headtext)}
.cat-color-8 .menu-cat-section{border-color:var(--cat8-border)}
.cat-color-8 .item-card-wrap.has-qty .item-card{border-color:var(--cat8-border)!important}
.cat-sidebar-btn[data-ci="0"].active{background:var(--cat0-head);border-color:var(--cat0-head);color:#fff}
.cat-sidebar-btn[data-ci="1"].active{background:var(--cat1-head);border-color:var(--cat1-head);color:#fff}
.cat-sidebar-btn[data-ci="2"].active{background:var(--cat2-head);border-color:var(--cat2-head);color:#fff}
.cat-sidebar-btn[data-ci="3"].active{background:var(--cat3-head);border-color:var(--cat3-head);color:#fff}
.cat-sidebar-btn[data-ci="4"].active{background:var(--cat4-head);border-color:var(--cat4-head);color:#fff}
.cat-sidebar-btn[data-ci="5"].active{background:var(--cat5-head);border-color:var(--cat5-head);color:#fff}
.cat-sidebar-btn[data-ci="6"].active{background:var(--cat6-head);border-color:var(--cat6-head);color:#fff}
.cat-sidebar-btn[data-ci="7"].active{background:var(--cat7-head);border-color:var(--cat7-head);color:#fff}
.cat-sidebar-btn[data-ci="8"].active{background:var(--cat8-head);border-color:var(--cat8-head);color:#fff}
#orders-view{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden}
#orders-view.show{display:flex}
.orders-toolbar{padding:14px 20px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.orders-toolbar h2{font-family:var(--brand);font-size:20px;font-weight:700;color:var(--a950);flex:1}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--g200);background:var(--g50);color:var(--g600);cursor:pointer;transition:all .12s}
.filter-btn.active{background:var(--a950);color:var(--a100);border-color:var(--a950)}
.orders-list{flex:1;overflow-y:auto;padding:14px 20px;-webkit-overflow-scrolling:touch}
.order-card{background:var(--white);border-radius:14px;border:2px solid var(--g200);margin-bottom:12px;overflow:hidden;transition:border-color .15s}
.order-card.status-done{border-color:#bbf7d0}
.order-card.status-cancelled{border-color:#fecaca;opacity:.7}
.oc-header{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 8px;gap:8px}
.oc-num{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.06em}
.oc-name{font-size:15px;font-weight:800;color:var(--a950);margin-top:1px}
.oc-meta{font-size:11px;color:var(--g500);margin-top:2px}
.status-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.sb-pending{background:var(--a100);color:var(--a800)}
.sb-done{background:#dcfce7;color:#166534}
.sb-cancelled{background:#fee2e2;color:var(--red-d)}
.oc-items{padding:0 14px 8px;border-top:1px solid var(--g100)}
.oc-item-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--g700)}
.oc-item-row.addon-row{padding-left:12px;color:var(--g500);font-size:11px}
.oc-total{display:flex;justify-content:space-between;padding:8px 14px;background:var(--a50);font-weight:800;font-size:13px;color:var(--a800)}
.oc-actions{display:flex;gap:8px;padding:8px 14px 10px;flex-wrap:wrap}
.oc-btn{padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;border:none;transition:all .12s;flex-shrink:0}
.oc-done{background:#dcfce7;color:#166534}
.oc-done:hover{background:#bbf7d0}
.oc-cancel{background:#fee2e2;color:var(--red-d)}
.oc-cancel:hover{background:#fecaca}
.oc-print-t{background:var(--g800);color:var(--white)}
.oc-print-t:hover{background:var(--g900)}
.oc-print-c{background:var(--blue);color:var(--white)}
.oc-print-c:hover{background:var(--blue-d)}
.oc-wa{background:#22c55e;color:var(--white)}
.oc-wa:hover{background:#16a34a}
.oc-load{background:var(--a500);color:var(--white)}
.oc-load:hover{background:var(--a600)}
#inbox-view{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden}
#inbox-view.show{display:flex}
.inbox-toolbar{padding:14px 20px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:12px;flex-shrink:0}
.inbox-toolbar h2{font-family:var(--brand);font-size:20px;font-weight:700;color:var(--a950);flex:1}
.inbox-list{flex:1;overflow-y:auto;padding:14px 20px;-webkit-overflow-scrolling:touch}
.inbox-card{background:var(--white);border-radius:14px;border:2px solid var(--green);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 12px rgba(34,197,94,.1);animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.inbox-card-header{background:linear-gradient(135deg,#dcfce7,#bbf7d0);padding:12px 14px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.inbox-card-header .new-badge{background:var(--green-d);color:#fff;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.inbox-oc-name{font-size:15px;font-weight:800;color:var(--a950)}
.inbox-oc-meta{font-size:11px;color:var(--g600);margin-top:2px}
.inbox-oc-time{font-size:10px;font-weight:700;color:var(--green-d)}
.inbox-actions{display:flex;gap:8px;padding:10px 14px;flex-wrap:wrap}
.inbox-confirm-btn{background:var(--green);color:#fff;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;border:none;transition:all .15s;flex:1}
.inbox-confirm-btn:hover{background:var(--green-d)}
.inbox-decline-btn{background:#fee2e2;color:var(--red-d);padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.inbox-decline-btn:hover{background:#fecaca}
.inbox-empty{text-align:center;padding:60px 20px;color:var(--g400);font-size:14px}
.inbox-empty-icon{font-size:48px;margin-bottom:12px}
/* GPS info in inbox card */
.inbox-gps-row{font-size:10px;color:var(--green-d);font-weight:600;padding:0 14px 8px;display:flex;align-items:center;gap:6px}
.order-panel{width:var(--sidebar-order);flex-shrink:0;background:var(--white);border-left:2px solid var(--g200);display:flex;flex-direction:column;overflow:hidden}
.order-header{padding:14px 16px 10px;border-bottom:1px solid var(--g200);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.order-title{font-family:var(--brand);font-size:18px;font-weight:700;color:var(--a950)}
.clear-btn{font-size:11px;font-weight:700;color:var(--red-d);background:#fef2f2;border:1px solid #fecaca;padding:5px 10px;border-radius:8px}
.clear-btn:hover{background:#fee2e2}
.order-scroll{flex:1;overflow-y:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}
.order-empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px}
.order-empty-icon{font-size:36px;margin-bottom:8px}
.order-line{background:var(--g50);border-radius:10px;margin-bottom:8px;overflow:hidden}
.order-line-main{display:flex;align-items:flex-start;gap:8px;padding:10px 10px 8px}
.order-line-name{flex:1;font-size:12px;font-weight:700;color:var(--a950);line-height:1.3}
.order-line-price{font-size:12px;font-weight:700;color:var(--a600);flex-shrink:0}
.qty-row{display:flex;align-items:center;gap:0;margin-top:4px}
.q-btn{width:28px;height:28px;border-radius:7px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.q-minus{background:var(--a100);color:var(--a800)}
.q-minus:hover{background:var(--a200)}
.q-plus{background:var(--a500);color:var(--white)}
.q-plus:hover{background:var(--a600)}
.q-num{width:30px;text-align:center;font-size:13px;font-weight:800;color:var(--a950);background:var(--white);border-top:1.5px solid var(--a200);border-bottom:1.5px solid var(--a200);height:28px;line-height:28px}
.q-del{margin-left:5px;width:26px;height:26px;border-radius:6px;background:#fef2f2;color:var(--red-d);font-size:13px;display:flex;align-items:center;justify-content:center}
.q-del:hover{background:#fee2e2}
.order-addons{padding:0 10px 10px}
.oa-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--a700);margin-bottom:5px}
.oa-chips{display:flex;flex-wrap:wrap;gap:4px}
.oa-chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;border:1.5px solid var(--a200);background:var(--a50);color:var(--a800);cursor:pointer;transition:all .12s;touch-action:manipulation}
.oa-chip:hover{border-color:var(--a400);background:var(--a100)}
.oa-chip.selected{background:var(--a500);border-color:var(--a500);color:var(--white)}
.order-form{padding:10px 14px 0;border-top:1px solid var(--g200);flex-shrink:0}
.form-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--a700);margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 11px;border:2px solid var(--a200);border-radius:10px;font-size:12px;font-weight:600;color:var(--a950);background:var(--a50);transition:border-color .2s;margin-bottom:8px}
.form-input:focus{border-color:var(--a500);background:var(--white)}
.form-input.error{border-color:var(--red);background:#fef2f2}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.type-btn{padding:8px 3px;border-radius:9px;border:2px solid var(--a200);background:var(--a50);color:var(--a800);font-size:10px;font-weight:700;text-align:center;cursor:pointer;transition:all .15s;touch-action:manipulation}
.type-btn:hover{background:var(--a100);border-color:var(--a300)}
.type-btn.sel{background:var(--a500);border-color:var(--a500);color:var(--white)}
.type-icon{font-size:16px;display:block;margin-bottom:2px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.zone-btn{padding:7px 3px;border-radius:9px;border:2px solid var(--g200);background:var(--g50);font-size:10px;font-weight:700;text-align:center;cursor:pointer;transition:all .15s;touch-action:manipulation;line-height:1.3}
.zone-btn:hover{border-color:var(--a300);background:var(--a50)}
.zone-btn.sel{color:var(--white);border-color:transparent}
.zone-btn.sel.za{background:#16a34a}
.zone-btn.sel.zb{background:var(--a600)}
.zone-btn.sel.zc{background:#dc2626}
.zone-fee{font-size:9px;font-weight:800;opacity:.85;display:block;margin-top:2px}
.err-msg{font-size:11px;color:var(--red-d);font-weight:600;margin-top:-5px;margin-bottom:7px;display:none}
.err-msg.show{display:block}
.order-footer{padding:10px 14px 12px;border-top:1px solid var(--g200);flex-shrink:0;background:var(--white)}
.total-display{display:flex;justify-content:space-between;align-items:center;background:var(--a100);border-radius:10px;padding:10px 14px;margin-bottom:10px}
.total-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--a800)}
.total-amount{font-size:20px;font-weight:800;color:var(--a700)}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.act-btn{padding:11px 6px;border-radius:11px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;touch-action:manipulation}
.act-btn:active{transform:scale(.97)}
.btn-charge{background:var(--green);color:var(--white);grid-column:1/-1}
.btn-charge:hover{background:var(--green-d)}
.btn-print-thermal{background:var(--g800);color:var(--white)}
.btn-print-thermal:hover{background:var(--g900)}
.btn-whatsapp{background:#22c55e;color:var(--white)}
.btn-whatsapp:hover{background:#16a34a}
.btn-print-card{background:var(--blue);color:var(--white)}
.btn-print-card:hover{background:var(--blue-d)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g900);color:var(--white);padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--green-d)}
#toast.error{background:var(--red-d)}
#loading{position:fixed;inset:0;background:rgba(252,248,238,.9);backdrop-filter:blur(4px);z-index:9990;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--a200);border-top-color:var(--a900);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9995;display:none;align-items:center;justify-content:center;padding:20px}
#modal-overlay.show{display:flex}
.modal-box{background:var(--white);border-radius:18px;padding:28px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-box h3{font-family:var(--brand);font-size:20px;font-weight:700;color:var(--a950);margin-bottom:6px}
.modal-box p{font-size:13px;color:var(--g500);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.modal-cancel{padding:9px 18px;border-radius:9px;background:var(--g100);color:var(--g700);font-size:12px;font-weight:700;text-transform:uppercase}
.modal-confirm{padding:9px 18px;border-radius:9px;background:var(--green);color:var(--white);font-size:12px;font-weight:700;text-transform:uppercase}
@media print{body *{visibility:hidden!important}#print-area,#print-area *{visibility:visible!important}#print-area{position:fixed!important;inset:0!important;background:white!important;padding:0!important;z-index:99999}@page{margin:4mm;size:auto}}
#print-area{display:none}
.thermal-receipt{font-family:'Courier New',monospace;font-size:12px;line-height:1.5;color:#000;background:#fff;padding:8px 12px;max-width:280px}
.th-center{text-align:center}
.th-logo{font-size:18px;font-weight:900;letter-spacing:.1em;margin-bottom:2px}
.th-sub{font-size:10px;margin-bottom:8px}
.th-divider{border-top:1px dashed #000;margin:6px 0}
.th-row{display:flex;justify-content:space-between;font-size:12px}
.th-row.bold{font-weight:900}
.th-addon{padding-left:12px;font-size:11px;color:#555}
.th-total{font-size:14px;font-weight:900;border-top:2px solid #000;padding-top:4px;margin-top:4px}
.th-footer{text-align:center;font-size:10px;margin-top:8px}
.card-receipt{font-family:'Poppins',sans-serif;background:#fff;padding:24px;max-width:400px;margin:0 auto}
.cr-header{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #fde68a}
.cr-logo{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;color:#78350f}
.cr-sub{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#b45309}
.cr-order-num{font-size:11px;font-weight:700;color:#9ca3af;margin-top:4px}
.cr-section{margin-bottom:12px}
.cr-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;font-size:12px;border-bottom:1px solid #fef3c7}
.cr-row:last-child{border-bottom:none}
.cr-addon{padding:2px 0 2px 14px;font-size:11px;color:#6b7280;display:flex;justify-content:space-between}
.cr-meta{font-size:11px;color:#6b7280;margin-bottom:8px}
.cr-meta span{font-weight:700;color:#451a03}
.cr-total{display:flex;justify-content:space-between;background:#fef3c7;border-radius:8px;padding:10px 12px;font-weight:800;font-size:14px;color:#92400e;margin-top:8px}
.cr-footer{text-align:center;font-size:10px;color:#9ca3af;margin-top:12px;padding-top:8px;border-top:1px dashed #fde68a}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="font-family:var(--brand);font-size:16px;color:var(--a900);font-weight:600" id="loading-text">Loading…</div></div>
<div id="toast"></div>
<div id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-body">Are you sure?</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-ok">OK</button>
    </div>
  </div>
</div>
<div id="print-area"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Le Kiosk</div>
    <div class="login-sub">Point of Sale</div>
    <label class="login-label">Password</label>
    <input type="password" id="pw" class="login-input" placeholder="Enter POS password" autocomplete="current-password">
    <button class="login-btn-main" id="login-btn" onclick="tryLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
    <div class="lockout-bar" id="lockout-bar"></div>
    <div class="attempt-dots" id="attempt-dots"></div>
  </div>
</div>

<!-- POS -->
<div id="pos-screen">
  <div class="pos-topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="pos-logo">Le Kiosk <span>POS</span></span>
      <span class="session-badge" id="session-badge"></span>
    </div>
    <div class="pos-topbar-right">
      <button class="topbar-btn tb-inbox" id="inbox-tab-btn" onclick="toggleInboxView()" style="position:relative">
        📥 Incoming
        <span class="inbox-badge" id="inbox-badge">0</span>
      </button>
      <button class="topbar-btn tb-orders" id="orders-tab-btn" onclick="toggleOrdersView()">📋 Orders Log</button>
      <button class="topbar-btn tb-logout" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="pos-main">
    <div class="cat-sidebar" id="cat-sidebar"></div>
    <div class="menu-panel" id="menu-panel"></div>
    <div id="orders-view">
      <div class="orders-toolbar">
        <h2>Orders Log</h2>
        <div class="filter-btns">
          <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
          <button class="filter-btn" data-filter="pending" onclick="setFilter(this,'pending')">Pending</button>
          <button class="filter-btn" data-filter="done" onclick="setFilter(this,'done')">Done</button>
          <button class="filter-btn" data-filter="cancelled" onclick="setFilter(this,'cancelled')">Cancelled</button>
        </div>
        <button class="topbar-btn tb-orders" onclick="loadOrders(true)" style="background:var(--a100);color:var(--a950)">🔄 Refresh</button>
      </div>
      <div class="orders-list" id="orders-list"><div style="text-align:center;padding:40px;color:var(--g400);font-size:14px">Loading orders…</div></div>
    </div>
    <div id="inbox-view">
      <div class="inbox-toolbar">
        <h2>📥 Incoming Orders</h2>
        <button class="topbar-btn" onclick="pollInbox()" style="background:var(--a100);color:var(--a950)">🔄 Refresh</button>
      </div>
      <div class="inbox-list" id="inbox-list">
        <div class="inbox-empty"><div class="inbox-empty-icon">📭</div><div>No incoming orders yet</div></div>
      </div>
    </div>
    <div class="order-panel">
      <div class="order-header">
        <span class="order-title">🛒 Current Order</span>
        <button class="clear-btn" onclick="clearOrder()">Clear ✕</button>
      </div>
      <div class="order-scroll" id="order-scroll"></div>
      <div class="order-form" id="order-form">
        <label class="form-label">Customer Name *</label>
        <input id="cust-name" type="text" class="form-input" placeholder="e.g. Elio" autocomplete="off">
        <div class="err-msg" id="err-name">Name is required.</div>
        <label class="form-label">Order Type *</label>
        <div class="type-grid">
          <button class="type-btn" onclick="selType('dinein')"><span class="type-icon">🪑</span>Dine In</button>
          <button class="type-btn" onclick="selType('takeaway')"><span class="type-icon">🥡</span>Takeaway</button>
          <button class="type-btn" onclick="selType('delivery')"><span class="type-icon">🛵</span>Delivery</button>
        </div>
        <div class="err-msg" id="err-type">Select an order type.</div>
        <div id="zone-section" style="display:none">
          <label class="form-label">Delivery Zone *</label>
          <div class="zone-grid">
            <button class="zone-btn za" onclick="selZone('A')">Zone A<span class="zone-fee">$0.50</span></button>
            <button class="zone-btn zb" onclick="selZone('B')">Zone B<span class="zone-fee">$1.00</span></button>
            <button class="zone-btn zc" onclick="selZone('C')">Zone C<span class="zone-fee">$1.50</span></button>
          </div>
          <div class="err-msg" id="err-zone">Select a delivery zone.</div>
        </div>
        <label class="form-label" id="note-label" style="display:none">Note (optional)</label>
        <textarea id="order-note" class="form-input" rows="2" placeholder="Table number, address, special requests…" style="display:none;resize:none"></textarea>
      </div>
      <div class="order-footer">
        <div class="total-display">
          <div>
            <div class="total-label">Total</div>
            <div id="delivery-fee-label" style="font-size:10px;color:var(--a700);font-weight:600;display:none"></div>
          </div>
          <div class="total-amount" id="total-display">$0.00</div>
        </div>
        <div class="action-btns">
          <button class="act-btn btn-charge" onclick="chargeOrder()">✅ Charge & Save</button>
          <button class="act-btn btn-print-thermal" onclick="printOrder('thermal')">🖨 Thermal</button>
          <button class="act-btn btn-print-card" onclick="printOrder('card')">🖨 Card</button>
          <button class="act-btn btn-whatsapp" onclick="sendWhatsApp()">💬 WhatsApp</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const ADMIN_HASH   = 'b7b9015697bcd58174d56b92494c51d011bb26840f1368e41dbf6fdcf17fcc0d';
const REPO_OWNER   = 'joetheproz5';
const REPO_NAME    = 'le-kiosk-menu';
const MENU_PATH    = 'menu.json';
const ORDERS_PATH  = 'orders.json';
const INBOX_PATH   = 'inbox.json';
const API          = 'https://api.github.com';
const RAW_BASE     = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/`;
const MAX_ORDERS   = 200;
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 2 * 60 * 1000;
const SESSION_MS   = 4 * 60 * 60 * 1000;
const WA_NUMBER    = '96176840244';
const ZONE_FEES    = { A: 0.50, B: 1.00, C: 1.50 };
const CAT_ICONS    = {
  appetizers:'🍟', sandwiches:'🥪', burgers:'🍔', sajj:'🫓',
  desserts:'🍨', shisha:'💨', beverages:'🥤', sweet:'🍫', savory:'🧀'
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let menuData=[],orderLines=[],orderType=null,deliveryZone=null;
let ordersData=[],ordersSha=null,inboxData=[],inboxSha=null;
let ordersFilter='all',showingOrders=false,showingInbox=false;
let sessionExpiry=0,sessionTimer=null,sessionTick=null,sessionListenersAttached=false;
let pendingModalFn=null,inboxPollInterval=null,activeCatKey=null;
let lastInboxCount = 0; // FIX: track badge count to detect new arrivals

// ═══════════════════════════════════════════════════
// HASH & LOGIN
// ═══════════════════════════════════════════════════
async function sha256(str){
  if(!window.crypto?.subtle) throw new Error('HTTPS required');
  const buf=await window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return[...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function getLockout(){try{return JSON.parse(sessionStorage.getItem('pos_lock')||'{"a":0,"u":0}');}catch{return{a:0,u:0};}}
function setLockout(d){sessionStorage.setItem('pos_lock',JSON.stringify(d));}
function resetLockout(){sessionStorage.removeItem('pos_lock');}
function renderDots(n){document.getElementById('attempt-dots').innerHTML=Array.from({length:MAX_ATTEMPTS},(_,i)=>`<div class="dot${i<n?' used':''}"></div>`).join('');}
function enableLogin(v){document.getElementById('pw').disabled=!v;document.getElementById('login-btn').disabled=!v;}
let lockCountdown=null;
function startLockCountdown(){
  clearInterval(lockCountdown);
  lockCountdown=setInterval(()=>{const l=getLockout();if(l.u<=Date.now()){clearInterval(lockCountdown);hideLockBar();enableLogin(true);renderDots(0);}else showLockBar(`Too many attempts. Retry in ${Math.ceil((l.u-Date.now())/1000)}s.`);},1000);
}
function showLockBar(m){const b=document.getElementById('lockout-bar');b.textContent=m;b.classList.add('show');}
function hideLockBar(){document.getElementById('lockout-bar').classList.remove('show');}
async function tryLogin(){
  const l=getLockout();
  if(l.u>Date.now()){enableLogin(false);startLockCountdown();return;}
  const pw=document.getElementById('pw').value;if(!pw) return;
  let hash;try{hash=await sha256(pw);}catch(e){showLoginErr(e.message==='HTTPS required'?'Open POS over HTTPS.':e.message);return;}
  if(hash===ADMIN_HASH){
    resetLockout();hideLockBar();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('pos-screen').classList.add('show');
    startSession();bootPOS();
  } else {
    const na=(l.a||0)+1,nu=na>=MAX_ATTEMPTS?Date.now()+LOCKOUT_MS:0;
    setLockout({a:na,u:nu});renderDots(na);
    if(na>=MAX_ATTEMPTS){enableLogin(false);startLockCountdown();hideLoginErr();}
    else showLoginErr(`Wrong password. ${MAX_ATTEMPTS-na} attempt${MAX_ATTEMPTS-na===1?'':'s'} left.`);
    document.getElementById('pw').value='';document.getElementById('pw').focus();
  }
}
function showLoginErr(m){const e=document.getElementById('login-err');e.textContent=m;e.classList.add('show');}
function hideLoginErr(){document.getElementById('login-err').classList.remove('show');}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
(function(){const l=getLockout();renderDots(l.a||0);if(l.u>Date.now()){enableLogin(false);startLockCountdown();}})();

// ═══════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════
function startSession(){resetSession();clearInterval(sessionTick);sessionTick=setInterval(updateSessionBadge,60000);if(!sessionListenersAttached){['mousemove','keydown','click','touchstart'].forEach(ev=>document.addEventListener(ev,resetSession,{passive:true}));sessionListenersAttached=true;}}
function resetSession(){if(!document.getElementById('pos-screen').classList.contains('show'))return;clearTimeout(sessionTimer);sessionExpiry=Date.now()+SESSION_MS;updateSessionBadge();sessionTimer=setTimeout(()=>{showToast('Session expired','error');logout();},SESSION_MS);}
function updateSessionBadge(){const rem=Math.max(0,sessionExpiry-Date.now()),hrs=Math.floor(rem/3600000),mins=Math.floor((rem%3600000)/60000);document.getElementById('session-badge').textContent=hrs>0?`⏱ ${hrs}h ${mins}m`:`⏱ ${mins}m`;}
function logout(){clearTimeout(sessionTimer);clearInterval(sessionTick);clearInterval(lockCountdown);clearInterval(inboxPollInterval);sessionStorage.removeItem('pos_gh_token');document.getElementById('pos-screen').classList.remove('show');document.getElementById('login-screen').style.display='flex';document.getElementById('pw').value='';document.getElementById('pw').focus();}
function getToken(){return sessionStorage.getItem('lk_gh_token')||sessionStorage.getItem('pos_gh_token')||'';}

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
async function bootPOS(){
  showLoading('Loading menu…');
  try{await loadMenu();renderCatSidebar();renderMenuPanel();}
  catch(e){showToast('Menu load failed: '+e.message,'error');}
  renderOrderPanel();
  loadOrders(false).catch(()=>{});
  await pollInbox(); // FIX: await first poll so badge is accurate immediately
  hideLoading();
  if(!getToken()) promptToken();
  inboxPollInterval=setInterval(pollInbox,20000); // FIX: poll every 20s instead of 30s
}
function promptToken(){const t=prompt('Enter GitHub token (needed to save orders):\n(Leave blank to skip)');if(t&&t.trim()){sessionStorage.setItem('pos_gh_token',t.trim());showToast('Token saved ✓','success');}}

// ═══════════════════════════════════════════════════
// MENU LOAD
// ═══════════════════════════════════════════════════
async function loadMenu(){
  const res=await fetch('../menu.json?v='+Date.now());
  if(!res.ok) throw new Error('Could not load menu.json');
  const all=await res.json();
  menuData=all.filter(c=>c.type!=='addons');
  if(menuData.length) activeCatKey=menuData[0].key;
}

// ═══════════════════════════════════════════════════
// CATEGORY SIDEBAR
// ═══════════════════════════════════════════════════
function renderCatSidebar(){
  const sidebar=document.getElementById('cat-sidebar');
  sidebar.innerHTML=menuData.map((cat,i)=>{
    const icon=CAT_ICONS[cat.key]||CAT_ICONS[cat.key.toLowerCase()]||'🍽️';
    return`<button class="cat-sidebar-btn${cat.key===activeCatKey?' active':''}" data-ci="${i}" onclick="scrollToCategory('${cat.key}',${i},this)"><span class="cat-icon">${icon}</span>${cat.title}</button>`;
  }).join('');
}
function scrollToCategory(key,idx,btn){
  activeCatKey=key;
  document.querySelectorAll('.cat-sidebar-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el=document.getElementById('cat-section-'+key);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════════════
// MENU PANEL
// ═══════════════════════════════════════════════════
function renderMenuPanel(){
  const panel=document.getElementById('menu-panel');
  panel.innerHTML=menuData.map((cat,ci)=>{
    const icon=CAT_ICONS[cat.key]||'🍽️';
    const itemsHtml=(cat.items||[]).map((item,idx)=>{
      const wrapId=`wrap-${cat.key}-${idx}`,qty=getQtyForItem(cat.key,idx);
      return`<div class="item-card-wrap${qty>0?' has-qty':''}" id="${wrapId}"><div class="item-card${qty>0?' in-cart':''}" onclick="addToOrder('${cat.key}',${idx})"><img class="item-img" src="${item.image||''}" alt="${item.name}" onerror="this.style.display='none'"><div class="item-info"><div class="item-name">${item.name}</div><div class="item-price">${item.price}</div></div></div><div class="item-qty-badge" id="badge-${cat.key}-${idx}">${qty>0?qty:''}</div></div>`;
    }).join('');
    return`<div class="menu-cat-section cat-color-${ci%9}" id="cat-section-${cat.key}"><div class="menu-cat-header">${icon} ${cat.title}<span class="cat-badge">${(cat.items||[]).length} items</span></div><div class="menu-cat-items">${itemsHtml}</div></div>`;
  }).join('');
  setupScrollSpy();
}
function setupScrollSpy(){
  const panel=document.getElementById('menu-panel');
  panel.addEventListener('scroll',()=>{
    const sections=menuData.map(cat=>document.getElementById('cat-section-'+cat.key)).filter(Boolean);
    let ai=0;sections.forEach((sec,i)=>{if(sec.offsetTop-panel.scrollTop<=50)ai=i;});
    document.querySelectorAll('.cat-sidebar-btn').forEach((btn,i)=>btn.classList.toggle('active',i===ai));

  },{passive:true});
}

// ═══════════════════════════════════════════════════
// ORDER MANAGEMENT
// ═══════════════════════════════════════════════════
function priceNum(p){return parseFloat((p||'0').replace('$',''))||0;}
function getQtyForItem(catKey,itemIdx){
  const cat=menuData.find(c=>c.key===catKey);if(!cat||!cat.items||!cat.items[itemIdx]) return 0;
  const item=cat.items[itemIdx],pn=priceNum(item.price);
  const line=orderLines.find(l=>l.name===item.name&&l.price===pn&&l.catKey===catKey&&l.itemIdx===itemIdx);
  return line?line.qty:0;
}
function addToOrder(catKey,itemIdx){
  const cat=menuData.find(c=>c.key===catKey);if(!cat) return;
  const item=cat.items?.[itemIdx];if(!item) return;
  const pn=priceNum(item.price);
  const existing=orderLines.find(l=>l.catKey===catKey&&l.itemIdx===itemIdx);
  if(existing){existing.qty++;}
  else{orderLines.push({id:Date.now()+Math.random(),catKey,itemIdx,name:item.name,price:pn,priceStr:item.price,qty:1,addons:[],flavor:null,meta:item});}
  updateItemBadge(catKey,itemIdx);renderOrderPanel();
}
function updateItemBadge(catKey,itemIdx){
  const qty=getQtyForItem(catKey,itemIdx);
  const wrap=document.getElementById(`wrap-${catKey}-${itemIdx}`);
  const badge=document.getElementById(`badge-${catKey}-${itemIdx}`);
  if(wrap){wrap.classList.toggle('has-qty',qty>0);const card=wrap.querySelector('.item-card');if(card)card.classList.toggle('in-cart',qty>0);}
  if(badge)badge.textContent=qty>0?qty:'';
}
function changeQty(id,delta){
  const line=orderLines.find(l=>l.id===id);if(!line) return;
  line.qty=Math.max(0,line.qty+delta);
  if(line.qty===0)orderLines=orderLines.filter(l=>l.id!==id);
  updateItemBadge(line.catKey,line.itemIdx);renderOrderPanel();
}
function removeLine(id){
  const line=orderLines.find(l=>l.id===id);
  if(line){const wrap=document.getElementById(`wrap-${line.catKey}-${line.itemIdx}`),badge=document.getElementById(`badge-${line.catKey}-${line.itemIdx}`);if(wrap){wrap.classList.remove('has-qty');const card=wrap.querySelector('.item-card');if(card)card.classList.remove('in-cart');}if(badge)badge.textContent='';}
  orderLines=orderLines.filter(l=>l.id!==id);renderOrderPanel();
}
function toggleAddon(lineId,addonLabel,addonPrice){
  const line=orderLines.find(l=>l.id===lineId);if(!line) return;
  const idx=line.addons.findIndex(a=>a.label===addonLabel);
  if(idx>-1)line.addons.splice(idx,1);else line.addons.push({label:addonLabel,price:addonPrice});
  renderOrderPanel();
}
function toggleFlavor(lineId,flavor){
  const line=orderLines.find(l=>l.id===lineId);if(!line) return;
  line.flavor=line.flavor===flavor?null:flavor;renderOrderPanel();
}
function clearOrder(){
  const prev=[...orderLines];
  orderLines=[];orderType=null;deliveryZone=null;
  document.getElementById('cust-name').value='';document.getElementById('order-note').value='';
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('zone-section').style.display='none';
  document.getElementById('note-label').style.display='none';
  document.getElementById('order-note').style.display='none';
  prev.forEach(line=>{
    const wrap=document.getElementById(`wrap-${line.catKey}-${line.itemIdx}`),badge=document.getElementById(`badge-${line.catKey}-${line.itemIdx}`);
    if(wrap){wrap.classList.remove('has-qty');const card=wrap.querySelector('.item-card');if(card)card.classList.remove('in-cart');}
    if(badge)badge.textContent='';
  });
  renderOrderPanel();
}
function selType(t){
  orderType=t;
  document.querySelectorAll('.type-btn').forEach((b,i)=>b.classList.toggle('sel',['dinein','takeaway','delivery'][i]===t));
  document.getElementById('err-type').classList.remove('show');
  document.getElementById('zone-section').style.display=t==='delivery'?'block':'none';
  document.getElementById('note-label').style.display='block';
  document.getElementById('order-note').style.display='block';
  updateTotal();
}
function selZone(z){
  deliveryZone=z;
  document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.zone-btn').forEach(b=>{if((b.classList.contains('za')&&z==='A')||(b.classList.contains('zb')&&z==='B')||(b.classList.contains('zc')&&z==='C'))b.classList.add('sel');});
  document.getElementById('err-zone').classList.remove('show');
  updateTotal();
}
function getItemsTotal(){return orderLines.reduce((s,l)=>s+l.price*l.qty+l.addons.reduce((a,x)=>a+x.price,0),0);}
function getDeliveryFee(){return(orderType==='delivery'&&deliveryZone)?(ZONE_FEES[deliveryZone]||0):0;}
function getGrandTotal(){return getItemsTotal()+getDeliveryFee();}
function updateTotal(){
  const fee=getDeliveryFee(),total=getGrandTotal();
  document.getElementById('total-display').textContent='$'+total.toFixed(2);
  const fl=document.getElementById('delivery-fee-label');
  if(fee>0){fl.style.display='block';fl.textContent=`Items $${getItemsTotal().toFixed(2)} + delivery $${fee.toFixed(2)}`;}
  else fl.style.display='none';
}
function renderOrderPanel(){
  updateTotal();
  const scroll=document.getElementById('order-scroll');
  if(!orderLines.length){scroll.innerHTML=`<div class="order-empty"><div class="order-empty-icon">🛒</div><div>Tap items to add them</div></div>`;return;}
  const savedScroll=scroll.scrollTop;let html='';
  orderLines.forEach(line=>{
    const lineTotal=line.price*line.qty+line.addons.reduce((a,x)=>a+x.price,0),lineId=line.id;
    html+=`<div class="order-line"><div class="order-line-main"><div style="flex:1"><div class="order-line-name">${line.name}</div><div class="qty-row"><button class="q-btn q-minus" onclick="changeQtyById(${lineId},-1)">−</button><div class="q-num">${line.qty}</div><button class="q-btn q-plus" onclick="changeQtyById(${lineId},1)">+</button><button class="q-del" onclick="removeLineById(${lineId})">✕</button></div></div><div class="order-line-price">$${lineTotal.toFixed(2)}</div></div>`;
    if(line.meta?.flavors?.length){html+=`<div class="order-addons"><div class="oa-label">💨 Flavor</div><div class="oa-chips">`;line.meta.flavors.forEach(f=>{const safe=f.replace(/'/g,"\\'");html+=`<button class="oa-chip${line.flavor===f?' selected':''}" onclick="toggleFlavorById(${lineId},'${safe}')">${f}</button>`;});html+=`</div></div>`;}
    if(line.meta?.addons?.length){html+=`<div class="order-addons"><div class="oa-label">➕ Extras</div><div class="oa-chips">`;line.meta.addons.forEach(a=>{const pn=priceNum(a.price),sel=line.addons.some(x=>x.label===a.label),safe=a.label.replace(/'/g,"\\'");html+=`<button class="oa-chip${sel?' selected':''}" onclick="toggleAddonById(${lineId},'${safe}',${pn})">${a.label} <span style="opacity:.7">${a.price}</span></button>`;});html+=`</div></div>`;}
    html+=`</div>`;
  });
  scroll.innerHTML=html;scroll.scrollTop=savedScroll;
}
function changeQtyById(id,delta){changeQty(id,delta);}
function removeLineById(id){removeLine(id);}
function toggleAddonById(id,label,price){toggleAddon(id,label,price);}
function toggleFlavorById(id,flavor){toggleFlavor(id,flavor);}

function validateOrder(){
  let ok=true;
  const name=document.getElementById('cust-name').value.trim();
  if(!name){document.getElementById('err-name').classList.add('show');document.getElementById('cust-name').classList.add('error');ok=false;}
  else{document.getElementById('err-name').classList.remove('show');document.getElementById('cust-name').classList.remove('error');}
  if(!orderType){document.getElementById('err-type').classList.add('show');ok=false;}
  else document.getElementById('err-type').classList.remove('show');
  if(orderType==='delivery'&&!deliveryZone){document.getElementById('err-zone').classList.add('show');ok=false;}
  else document.getElementById('err-zone').classList.remove('show');
  if(!orderLines.length){showToast('Add items to the order first','error');ok=false;}
  return ok;
}
function buildOrderObj(status='pending'){
  const name=document.getElementById('cust-name').value.trim(),note=document.getElementById('order-note').value.trim();
  const fee=getDeliveryFee(),total=getGrandTotal(),id='ORD-'+Date.now();
  return{id,status,timestamp:new Date().toISOString(),name,note,orderType,deliveryZone:orderType==='delivery'?deliveryZone:null,deliveryFee:fee,items:orderLines.map(l=>({name:l.name,price:l.price,priceStr:l.priceStr,qty:l.qty,flavor:l.flavor||null,addons:l.addons.map(a=>({label:a.label,price:a.price}))})),subtotal:getItemsTotal(),total};
}

// ═══════════════════════════════════════════════════
// LOAD INBOX ORDER → CURRENT ORDER
// FIX: normalize deliveryZone label ("Zone A" → "A")
// ═══════════════════════════════════════════════════
function normalizeZone(zoneVal) {
  if (!zoneVal) return null;
  // Handle "Zone A", "Zone B", "Zone C" → "A", "B", "C"
  const match = String(zoneVal).match(/\b([ABC])\b/i);
  return match ? match[1].toUpperCase() : null;
}

function loadOrderIntoCurrent(order){
  clearOrder();
  document.getElementById('cust-name').value=order.name||'';
  if(order.note){document.getElementById('order-note').value=order.note;document.getElementById('note-label').style.display='block';document.getElementById('order-note').style.display='block';}
  if(order.orderType) selType(order.orderType);

  // FIX: normalize zone before calling selZone
  const zone = normalizeZone(order.deliveryZone);
  if(zone) selZone(zone);

  // FIX: show note field and address info if delivery
  if(order.orderType === 'delivery') {
    document.getElementById('note-label').style.display='block';
    document.getElementById('order-note').style.display='block';
    // Pre-fill address as note if present and note is empty
    if(order.address && !order.note) {
      document.getElementById('order-note').value = order.address;
    }
  }

  order.items.forEach(it=>{
    let foundCatKey=null,foundIdx=null,foundMeta=null;
    menuData.forEach(cat=>{(cat.items||[]).forEach((mitem,idx)=>{if(mitem.name===it.name){foundCatKey=cat.key;foundIdx=idx;foundMeta=mitem;}});});
    const line={id:Date.now()+Math.random(),catKey:foundCatKey,itemIdx:foundIdx,name:it.name,price:it.price,priceStr:it.priceStr||('$'+it.price),qty:it.qty,addons:(it.addons||[]).map(a=>({label:a.label,price:a.price})),flavor:it.flavor||null,meta:foundMeta||{}};
    orderLines.push(line);
    if(foundCatKey!==null&&foundIdx!==null)updateItemBadge(foundCatKey,foundIdx);
  });
  renderOrderPanel();
  showToast('Order loaded into current order ✓','success');
  if(showingInbox)toggleInboxView();
  if(showingOrders)toggleOrdersView();
}

async function chargeOrder(){
  if(!validateOrder()) return;
  const order=buildOrderObj('pending');

}

// ═══════════════════════════════════════════════════
// GITHUB FILE HELPERS
// ═══════════════════════════════════════════════════
function fromB64(b64){const bin=atob(b64);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return new TextDecoder().decode(b);}
function toB64(str){const b=new TextEncoder().encode(str);let s='';b.forEach(x=>s+=String.fromCharCode(x));return btoa(s);}

// FIX: use raw.githubusercontent.com for reading (no cache, no auth needed)
// Only use the contents API (with SHA) for writing
async function fetchRawFile(path) {
  const url = RAW_BASE + path + '?v=' + Date.now();
  const res = await fetch(url);
  if (res.status === 404) return { data: null, sha: null };
  if (!res.ok) throw new Error('Raw fetch ' + res.status);
  const data = await res.json();
  return { data, sha: null }; // sha not available from raw, fetch separately when needed
}

async function fetchGitHubFileSHA(path) {
  // Only used to get SHA before a write
  const h={'Accept':'application/vnd.github.v3+json'};
  if(getToken()) h['Authorization']='Bearer '+getToken();
  const res=await fetch(`${API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,{headers:h});
  if(res.status===404) return null;
  if(!res.ok) throw new Error('GitHub '+res.status);
  const d=await res.json();
  return d.sha;
}

async function putGitHubFile(path,data,sha,message){
  if(!getToken()) throw new Error('No GitHub token');
  const content=toB64(JSON.stringify(data,null,2));
  const body={message,content};if(sha)body.sha=sha;
  const res=await fetch(`${API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,{method:'PUT',headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message||res.status);}
  const saved=await res.json();return saved.content.sha;
}

async function fetchOrdersFile(){
  const{data}=await fetchRawFile(ORDERS_PATH);
  // Still need SHA for writing — fetch it separately
  ordersSha=await fetchGitHubFileSHA(ORDERS_PATH).catch(()=>null);
  return data||[];
}
async function saveOrdersFile(orders){
  if(!ordersSha) ordersSha=await fetchGitHubFileSHA(ORDERS_PATH).catch(()=>null);
  ordersSha=await putGitHubFile(ORDERS_PATH,orders,ordersSha,'Update orders');
}
async function saveOrderToGitHub(order){
  let orders=[];try{orders=await fetchOrdersFile();}catch(e){}
  orders.unshift(order);if(orders.length>MAX_ORDERS)orders=orders.slice(0,MAX_ORDERS);
  ordersData=orders;await saveOrdersFile(orders);
}
async function loadOrders(showUI){
  if(showUI)showLoading('Loading orders…');
  try{ordersData=await fetchOrdersFile();renderOrdersList();}
  catch(e){if(showUI)showToast('Load failed: '+e.message,'error');}
  if(showUI)hideLoading();
}
async function updateOrderStatus(id,status){
  const order=ordersData.find(o=>o.id===id);if(!order) return;
  order.status=status;showLoading('Updating…');
  try{await saveOrdersFile(ordersData);showToast('Status updated ✓','success');renderOrdersList();}
  catch(e){showToast('Update failed: '+e.message,'error');}
  hideLoading();
}

// ═══════════════════════════════════════════════════
// INBOX — FIX: use raw fetch (no GitHub API cache)
// ═══════════════════════════════════════════════════
async function pollInbox(){
  try{
    const{data}=await fetchRawFile(INBOX_PATH);
    // FIX: get SHA only if we need to write (lazy)
    const pending=(data||[]).filter(o=>o.status==='pending');
    inboxData=data||[];

    const newCount=pending.length;
    updateInboxBadge(newCount);

    // FIX: if inbox is open, always re-render so new orders appear immediately
    if(showingInbox) renderInboxList();

    // FIX: if new orders appeared since last poll and inbox is closed → pulse the button
    if(newCount > lastInboxCount && !showingInbox){
      document.getElementById('inbox-tab-btn').classList.add('has-new');
      showToast(`📥 ${newCount - lastInboxCount} new order${newCount-lastInboxCount>1?'s':''} incoming!`,'success');
    }
    if(newCount === 0){
      document.getElementById('inbox-tab-btn').classList.remove('has-new');
    }
    lastInboxCount=newCount;

  }catch(e){
    // silently fail
  }
}

function updateInboxBadge(count){
  const badge=document.getElementById('inbox-badge');
  badge.textContent=count;badge.classList.toggle('show',count>0);
}

async function confirmInboxOrder(id){
  const order=inboxData.find(o=>o.id===id);if(!order) return;
  loadOrderIntoCurrent(order);
  order.status='confirmed';
  try{
    // FIX: fetch fresh SHA right before write
    inboxSha=await fetchGitHubFileSHA(INBOX_PATH).catch(()=>null);
    inboxSha=await putGitHubFile(INBOX_PATH,inboxData,inboxSha,'Confirm order '+id);
  }catch(e){}
  renderInboxList();
  updateInboxBadge(inboxData.filter(o=>o.status==='pending').length);
  document.getElementById('inbox-tab-btn').classList.remove('has-new');
}

async function declineInboxOrder(id){
  const order=inboxData.find(o=>o.id===id);if(!order) return;
  order.status='declined';showLoading('Declining…');
  try{
    inboxSha=await fetchGitHubFileSHA(INBOX_PATH).catch(()=>null);
    inboxSha=await putGitHubFile(INBOX_PATH,inboxData,inboxSha,'Decline order '+id);
    showToast('Order declined','');
  }catch(e){showToast('Error: '+e.message,'error');}
  hideLoading();renderInboxList();
  updateInboxBadge(inboxData.filter(o=>o.status==='pending').length);
}

      <div class="oc-total"><span>Total</span><span>$${o.total.toFixed(2)}</span></div>
      <div class="oc-actions">
        ${canDone?`<button class="oc-btn oc-done" onclick="confirmStatus('${o.id}','done')">✅ Done</button>`:''}
        ${canCancel?`<button class="oc-btn oc-cancel" onclick="confirmStatus('${o.id}','cancelled')">✕ Cancel</button>`:''}
        <button class="oc-btn oc-load" onclick="loadOrderIntoCurrent(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(o))}')))" title="Load into current order">📋 Load</button>
        <button class="oc-btn oc-print-t" onclick="printFromOrder(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(o))}')),'thermal')">🖨 Thermal</button>
        <button class="oc-btn oc-print-c" onclick="printFromOrder(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(o))}')),'card')">🖨 Card</button>
        <button class="oc-btn oc-wa" onclick="sendWhatsAppFromOrder(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(o))}')))" >💬 WA</button>
      </div>
    </div>`;
  }).join('');
}
function confirmStatus(id,status){openModal(status==='done'?'Mark as Done':'Cancel Order',`Mark order as ${status}?`,()=>updateOrderStatus(id,status));}

// ═══════════════════════════════════════════════════
// PRINT
// ═══════════════════════════════════════════════════
function printOrder(format){if(!validateOrder()) return;doPrint(buildOrderObj(),format);}
function printFromOrder(order,format){doPrint(order,format);}
function doPrint(order,format){
  const area=document.getElementById('print-area');
  area.innerHTML=format==='thermal'?buildThermal(order):buildCard(order);
  area.style.display='block';
  setTimeout(()=>{window.print();area.style.display='none';},150);
}
function buildThermal(o){
  const dt=new Date(o.timestamp||new Date()),ts=dt.toLocaleDateString('en-GB')+' '+dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  const typeLabels={dinein:'Dine In',takeaway:'Takeaway',delivery:'Delivery'};
  let lines='';
  o.items.forEach(it=>{lines+=`<div class="th-row"><span>${it.name} x${it.qty}</span><span>$${(it.price*it.qty).toFixed(2)}</span></div>`;if(it.flavor)lines+=`<div class="th-addon">↳ Flavor: ${it.flavor}</div>`;(it.addons||[]).forEach(a=>{lines+=`<div class="th-addon">↳ ${a.label}: +$${a.price.toFixed(2)}</div>`;});});
  if(o.deliveryFee>0)lines+=`<div class="th-row"><span>Delivery</span><span>+$${o.deliveryFee.toFixed(2)}</span></div>`;
  return`<div class="thermal-receipt"><div class="th-center"><div class="th-logo">LE KIOSK</div><div class="th-sub">Wadi Chahrour · +961 76 840 244</div></div><div class="th-divider"></div><div class="th-row"><span>Order:</span><span>${o.id||'POS'}</span></div><div class="th-row"><span>Name:</span><span>${o.name}</span></div><div class="th-row"><span>Type:</span><span>${typeLabels[o.orderType]||o.orderType}</span></div>${o.deliveryZone?`<div class="th-row"><span>Zone:</span><span>${o.deliveryZone}</span></div>`:''} ${o.note?`<div class="th-row"><span>Note:</span><span>${o.note}</span></div>`:''}<div class="th-row"><span>Time:</span><span>${ts}</span></div><div class="th-divider"></div>${lines}<div class="th-divider"></div><div class="th-row th-total bold"><span>TOTAL</span><span>$${o.total.toFixed(2)}</span></div><div class="th-divider"></div><div class="th-footer">Thank you for visiting!<br>⭐ Leave us a Google review</div></div>`;
}
function buildCard(o){
  const dt=new Date(o.timestamp||new Date()),ts=dt.toLocaleDateString('en-GB')+' '+dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  const typeLabels={dinein:'🪑 Dine In',takeaway:'🥡 Takeaway',delivery:'🛵 Delivery'};
  let rows='';
  o.items.forEach(it=>{rows+=`<div class="cr-row"><span style="font-weight:700">${it.name} <span style="color:#9ca3af;font-weight:500">x${it.qty}</span></span><span style="font-weight:700">$${(it.price*it.qty).toFixed(2)}</span></div>`;if(it.flavor)rows+=`<div class="cr-addon"><span>↳ Flavor: ${it.flavor}</span><span></span></div>`;(it.addons||[]).forEach(a=>{rows+=`<div class="cr-addon"><span>↳ ${a.label}</span><span>+$${a.price.toFixed(2)}</span></div>`;});});
  if(o.deliveryFee>0)rows+=`<div class="cr-row"><span>🛵 Delivery</span><span>+$${o.deliveryFee.toFixed(2)}</span></div>`;
  return`<div class="card-receipt"><div class="cr-header"><div class="cr-logo">Le Kiosk</div><div class="cr-sub">Wadi Chahrour · +961 76 840 244</div>${o.id?`<div class="cr-order-num">${o.id}</div>`:''}</div><div class="cr-meta"><div>Customer: <span>${o.name}</span></div><div>Type: <span>${typeLabels[o.orderType]||o.orderType}</span></div>${o.deliveryZone?`<div>Zone: <span>${o.deliveryZone} (+$${o.deliveryFee?.toFixed(2)||'0.00'})</span></div>`:''} ${o.note?`<div>Note: <span>${o.note}</span></div>`:''}<div>Time: <span>${ts}</span></div></div><div class="cr-section">${rows}</div><div class="cr-total"><span>Total</span><span>$${o.total.toFixed(2)}</span></div><div class="cr-footer">Thank you for visiting Le Kiosk! ⭐<br>Leave us a Google review — it means the world to us.</div></div>`;
}

// ═══════════════════════════════════════════════════
// WHATSAPP
// ═══════════════════════════════════════════════════
function sendWhatsApp(){if(!validateOrder()) return;doWhatsApp(buildOrderObj());}
function sendWhatsAppFromOrder(o){doWhatsApp(o);}
function doWhatsApp(o){
  const typeLabels={dinein:'🪑 Dine In',takeaway:'🥡 Takeaway',delivery:'🛵 Delivery'};
  const dt=new Date(o.timestamp||new Date()),ts=dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  let msg=`🛒 *Order — Le Kiosk*\n━━━━━━━━━━━━━━━━━━\n👤 *Name:* ${o.name}\n📦 *Type:* ${typeLabels[o.orderType]||o.orderType}\n`;
  if(o.deliveryZone)msg+=`📍 *Zone:* ${o.deliveryZone} (fee: $${o.deliveryFee?.toFixed(2)||'0.00'})\n`;
  if(o.note)msg+=`📝 *Note:* ${o.note}\n`;
  msg+=`🕐 *Time:* ${ts}\n━━━━━━━━━━━━━━━━━━\n`;
  o.items.forEach(it=>{msg+=`• ${it.name} x${it.qty} — $${(it.price*it.qty).toFixed(2)}\n`;if(it.flavor)msg+=`  ↳ Flavor: ${it.flavor}\n`;(it.addons||[]).forEach(a=>{msg+=`  ↳ + ${a.label} — $${a.price.toFixed(2)}\n`;});});
  if(o.deliveryFee>0)msg+=`• 🛵 Delivery — $${o.deliveryFee.toFixed(2)}\n`;
  msg+=`━━━━━━━━━━━━━━━━━━\n💰 *Total: $${o.total.toFixed(2)}*`;
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
}

// ═══════════════════════════════════════════════════
// MODAL / TOAST / LOADING
// ═══════════════════════════════════════════════════
function openModal(title,body,onOk){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').textContent=body;document.getElementById('modal-ok').onclick=()=>{closeModal();onOk();};document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
let toastT;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(toastT);toastT=setTimeout(()=>{t.className='';},3500);}
function showLoading(msg){document.getElementById('loading-text').textContent=msg||'Loading…';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
</script>
</body>
