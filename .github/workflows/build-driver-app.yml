name: Build Driver Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK
        working-directory: driver-android
        run: gradle :app:assembleDebug

      - name: Prepare release asset
        run: cp driver-android/app/build/outputs/apk/debug/app-debug.apk le-kiosk-driver.apk

      - name: Upload APK to Supabase private storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRIVER_APK_BUCKET: driver-apps
          DRIVER_APK_PATH: le-kiosk-driver.apk
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          curl --silent --show-error --fail \
            --request POST \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"id\":\"${DRIVER_APK_BUCKET}\",\"name\":\"${DRIVER_APK_BUCKET}\",\"public\":false}" \
            "${SUPABASE_URL%/}/storage/v1/bucket" || true
          curl --silent --show-error --fail \
            --request PUT \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/vnd.android.package-archive" \
            --header "x-upsert: true" \
            --data-binary @le-kiosk-driver.apk \
            "${SUPABASE_URL%/}/storage/v1/object/${DRIVER_APK_BUCKET}/${DRIVER_APK_PATH}"

      - name: Publish latest driver app release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete driver-app-latest --yes --cleanup-tag || true
          gh release create driver-app-latest le-kiosk-driver.apk \
            --title "Le Kiosk Driver App Latest" \
            --notes "Latest debug-signed Android driver APK. Generated by GitHub Actions." \
            --latest
