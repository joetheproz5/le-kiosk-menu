<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Le Kiosk Driver App</title>
  <meta name="theme-color" content="#0f67ff">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef5ff;
      color: #101828;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 16%, rgba(15, 103, 255, 0.24), transparent 30%),
        linear-gradient(145deg, #f8fbff 0%, #dfeeff 54%, #f7fbff 100%);
    }

    main {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 24px 70px rgba(15, 103, 255, 0.18);
      backdrop-filter: blur(22px) saturate(135%);
      -webkit-backdrop-filter: blur(22px) saturate(135%);
    }

    .mark {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #0f67ff;
      color: white;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 14px 34px rgba(15, 103, 255, 0.32);
    }

    h1 {
      margin: 22px 0 10px;
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #475467;
      font-size: 16px;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 26px;
    }

    a {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
    }

    .primary {
      background: #0f67ff;
      color: white;
      box-shadow: 0 14px 28px rgba(15, 103, 255, 0.25);
    }

    .secondary {
      color: #175cd3;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(23, 92, 211, 0.18);
    }

    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #667085;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">L</div>
    <h1>Driver App</h1>
    <p>Open the Le Kiosk driver website, or ask an admin for a temporary Android app download link.</p>
    <div class="actions">
      <a class="primary" href="/driver/">Open Driver Website</a>
      <a class="secondary" href="https://github.com/joetheproz5/le-kiosk-menu/releases" target="_blank" rel="noopener">App Releases</a>
    </div>
    <p class="note">Temporary Android app links expire after 15 minutes and are generated from the admin panel.</p>
  </main>
</body>
</html>
